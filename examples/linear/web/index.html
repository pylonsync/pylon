<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon Linear</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #fbfbfd;
        --surface: #ffffff;
        --surface-raised: #f7f7fa;
        --surface-hover: #f1f2f5;
        --surface-active: #e7e9ef;
        --border: rgba(15, 23, 42, 0.08);
        --border-strong: rgba(15, 23, 42, 0.14);
        --border-focus: rgba(94, 106, 210, 0.55);
        --text: #17171a;
        --text-muted: #5b5b64;
        --text-dim: #8a8a93;
        --text-placeholder: #a1a1aa;
        --accent: #5e6ad2;
        --accent-hover: #7a85e8;
        --accent-soft: rgba(94, 106, 210, 0.10);
        --urgent: #e50048;
        --high: #f2994a;
        --medium: #d1a63d;
        --low: #8a8a93;
        --state-backlog: #8a8a93;
        --state-todo: #5f6368;
        --state-in_progress: #f2994a;
        --state-in_review: #5e6ad2;
        --state-done: #26a980;
        --state-cancelled: #a3a3ab;
        --state-triage: #5e6ad2;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 14px -2px rgba(15, 23, 42, 0.10);
        --shadow-lg: 0 20px 50px -12px rgba(15, 23, 42, 0.18);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: "InterVariable", "Inter", system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      input, button, textarea, select {
        font: inherit; color: inherit; background: none; border: none; outline: none;
      }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      ::selection { background: var(--accent-soft); color: var(--text); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb {
        background: rgba(15,23,42,0.12); border-radius: 6px;
        border: 2px solid transparent; background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.22); }

      .app { display: flex; flex-direction: column; height: 100vh; }
      .body { flex: 1; display: flex; min-height: 0; }
      .nav {
        width: 220px;
        padding: 12px 8px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
      }
      .nav-brand {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 10px 14px;
        font-weight: 700; letter-spacing: -0.01em;
        font-size: 14px;
      }
      .nav-brand-mark {
        display: flex; align-items: center; justify-content: center;
        width: 22px; height: 22px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
      }
      .nav-section {
        padding: 12px 10px 4px;
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-dim);
      }
      .nav-item {
        display: flex; align-items: center; gap: 8px;
        padding: 5px 10px; font-size: 12.5px;
        color: var(--text-muted); border-radius: 5px;
        transition: background 80ms ease, color 80ms ease;
        cursor: pointer;
      }
      .nav-item:hover { background: var(--surface-hover); color: var(--text); }
      .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }

      .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .main-header {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .main-title {
        font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
      }
      .spacer { flex: 1; }

      .btn {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 4px 10px; font-size: 12px; font-weight: 500;
        border-radius: 5px;
        transition: background 100ms ease, border-color 100ms ease;
      }
      .btn-primary { color: white; background: var(--accent); }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
      .btn-secondary {
        color: var(--text); background: var(--surface);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }
      .btn-ghost { color: var(--text-muted); }
      .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

      .field { display: block; margin-bottom: 10px; }
      .field-label {
        display: block; font-size: 11px; font-weight: 500;
        color: var(--text-muted); margin-bottom: 4px;
      }
      .input, .select, .textarea {
        width: 100%; padding: 6px 9px; font-size: 13px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 6px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }
      .input:focus, .select:focus, .textarea:focus {
        border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .textarea { resize: vertical; min-height: 60px; }

      /* Issue list */
      .issue-list {
        flex: 1; overflow-y: auto;
        padding: 0;
      }
      .issue-row {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 20px;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        background: var(--surface);
      }
      .issue-row:hover { background: var(--surface-hover); }
      .issue-row.focused {
        background: var(--accent-soft);
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }
      .issue-ident {
        flex: 0 0 70px;
        font-variant-numeric: tabular-nums;
        font-size: 11.5px;
        color: var(--text-dim);
      }
      .issue-title {
        flex: 1;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-weight: 500;
      }
      .issue-meta {
        display: flex; align-items: center; gap: 8px;
        flex-shrink: 0;
        color: var(--text-dim);
        font-size: 11.5px;
      }

      /* State + priority icons */
      .state-icon {
        flex-shrink: 0;
        width: 14px; height: 14px;
        display: inline-flex; align-items: center; justify-content: center;
      }
      .priority-icon {
        flex-shrink: 0;
        display: inline-flex; align-items: center; gap: 1px;
      }
      .priority-bar {
        width: 2.5px; height: 7px; background: var(--text-dim);
        border-radius: 1px;
      }
      .priority-bar.active { background: var(--text); }

      .avatar {
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; border-radius: 999px; font-weight: 600;
        color: rgba(0,0,0,0.76);
      }
      .avatar-xs { width: 20px; height: 20px; font-size: 9px; }
      .avatar-sm { width: 24px; height: 24px; font-size: 10px; }
      .avatar-md { width: 32px; height: 32px; font-size: 12px; }

      /* Issue detail drawer */
      .drawer {
        position: fixed; inset: 0;
        display: flex; align-items: stretch; justify-content: flex-end;
        background: rgba(15, 23, 42, 0.35);
        z-index: 50;
      }
      .drawer-panel {
        width: 760px; max-width: 100vw;
        background: var(--surface);
        border-left: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
        display: flex; flex-direction: column;
        animation: slideIn 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes slideIn {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .drawer-header {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
      }
      .drawer-ident {
        font-size: 12px; font-variant-numeric: tabular-nums;
        color: var(--text-muted);
      }
      .drawer-body {
        flex: 1; overflow-y: auto;
        display: grid; grid-template-columns: 1fr 240px;
        gap: 0;
      }
      .drawer-main { padding: 24px 24px; min-width: 0; }
      .drawer-side {
        padding: 20px 16px;
        border-left: 1px solid var(--border);
        background: var(--surface-raised);
      }
      .drawer-side-label {
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 4px; margin-top: 14px;
      }
      .drawer-side-label:first-child { margin-top: 0; }
      .issue-heading {
        font-size: 20px; font-weight: 700; letter-spacing: -0.015em;
        margin-bottom: 10px;
      }
      .issue-desc {
        font-size: 13.5px; line-height: 1.6;
        color: var(--text-muted);
        white-space: pre-wrap;
      }

      .comment {
        display: flex; gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .comment-body { flex: 1; }
      .comment-meta {
        font-size: 11px; color: var(--text-dim); margin-bottom: 2px;
      }
      .comment-text { font-size: 13px; line-height: 1.55; white-space: pre-wrap; }

      /* Pills */
      .pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 7px; font-size: 11px; font-weight: 500;
        border-radius: 4px;
      }
      .pill-gray { background: var(--surface-active); color: var(--text-muted); }
      .pill-accent { background: var(--accent-soft); color: var(--accent); }

      /* Command palette */
      .palette-backdrop {
        position: fixed; inset: 0; background: rgba(15,23,42,0.35);
        display: flex; align-items: flex-start; justify-content: center;
        padding-top: 15vh; z-index: 60;
      }
      .palette {
        width: 560px; max-width: calc(100vw - 48px);
        max-height: 60vh;
        display: flex; flex-direction: column;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; box-shadow: var(--shadow-lg);
        overflow: hidden;
      }
      .palette-input-row {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 14px; border-bottom: 1px solid var(--border);
      }
      .palette-input {
        flex: 1; font-size: 15px; background: transparent;
      }
      .palette-input::placeholder { color: var(--text-placeholder); }
      .palette-list { padding: 6px; overflow-y: auto; flex: 1; }
      .palette-item {
        display: flex; align-items: center; gap: 10px;
        padding: 7px 10px; font-size: 13px; border-radius: 6px;
        cursor: pointer;
      }
      .palette-item.selected { background: var(--accent-soft); color: var(--accent); }
      .palette-section {
        padding: 8px 10px 4px; font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--text-dim);
      }
      .kbd {
        font-size: 10.5px; padding: 1px 5px;
        background: var(--surface-raised); border: 1px solid var(--border);
        border-radius: 4px; font-family: inherit;
      }

      /* Login / onboarding */
      .split-screen {
        display: flex; height: 100vh;
        background: radial-gradient(ellipse 70% 50% at 100% 0%,
          rgba(94,106,210,0.12), transparent 70%), var(--bg);
      }
      .auth-panel {
        width: 420px; margin: auto; padding: 36px 32px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 14px; box-shadow: var(--shadow-lg);
      }
      .auth-title {
        font-size: 22px; font-weight: 700; letter-spacing: -0.015em;
        margin-bottom: 4px;
      }
      .auth-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
      .error-text { color: #dc2626; font-size: 12px; margin-top: 6px; }

      .empty {
        padding: 60px 20px; text-align: center;
        color: var(--text-muted);
      }
      .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
      .empty-body { font-size: 12.5px; margin-bottom: 14px; }

      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(15,23,42,0.35);
        display: flex; align-items: center; justify-content: center;
        z-index: 70;
      }
      .modal {
        width: 520px; padding: 20px 22px 16px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; box-shadow: var(--shadow-lg);
      }
      .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
      .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
      .modal-footer {
        display: flex; justify-content: flex-end; gap: 8px;
        padding-top: 12px; margin-top: 8px;
        border-top: 1px solid var(--border);
      }

      .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .hint {
        padding: 10px 20px;
        font-size: 11.5px; color: var(--text-dim);
        border-top: 1px solid var(--border);
        background: var(--surface);
      }
      .hint .kbd { margin: 0 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

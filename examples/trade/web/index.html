<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon Trade</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #141414;
        --bg-1: #1a1a1a;
        --bg-2: #1f1f1f;
        --bg-3: #252525;
        --border: #262626;
        --border-2: #323232;
        --text: #f8fafc;
        --text-2: #b8b8c0;
        --text-3: #7a7a82;
        --text-4: #4a4a52;
        --accent: #8b5cf6;
        --accent-hover: #a78bfa;
        --ok: #4ade80;
        --danger: #f87171;
        --font-sans: "Inter", -apple-system, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13.5px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      button { font-family: inherit; cursor: pointer; background: none; border: none; color: inherit; }

      .tr-app {
        display: grid;
        grid-template-rows: 56px 1fr;
        height: 100%;
      }

      /* ---- Topbar ---- */
      .tr-topbar {
        display: flex;
        align-items: center;
        gap: 32px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .tr-brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 500;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text);
      }
      .tr-stats {
        display: flex;
        gap: 28px;
        margin-left: auto;
      }
      .tr-stat {
        display: flex; align-items: baseline; gap: 8px;
        font-family: var(--font-mono);
      }
      .tr-stat-label {
        font-size: 10px; letter-spacing: 0.14em;
        color: var(--text-3);
      }
      .tr-stat-value {
        font-size: 15px; font-weight: 500;
        color: var(--text);
        font-variant-numeric: tabular-nums;
        min-width: 32px;
      }
      .tr-actions { display: flex; gap: 8px; }
      .tr-btn {
        padding: 7px 14px;
        font-size: 12.5px;
        font-weight: 500;
        border: 1px solid var(--border-2);
        background: var(--bg-1);
        color: var(--text);
        transition: background 120ms, border-color 120ms;
      }
      .tr-btn:hover { background: var(--bg-2); }
      .tr-btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .tr-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
      .tr-btn.active {
        background: var(--bg-2);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ---- Body ---- */
      .tr-body {
        display: grid;
        grid-template-columns: 240px 1fr 280px;
        min-height: 0;
      }
      .tr-col {
        display: flex; flex-direction: column;
        min-height: 0;
        border-right: 1px solid var(--border);
      }
      .tr-col:last-child { border-right: none; }

      .tr-col-head {
        padding: 14px 16px 12px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }

      /* ---- Watchlist column ---- */
      .tr-col-watch { overflow-y: auto; }
      .tr-watch-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 12.5px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        align-items: baseline;
      }
      .tr-watch-row:hover { background: var(--bg-1); }
      .tr-watch-row.active { background: var(--bg-2); border-left: 2px solid var(--accent); padding-left: 14px; }
      .tr-watch-sym { color: var(--text); font-weight: 500; }
      .tr-watch-price { color: var(--text-2); font-variant-numeric: tabular-nums; }
      .tr-watch-pct { font-size: 11.5px; font-variant-numeric: tabular-nums; }
      .tr-watch-pct.up { color: var(--ok); }
      .tr-watch-pct.down { color: var(--danger); }

      /* ---- Main movers table ---- */
      .tr-col-main { overflow: hidden; }
      .tr-table {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }
      .tr-row {
        display: grid;
        grid-template-columns: 80px 1.4fr 0.9fr 0.7fr 0.7fr 0.8fr 32px;
        gap: 10px;
        padding: 9px 16px;
        border-bottom: 1px solid var(--border);
        align-items: baseline;
        font-family: var(--font-mono);
        font-size: 12.5px;
        cursor: pointer;
      }
      .tr-row:hover { background: var(--bg-1); }
      .tr-row.active {
        background: var(--bg-2);
        border-left: 2px solid var(--accent);
        padding-left: 14px;
      }
      .tr-row-head {
        cursor: default;
        color: var(--text-3);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 1;
      }
      .tr-row-head:hover { background: var(--bg); }
      .tr-sym { color: var(--text); font-weight: 500; }
      .tr-name { color: var(--text-2); font-family: var(--font-sans); }
      .tr-sector { color: var(--text-3); font-size: 11px; }
      .tr-num { text-align: right; font-variant-numeric: tabular-nums; }
      .tr-num.up { color: var(--ok); }
      .tr-num.down { color: var(--danger); }
      .tr-vol { color: var(--text-3); }
      .tr-star {
        font-size: 15px;
        color: var(--text-4);
        transition: color 120ms;
        width: 24px; height: 24px;
        display: grid; place-items: center;
      }
      .tr-star:hover { color: var(--accent); }
      .tr-star.on { color: var(--accent); }

      /* ---- Detail column ---- */
      .tr-col-detail { overflow-y: auto; }
      .tr-detail {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .tr-detail-name {
        font-size: 14px;
        color: var(--text-2);
      }
      .tr-detail-price {
        font-size: 36px;
        font-weight: 300;
        letter-spacing: -0.03em;
        color: var(--text);
        font-family: var(--font-mono);
      }
      .tr-detail-row {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        color: var(--text-2);
      }
      .tr-sparkline {
        width: 100%;
        height: 80px;
        margin-top: 14px;
        color: var(--accent);
      }
      .tr-sparkline-empty { padding: 32px 0; text-align: center; color: var(--text-4); }

      .tr-empty {
        padding: 24px 16px;
        font-size: 12.5px;
        color: var(--text-4);
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

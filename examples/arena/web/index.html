<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon Arena</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #141414;
        --bg-1: #1a1a1a;
        --bg-2: #1f1f1f;
        --border: #262626;
        --border-2: #323232;
        --text: #f8fafc;
        --text-2: #b8b8c0;
        --text-3: #7a7a82;
        --text-4: #4a4a52;
        --accent: #8b5cf6;
        --accent-hover: #a78bfa;
        --ok: #4ade80;
        --danger: #f87171;
        --font-sans: "Inter", -apple-system, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        background: none;
        border: none;
        color: inherit;
      }

      .arena {
        position: fixed;
        inset: 0;
        background: #0a0a0c;
      }

      .arena-canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .arena-hud {
        position: absolute;
        background: rgba(20, 20, 20, 0.86);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--border);
        padding: 14px 16px;
        font-family: var(--font-mono);
      }

      .hud-stats {
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 180px;
      }

      .hud-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .hud-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--text-3);
        min-width: 48px;
      }

      .hud-value {
        font-size: 18px;
        font-weight: 500;
        color: var(--text);
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }

      .hud-unit {
        font-size: 11px;
        color: var(--text-3);
        margin-left: 2px;
      }

      .hud-sub {
        font-size: 11px;
        color: var(--text-3);
      }

      .hud-controls {
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 220px;
      }

      .hud-title {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--accent);
      }

      .hud-btn-row {
        display: flex;
        gap: 6px;
      }

      .hud-btn {
        flex: 1;
        padding: 7px 10px;
        font-size: 11.5px;
        color: var(--text);
        border: 1px solid var(--border-2);
        background: var(--bg-1);
        transition: background 120ms ease, border-color 120ms ease;
      }
      .hud-btn:hover:not(:disabled) {
        background: var(--bg-2);
        border-color: var(--border-2);
      }
      .hud-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hud-btn.danger {
        color: var(--danger);
        border-color: rgba(248, 113, 113, 0.35);
      }
      .hud-btn.danger:hover {
        background: rgba(248, 113, 113, 0.08);
      }

      .hud-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        color: var(--text-2);
        cursor: pointer;
        user-select: none;
      }
      .hud-toggle input {
        accent-color: var(--accent);
      }

      .hud-hint {
        font-size: 10.5px;
        color: var(--text-4);
        margin-top: 4px;
      }

      .arena-brand {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-3);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

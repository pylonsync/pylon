# fly.toml app configuration file generated for pylon-crm on 2026-04-23T22:31:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pylon-crm'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    APP = 'examples/crm'

[env]
  PYLON_DEV_MODE = 'false'

[[mounts]]
  source = 'pylon_data'
  destination = '/data'

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

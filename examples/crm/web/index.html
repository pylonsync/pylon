<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon CRM</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --surface-raised: #f7f7f9;
        --surface-hover: #f1f2f5;
        --surface-active: #e7e9ef;
        --border: rgba(15, 23, 42, 0.08);
        --border-strong: rgba(15, 23, 42, 0.14);
        --border-focus: rgba(99, 102, 241, 0.5);
        --text: #0f172a;
        --text-muted: #52525b;
        --text-dim: #94a3b8;
        --text-placeholder: #a1a1aa;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --accent-soft: rgba(99, 102, 241, 0.10);
        --success: #059669;
        --success-soft: rgba(5, 150, 105, 0.12);
        --warning: #d97706;
        --warning-soft: rgba(217, 119, 6, 0.12);
        --danger: #dc2626;
        --danger-soft: rgba(220, 38, 38, 0.12);
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 14px -2px rgba(15, 23, 42, 0.10);
        --shadow-lg: 0 20px 50px -12px rgba(15, 23, 42, 0.18);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: "InterVariable", "Inter", system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      input, button, textarea, select {
        font: inherit; color: inherit; background: none; border: none; outline: none;
      }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      ::selection { background: var(--accent-soft); color: var(--text); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: rgba(15,23,42,0.12); border-radius: 8px;
        border: 2px solid transparent; background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.22); }

      .app { display: flex; flex-direction: column; height: 100vh; }
      .topbar {
        display: flex; align-items: center; gap: 14px;
        padding: 8px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-weight: 700; letter-spacing: -0.01em; font-size: 14px;
      }
      .brand-mark {
        display: flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
      }
      .body { flex: 1; display: flex; min-height: 0; }
      .nav {
        width: 200px; padding: 14px 8px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column; gap: 1px;
      }
      .nav-item {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px; font-size: 12.5px;
        color: var(--text-muted); border-radius: 6px;
        transition: background 80ms ease, color 80ms ease;
        cursor: pointer;
      }
      .nav-item:hover { background: var(--surface-hover); color: var(--text); }
      .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
      .main { flex: 1; display: flex; min-width: 0; }
      .list-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--border); background: var(--bg); }
      .detail-pane {
        width: 400px; background: var(--surface); display: flex; flex-direction: column;
        min-width: 0; overflow-y: auto;
      }
      .list-header {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      .list-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
      .list-count {
        padding: 1px 8px; font-size: 11px; font-variant-numeric: tabular-nums;
        color: var(--text-muted); background: var(--surface-active); border-radius: 999px;
      }
      .spacer { flex: 1; }

      .btn {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 5px 10px; font-size: 12px; font-weight: 500;
        border-radius: 6px;
        transition: background 100ms ease, border-color 100ms ease;
      }
      .btn-primary {
        color: white; background: var(--accent);
      }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
      .btn-secondary {
        color: var(--text); background: var(--surface);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover:not(:disabled) {
        background: var(--surface-hover); border-color: var(--border-strong);
      }
      .btn-ghost { color: var(--text-muted); }
      .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

      .field { display: block; margin-bottom: 10px; }
      .field-label {
        display: block; font-size: 11px; font-weight: 500;
        color: var(--text-muted); margin-bottom: 4px;
      }
      .input, .select, .textarea {
        width: 100%; padding: 6px 9px; font-size: 13px; color: var(--text);
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 6px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }
      .input:hover, .select:hover, .textarea:hover { border-color: var(--border-strong); }
      .input:focus, .select:focus, .textarea:focus {
        border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .textarea { resize: vertical; min-height: 60px; }

      .table {
        width: 100%; background: var(--surface);
        border-collapse: separate; border-spacing: 0;
      }
      .table th {
        text-align: left; padding: 8px 16px;
        font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
        text-transform: uppercase; color: var(--text-dim);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0; z-index: 1;
      }
      .table td {
        padding: 8px 16px; font-size: 13px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      .table tr { cursor: pointer; }
      .table tr:hover td { background: var(--surface-hover); }
      .table tr.selected td { background: var(--accent-soft); }

      .avatar {
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; border-radius: 999px; font-weight: 600;
        color: rgba(0,0,0,0.76); letter-spacing: 0.02em;
      }
      .avatar-xs { width: 20px; height: 20px; font-size: 9px; }
      .avatar-sm { width: 26px; height: 26px; font-size: 10.5px; }
      .avatar-md { width: 32px; height: 32px; font-size: 12px; }
      .avatar-lg { width: 44px; height: 44px; font-size: 14px; }

      .pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 8px; font-size: 11px; font-weight: 500;
        border-radius: 999px;
      }
      .pill-dot { width: 5px; height: 5px; border-radius: 999px; background: currentColor; }
      .pill-gray { background: var(--surface-active); color: var(--text-muted); }
      .pill-accent { background: var(--accent-soft); color: var(--accent); }
      .pill-success { background: var(--success-soft); color: var(--success); }
      .pill-warning { background: var(--warning-soft); color: var(--warning); }
      .pill-danger { background: var(--danger-soft); color: var(--danger); }

      /* Pipeline kanban */
      .kanban {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(6, minmax(240px, 1fr));
        gap: 10px;
        padding: 16px;
        overflow-x: auto;
      }
      .kanban-col {
        display: flex; flex-direction: column; gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        min-width: 240px;
      }
      .kanban-col-header {
        display: flex; align-items: center; gap: 6px;
        padding-bottom: 8px; border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }
      .kanban-col-title {
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--text-muted);
      }
      .kanban-col-count {
        padding: 0 7px; font-size: 10px; font-variant-numeric: tabular-nums;
        color: var(--text-dim); background: var(--surface-active); border-radius: 999px;
      }
      .kanban-col-total {
        margin-left: auto; font-size: 10.5px;
        font-variant-numeric: tabular-nums; color: var(--text-muted);
      }
      .kanban-card {
        padding: 10px 12px;
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        transition: border-color 100ms ease, box-shadow 100ms ease;
      }
      .kanban-card:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm);
      }
      .kanban-card-name {
        font-size: 13px; font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .kanban-card-amount {
        font-size: 13px; font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }
      .kanban-card-meta {
        display: flex; align-items: center; gap: 6px;
        margin-top: 6px;
        font-size: 11px; color: var(--text-muted);
      }

      /* Detail pane bits */
      .detail-header {
        padding: 20px 20px 12px;
        border-bottom: 1px solid var(--border);
      }
      .detail-name {
        font-size: 20px; font-weight: 700; letter-spacing: -0.015em;
        margin-bottom: 4px;
      }
      .detail-sub {
        font-size: 12px; color: var(--text-muted);
      }
      .detail-section {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }
      .detail-section-title {
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--text-dim); margin-bottom: 8px;
      }
      .detail-kv {
        display: grid; grid-template-columns: 110px 1fr;
        gap: 6px 12px; font-size: 12.5px;
      }
      .detail-kv-k { color: var(--text-muted); }
      .detail-kv-v { color: var(--text); overflow: hidden; text-overflow: ellipsis; }

      .timeline-item {
        display: flex; gap: 10px;
        padding: 8px 0;
      }
      .timeline-icon {
        width: 24px; height: 24px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-muted); flex-shrink: 0;
      }
      .timeline-body {
        flex: 1; min-width: 0;
      }
      .timeline-text { font-size: 12.5px; }
      .timeline-when { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }

      .note-card {
        padding: 10px 12px;
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .note-body { font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; }
      .note-meta {
        font-size: 10.5px; color: var(--text-dim);
        margin-top: 6px;
      }

      /* Modal */
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(15,23,42,0.35);
        display: flex; align-items: center; justify-content: center;
        z-index: 50; animation: fadeIn 100ms ease-out;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .modal {
        width: 440px; padding: 20px 22px 16px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; box-shadow: var(--shadow-lg);
      }
      .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
      .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
      .modal-footer {
        display: flex; justify-content: flex-end; gap: 8px;
        padding-top: 12px; margin-top: 8px;
        border-top: 1px solid var(--border);
      }
      .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      /* Login / onboarding */
      .split-screen {
        display: flex; height: 100vh;
        background: radial-gradient(ellipse 70% 50% at 100% 0%,
          rgba(99,102,241,0.10), transparent 70%), var(--bg);
      }
      .auth-panel {
        width: 420px; margin: auto; padding: 36px 32px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 14px; box-shadow: var(--shadow-lg);
      }
      .auth-title {
        font-size: 22px; font-weight: 700; letter-spacing: -0.015em;
        margin-bottom: 4px;
      }
      .auth-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
      .error-text { color: var(--danger); font-size: 12px; margin-top: 6px; }

      .empty {
        padding: 48px 20px; text-align: center;
        color: var(--text-muted);
      }
      .empty-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
      .empty-body { font-size: 12.5px; margin-bottom: 14px; }

      .chip-company {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 2px 7px; font-size: 11.5px;
        background: var(--surface-active); border: 1px solid var(--border);
        border-radius: 5px; color: var(--text);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

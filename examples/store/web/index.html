<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon Store — faceted search demo</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --border: #e5e5ea;
        --border-2: #d4d4d8;
        --text: #18181b;
        --text-2: #3f3f46;
        --text-3: #71717a;
        --text-4: #a1a1aa;
        --accent: #8b5cf6;
        --accent-hover: #7c3aed;
        --accent-soft: #ede9fe;
        --font-sans: "Inter", -apple-system, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }
      button { font-family: inherit; cursor: pointer; background: none; border: none; color: inherit; }
      input, select { font-family: inherit; font-size: inherit; }

      /* ---- Layout ---- */
      .store { min-height: 100vh; display: flex; flex-direction: column; }
      .store-header {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 14px 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }
      .store-brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 600; font-size: 15px;
        color: var(--accent);
      }
      .store-search {
        flex: 1;
        display: flex; align-items: center; gap: 12px;
        max-width: 720px;
      }
      .store-search-input {
        flex: 1;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
        transition: border-color 120ms, box-shadow 120ms;
      }
      .store-search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .store-search-meta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-3);
        white-space: nowrap;
      }

      .store-body {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 32px;
        padding: 28px 24px;
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
      }
      @media (max-width: 760px) {
        .store-body { grid-template-columns: 1fr; }
      }

      /* ---- Facets ---- */
      .store-sidebar { display: flex; flex-direction: column; gap: 20px; }
      .facet-group { display: flex; flex-direction: column; gap: 8px; }
      .facet-title {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
      }
      .facet-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
      .facet-item {
        display: flex; justify-content: space-between; align-items: center;
        width: 100%;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 13px;
        text-transform: capitalize;
        color: var(--text-2);
        transition: background 120ms;
      }
      .facet-item:hover { background: var(--accent-soft); color: var(--text); }
      .facet-item.on {
        background: var(--accent);
        color: #fff;
      }
      .facet-count {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-4);
      }
      .facet-item.on .facet-count { color: rgba(255,255,255,0.8); }

      .store-clear {
        align-self: flex-start;
        padding: 6px 10px;
        font-size: 12px;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 4px;
      }
      .store-clear:hover { background: var(--accent-soft); }

      /* ---- Main grid ---- */
      .store-toolbar {
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 16px;
      }
      .store-active-filters { display: flex; flex-wrap: wrap; gap: 6px; }
      .store-chip {
        padding: 4px 10px;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
        border-radius: 999px;
        font-size: 12px;
        color: var(--accent-hover);
        text-transform: capitalize;
      }
      .store-chip:hover { background: var(--accent); color: #fff; }

      .store-sort {
        display: flex; align-items: center; gap: 8px;
        font-size: 12px; color: var(--text-3);
      }
      .store-sort select {
        padding: 4px 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
      }

      .store-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }

      .product-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        display: flex; flex-direction: column;
        transition: transform 140ms ease, border-color 140ms ease;
      }
      .product-card:hover {
        transform: translateY(-2px);
        border-color: var(--border-2);
      }
      .product-thumb {
        aspect-ratio: 1 / 1;
        display: flex; align-items: center; justify-content: center;
      }
      .product-thumb-initials {
        color: rgba(255, 255, 255, 0.9);
        font-weight: 600;
        font-size: 28px;
        letter-spacing: -0.01em;
      }
      .product-meta {
        padding: 10px 12px 12px;
        display: flex; flex-direction: column; gap: 4px;
      }
      .product-brand {
        font-size: 10.5px;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .product-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        min-height: 34px;
        line-height: 1.3;
      }
      .product-row {
        display: flex; justify-content: space-between;
        font-size: 13px;
        margin-top: 2px;
      }
      .product-price { font-weight: 600; color: var(--text); }
      .product-rating { color: var(--text-3); font-size: 12px; }

      .store-pager {
        display: flex; justify-content: center; align-items: center; gap: 16px;
        margin-top: 28px;
        font-size: 13px;
        color: var(--text-3);
      }
      .store-pager button {
        padding: 6px 14px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text);
      }
      .store-pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
      .store-pager button:disabled { opacity: 0.4; cursor: not-allowed; }

      .store-empty, .store-error {
        padding: 48px 24px;
        text-align: center;
        color: var(--text-3);
        border: 1px dashed var(--border-2);
        border-radius: 8px;
      }

      /* ---- Skeleton ---- */
      .skeleton .product-thumb { background: linear-gradient(90deg, #eee, #f5f5f5, #eee); animation: shimmer 1.4s infinite; background-size: 200% 100%; }
      .skeleton-line {
        height: 10px;
        background: linear-gradient(90deg, #eee, #f5f5f5, #eee);
        background-size: 200% 100%;
        border-radius: 4px;
        animation: shimmer 1.4s infinite;
      }
      .skeleton-line.short { width: 60%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon World3D</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #0a0a0c;
        --bg-1: #141414;
        --bg-2: #1a1a1a;
        --border: #262626;
        --border-2: #323232;
        --text: #f8fafc;
        --text-2: #b8b8c0;
        --text-3: #7a7a82;
        --text-4: #4a4a52;
        --accent: #8b5cf6;
        --danger: #f87171;
        --font-sans: "Inter", -apple-system, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      button { font-family: inherit; cursor: pointer; background: none; border: none; color: inherit; }

      .w3d {
        position: fixed;
        inset: 0;
      }
      .w3d-canvas {
        position: absolute;
        inset: 0;
        display: block;
      }
      .w3d-canvas canvas {
        display: block;
      }

      /* Screen-space name labels above each avatar */
      .w3d-labels {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .w3d-label {
        position: absolute;
        top: 0; left: 0;
        transform: translate(-50%, -50%);
        padding: 3px 8px;
        background: rgba(10, 10, 12, 0.82);
        border: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.02em;
        white-space: nowrap;
        transition: opacity 140ms ease;
      }

      /* HUD */
      .w3d-hud {
        position: absolute;
        background: rgba(20, 20, 20, 0.86);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--border);
        padding: 14px 16px;
        font-family: var(--font-mono);
      }
      .hud-stats {
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 180px;
      }
      .hud-row {
        display: flex; align-items: baseline; gap: 8px;
      }
      .hud-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--text-3);
        min-width: 56px;
      }
      .hud-value {
        font-size: 18px;
        font-weight: 500;
        color: var(--text);
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }
      .hud-unit {
        font-size: 11px;
        color: var(--text-3);
        margin-left: 2px;
      }
      .hud-sub {
        font-size: 11px;
        color: var(--text-3);
      }

      .hud-controls {
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 220px;
      }
      .hud-title {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--accent);
      }
      .hud-btn-row {
        display: flex;
        gap: 6px;
      }
      .hud-btn {
        flex: 1;
        padding: 7px 10px;
        font-size: 11.5px;
        color: var(--text);
        border: 1px solid var(--border-2);
        background: var(--bg-1);
        transition: background 120ms ease, border-color 120ms ease;
      }
      .hud-btn:hover:not(:disabled) {
        background: var(--bg-2);
      }
      .hud-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .hud-btn.danger {
        color: var(--danger);
        border-color: rgba(248, 113, 113, 0.35);
      }
      .hud-btn.danger:hover {
        background: rgba(248, 113, 113, 0.08);
      }
      .hud-hint {
        font-size: 10.5px;
        color: var(--text-4);
        line-height: 1.5;
      }
      .hud-hint b {
        color: var(--text-2);
        font-weight: 500;
      }

      .w3d-brand {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-3);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

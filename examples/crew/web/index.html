<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crew — agent orchestration</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #111119;
        --surface-raised: #17171f;
        --surface-hover: #1d1d27;
        --surface-active: #232330;
        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.12);
        --text: #e8e8ee;
        --text-muted: #a0a0ae;
        --text-dim: #70707c;
        --text-placeholder: #52525c;
        --accent: #c084fc;
        --accent-hover: #d8b4fe;
        --accent-soft: rgba(192, 132, 252, 0.12);
        --accent-strong: #a855f7;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #f59e0b;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 20px -4px rgba(0, 0, 0, 0.5);
        --shadow-lg: 0 24px 50px -12px rgba(0, 0, 0, 0.6);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: "InterVariable", "Inter", system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      input, button, textarea, select {
        font: inherit; color: inherit; background: none; border: none; outline: none;
      }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      ::selection { background: var(--accent-soft); color: var(--text); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.10); border-radius: 6px;
        border: 2px solid transparent; background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

      .app { display: flex; height: 100vh; }
      .sidebar {
        width: 232px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        padding: 14px 10px;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 10px 16px;
      }
      .brand-mark {
        width: 28px; height: 28px; border-radius: 8px;
        background: linear-gradient(135deg, #a855f7, #ec4899);
        display: grid; place-items: center;
        font-size: 15px; font-weight: 700; color: white;
        box-shadow: 0 2px 8px rgba(168, 85, 247, 0.4);
      }
      .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }

      .nav-section {
        padding: 14px 10px 4px;
        font-size: 10.5px; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-dim);
      }
      .nav-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--text-muted);
        border-radius: 6px;
        transition: all 100ms ease;
        gap: 8px;
      }
      .nav-item:hover { background: var(--surface-hover); color: var(--text); }
      .nav-item.active {
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-item-count {
        font-size: 11px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-dim);
        padding: 1px 6px; border-radius: 4px;
      }
      .nav-item.active .nav-item-count {
        background: rgba(192, 132, 252, 0.18);
        color: var(--accent);
      }

      .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
      .topbar {
        display: flex; align-items: center; gap: 14px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .topbar-title { font-weight: 600; font-size: 14px; }
      .topbar-spacer { flex: 1; }
      .topbar-btn {
        padding: 6px 12px;
        border-radius: 6px;
        background: var(--accent);
        color: #1a0d2e;
        font-weight: 600;
        font-size: 12.5px;
        border: 1px solid transparent;
        transition: all 100ms ease;
      }
      .topbar-btn:hover { background: var(--accent-hover); }
      .topbar-btn.secondary {
        background: transparent; color: var(--text-muted);
        border: 1px solid var(--border-strong);
      }
      .topbar-btn.secondary:hover { color: var(--text); border-color: var(--text-muted); }

      .page { flex: 1; overflow-y: auto; padding: 24px 28px; }
      .page-header { margin-bottom: 20px; }
      .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
      .page-sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }
      .card:hover { border-color: var(--border-strong); }

      .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
      .agent-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
        cursor: pointer;
        transition: all 120ms ease;
      }
      .agent-card:hover { border-color: var(--accent); transform: translateY(-1px); }
      .agent-emoji { font-size: 28px; margin-bottom: 10px; }
      .agent-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
      .agent-role { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; }
      .agent-model {
        font-size: 11px; color: var(--text-dim);
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }

      .runs-list { display: flex; flex-direction: column; gap: 2px; }
      .run-row {
        display: grid;
        grid-template-columns: 16px 1fr 160px 120px 80px;
        gap: 14px;
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        align-items: center;
      }
      .run-row:hover { background: var(--surface-hover); }
      .run-row.active { background: var(--surface-active); }
      .run-title { font-weight: 500; color: var(--text); }
      .run-target { color: var(--text-muted); font-size: 12.5px; }
      .run-time { color: var(--text-dim); font-size: 12px; }
      .run-status {
        font-size: 11.5px; text-align: right;
        padding: 2px 8px; border-radius: 10px;
      }
      .run-status.queued { background: rgba(245, 158, 11, 0.12); color: var(--warning); }
      .run-status.running { background: rgba(192, 132, 252, 0.14); color: var(--accent); }
      .run-status.completed { background: rgba(34, 197, 94, 0.12); color: var(--success); }
      .run-status.failed { background: rgba(239, 68, 68, 0.14); color: var(--danger); }
      .run-status.cancelled { background: rgba(160, 160, 174, 0.14); color: var(--text-muted); }

      .run-dot {
        width: 10px; height: 10px; border-radius: 50%;
      }
      .run-dot.queued { background: var(--warning); }
      .run-dot.running { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); animation: pulse 1.6s infinite; }
      .run-dot.completed { background: var(--success); }
      .run-dot.failed { background: var(--danger); }
      .run-dot.cancelled { background: var(--text-dim); }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }

      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
        display: grid; place-items: center;
        z-index: 1000;
      }
      .modal {
        width: min(560px, 92vw);
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        padding: 24px;
        box-shadow: var(--shadow-lg);
      }
      .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
      .modal-sub { color: var(--text-muted); font-size: 12.5px; margin-bottom: 18px; }

      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      .field-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
      .field-input, .field-textarea {
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        transition: border 100ms ease;
      }
      .field-input:focus, .field-textarea:focus { border-color: var(--accent); background: var(--bg); }
      .field-textarea { resize: vertical; min-height: 72px; font-family: inherit; }

      .btn-primary {
        padding: 8px 14px; border-radius: 6px;
        background: var(--accent); color: #1a0d2e;
        font-weight: 600; font-size: 13px;
      }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-secondary {
        padding: 8px 14px; border-radius: 6px;
        color: var(--text-muted);
        border: 1px solid var(--border-strong);
        font-size: 13px;
      }
      .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

      .split-screen { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
      .auth-panel {
        display: flex; flex-direction: column; justify-content: center;
        padding: 60px;
        background: var(--surface);
        border-right: 1px solid var(--border);
      }
      .auth-panel-aside {
        background: radial-gradient(circle at 30% 30%, #7c3aed 0%, #0a0a0f 60%);
        display: flex; flex-direction: column; justify-content: center;
        padding: 60px;
      }
      .aside-heading {
        font-size: 38px; font-weight: 700; letter-spacing: -0.02em;
        line-height: 1.1; margin-bottom: 12px;
      }
      .aside-sub { color: rgba(255, 255, 255, 0.7); font-size: 15px; line-height: 1.5; max-width: 360px; }

      .transcript {
        display: flex; flex-direction: column; gap: 10px;
        padding: 20px 22px;
      }
      .msg { display: flex; gap: 12px; }
      .msg-avatar {
        width: 28px; height: 28px; border-radius: 50%;
        display: grid; place-items: center;
        font-size: 13px; font-weight: 600;
        flex-shrink: 0;
      }
      .msg-avatar.user { background: var(--surface-active); color: var(--text); }
      .msg-avatar.assistant {
        background: linear-gradient(135deg, #a855f7, #ec4899);
        color: white;
      }
      .msg-body {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        line-height: 1.55;
        font-size: 13px;
      }
      .msg-role {
        font-size: 11px; color: var(--text-dim);
        font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
        margin-bottom: 4px;
      }
      .msg-content { white-space: pre-wrap; word-break: break-word; }

      .cursor-blink {
        display: inline-block;
        width: 7px; height: 1.05em;
        background: var(--accent);
        vertical-align: text-bottom;
        animation: blink 1s infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }

      .empty {
        text-align: center;
        padding: 60px 40px;
        color: var(--text-muted);
      }
      .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
      .empty-sub { font-size: 13px; margin-bottom: 18px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

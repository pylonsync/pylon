<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pylon Forge</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #0d0d12;
        --bg-1: #141419;
        --bg-2: #1a1a21;
        --bg-3: #22222a;
        --border: #262632;
        --border-2: #323240;
        --text: #f8fafc;
        --text-2: #b8b8c0;
        --text-3: #7a7a82;
        --text-4: #4a4a52;
        --accent: #8b5cf6;
        --accent-hover: #a78bfa;
        --ok: #4ade80;
        --danger: #f87171;
        --font-sans: "Inter", -apple-system, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13.5px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      button { font-family: inherit; cursor: pointer; background: none; border: none; color: inherit; }

      .fg { position: fixed; inset: 0; }
      .fg-canvas {
        position: absolute; inset: 0;
        cursor: crosshair;
      }
      .fg-canvas canvas { display: block; }

      /* Presence cursor layer */
      .fg-cursors {
        position: absolute; inset: 0;
        pointer-events: none;
      }
      .fg-cursor-label {
        position: absolute;
        top: 0; left: 0;
        padding: 2px 7px;
        background: rgba(13, 13, 18, 0.88);
        border: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 10.5px;
        font-weight: 500;
        white-space: nowrap;
        transform-origin: top left;
      }

      /* Top toolbar */
      .fg-top-toolbar {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: rgba(20, 20, 26, 0.9);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid var(--border);
        font-family: var(--font-mono);
      }
      .fg-brand {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 0 10px 0 6px;
        border-right: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-2);
        height: 28px;
      }
      .fg-toolgroup {
        display: inline-flex;
        gap: 2px;
      }
      .fg-toolgroup.fg-right {
        padding-left: 10px;
        border-left: 1px solid var(--border);
      }
      .fg-tool-btn {
        padding: 6px 12px;
        font-size: 12px;
        color: var(--text-2);
        background: transparent;
        transition: color 120ms, background 120ms;
        border-radius: 3px;
      }
      .fg-tool-btn:hover {
        color: var(--text);
        background: var(--bg-2);
      }
      .fg-tool-btn.danger {
        color: var(--danger);
      }
      .fg-tool-btn.danger:hover {
        background: rgba(248, 113, 113, 0.1);
      }
      .fg-presence {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 10px;
        font-size: 11.5px;
        color: var(--text-2);
      }
      .fg-presence-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--ok);
        box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.18);
      }

      /* Inspector — shown for the selected primitive */
      .fg-inspector {
        position: absolute;
        top: 78px;
        right: 20px;
        width: 240px;
        background: rgba(20, 20, 26, 0.92);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--border);
        padding: 16px;
        font-family: var(--font-mono);
      }
      .fg-insp-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13px;
        margin-bottom: 14px;
      }
      .fg-insp-kind {
        color: var(--text);
        font-weight: 500;
        text-transform: capitalize;
      }
      .fg-insp-id {
        color: var(--text-4);
        font-size: 10.5px;
      }
      .fg-insp-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      .fg-insp-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--text-3);
      }
      .fg-insp-value {
        font-size: 12px;
        color: var(--text-2);
        font-variant-numeric: tabular-nums;
      }
      .fg-swatches {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
      }
      .fg-swatch {
        width: 100%;
        aspect-ratio: 1;
        border: 2px solid transparent;
        transition: transform 120ms, border-color 120ms;
      }
      .fg-swatch:hover { transform: scale(1.08); }
      .fg-swatch.on { border-color: var(--accent); }
      .fg-insp-hint {
        margin-top: 4px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 10.5px;
        color: var(--text-4);
      }
      .fg-insp-hint b {
        color: var(--text-2);
        font-weight: 500;
      }

      /* Bottom hint strip */
      .fg-hint-strip {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 22px;
        padding: 8px 16px;
        background: rgba(20, 20, 26, 0.82);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-3);
      }
      .fg-hint-strip b { color: var(--text-2); font-weight: 500; }

      /* Tool palette — terrain sculpt/paint */
      .fg-tool-palette {
        position: absolute;
        top: 70px;
        left: 20px;
        width: 220px;
        padding: 12px;
        background: rgba(20, 20, 26, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .fg-palette-title {
        font-family: var(--font-mono);
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent, #8b5cf6);
      }
      .fg-palette-tools {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
      }
      .fg-palette-btn {
        padding: 6px 4px;
        font-size: 11.5px;
        color: var(--text-2);
        background: var(--bg-2, #1a1a22);
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: inherit;
        transition: background 100ms, color 100ms, border-color 100ms;
      }
      .fg-palette-btn:hover { color: var(--text); background: var(--bg-3, #22222c); }
      .fg-palette-btn.on {
        background: var(--accent, #8b5cf6);
        color: #fff;
        border-color: var(--accent, #8b5cf6);
      }
      .fg-palette-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-3);
      }
      .fg-palette-label {
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        min-width: 48px;
      }
      .fg-palette-row input[type="range"] { flex: 1; accent-color: var(--accent, #8b5cf6); }
      .fg-palette-value {
        font-family: var(--font-mono);
        color: var(--text);
        min-width: 32px;
        text-align: right;
      }
      .fg-palette-layers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        flex: 1;
      }
      .fg-palette-layer {
        padding: 6px 8px;
        font-size: 10.5px;
        color: #0a0a0c;
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        opacity: 0.55;
        transition: opacity 100ms, border-color 100ms;
      }
      .fg-palette-layer:hover { opacity: 0.85; }
      .fg-palette-layer.on {
        opacity: 1;
        border-color: var(--accent, #8b5cf6);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

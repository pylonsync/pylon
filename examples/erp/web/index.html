<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dallas Door Designs — Projects</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #f7f8fa;
        --surface: #ffffff;
        --surface-raised: #fdfdfe;
        --surface-hover: #f3f4f7;
        --surface-active: #eceef3;
        --border: rgba(15, 23, 42, 0.08);
        --border-strong: rgba(15, 23, 42, 0.14);
        --border-focus: rgba(99, 102, 241, 0.5);
        --text: #0f172a;
        --text-muted: #52525b;
        --text-dim: #94a3b8;
        --text-placeholder: #a1a1aa;
        --accent: #4f46e5;
        --accent-hover: #6366f1;
        --accent-soft: rgba(79, 70, 229, 0.1);
        --accent-glow: rgba(79, 70, 229, 0.25);
        --success: #059669;
        --success-soft: rgba(5, 150, 105, 0.12);
        --warning: #d97706;
        --warning-soft: rgba(217, 119, 6, 0.12);
        --danger: #dc2626;
        --danger-soft: rgba(220, 38, 38, 0.12);
        --info: #0284c7;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 14px -2px rgba(15, 23, 42, 0.10);
        --shadow-lg: 0 20px 50px -12px rgba(15, 23, 42, 0.20);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: "InterVariable", "Inter", -apple-system, BlinkMacSystemFont,
          system-ui, sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv11", "ss01", "ss03";
      }
      input, button, textarea, select {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        outline: none;
      }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      ::selection { background: var(--accent-soft); color: var(--text); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: rgba(15, 23, 42, 0.12);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.20); }
      ::-webkit-scrollbar-track { background: transparent; }

      /* App shell */
      .app { display: flex; flex-direction: column; height: 100vh; }
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: -0.02em;
        font-size: 15px;
      }
      .brand-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
        box-shadow: 0 4px 14px -4px var(--accent-glow);
      }
      .body { flex: 1; display: flex; min-height: 0; }
      .nav {
        width: 220px;
        padding: 16px 10px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-section {
        padding: 14px 10px 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        font-size: 13.5px;
        color: var(--text-muted);
        border-radius: 7px;
        transition: background 100ms ease, color 100ms ease;
        cursor: pointer;
      }
      .nav-item:hover { background: var(--surface-hover); color: var(--text); }
      .nav-item.active {
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-item svg { flex-shrink: 0; }
      .main { flex: 1; overflow-y: auto; padding: 24px 32px; min-width: 0; }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 20px;
        gap: 12px;
      }
      .page-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.015em;
      }
      .page-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 7px;
        transition: background 120ms ease, border-color 120ms ease,
          transform 80ms ease;
      }
      .btn-primary {
        color: white;
        background: var(--accent);
        box-shadow: var(--shadow-sm);
      }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
      .btn-primary:active:not(:disabled) { transform: translateY(1px); }
      .btn-secondary {
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover:not(:disabled) {
        background: var(--surface-hover);
        border-color: var(--border-strong);
      }
      .btn-ghost {
        color: var(--text-muted);
        background: transparent;
      }
      .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
      .btn-danger {
        color: var(--danger);
        background: var(--danger-soft);
      }
      .btn-danger:hover:not(:disabled) {
        background: rgba(220, 38, 38, 0.18);
      }

      /* Inputs */
      .field { display: block; margin-bottom: 12px; }
      .field-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 5px;
      }
      .input, .select, .textarea {
        width: 100%;
        padding: 8px 10px;
        font-size: 14px;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }
      .input:hover, .select:hover, .textarea:hover {
        border-color: var(--border-strong);
      }
      .input:focus, .select:focus, .textarea:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .input::placeholder, .textarea::placeholder {
        color: var(--text-placeholder);
      }
      .textarea { resize: vertical; min-height: 70px; }

      /* Cards */
      .card {
        padding: 18px 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
      }

      /* Tables */
      .table {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        border-collapse: separate;
        border-spacing: 0;
      }
      .table th {
        text-align: left;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        background: var(--surface-hover);
        border-bottom: 1px solid var(--border);
      }
      .table td {
        padding: 12px 14px;
        font-size: 13.5px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .table tr:last-child td { border-bottom: none; }
      .table tr:hover td { background: var(--surface-hover); }

      /* Filter bar — Attio/Linear style chips */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 8px;
        margin-bottom: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .filter-search {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        flex: 1;
        min-width: 200px;
      }
      .filter-search input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font-size: 13px;
        color: var(--text);
        padding: 6px 0;
      }
      .filter-search input::placeholder {
        color: var(--text-placeholder);
      }
      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 0;
        font-size: 12px;
        background: var(--surface-hover);
        border: 1px solid var(--border);
        border-radius: 7px;
        overflow: hidden;
        transition: border-color 100ms ease;
      }
      .filter-chip:hover {
        border-color: var(--border-strong);
      }
      .filter-chip-seg {
        padding: 5px 8px;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 80ms ease, color 80ms ease;
      }
      .filter-chip-seg:hover {
        background: var(--surface-active);
      }
      .filter-chip-seg.key {
        color: var(--text);
        font-weight: 500;
        border-right: 1px solid var(--border);
      }
      .filter-chip-seg.op {
        color: var(--text-dim);
        font-style: italic;
        font-size: 11.5px;
        border-right: 1px solid var(--border);
      }
      .filter-chip-seg.val {
        color: var(--accent);
        font-weight: 500;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .filter-chip-remove {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        color: var(--text-dim);
        transition: color 80ms ease, background 80ms ease;
      }
      .filter-chip-remove:hover {
        color: var(--danger);
        background: var(--danger-soft);
      }
      .filter-add {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        font-size: 12px;
        color: var(--text-muted);
        background: transparent;
        border: 1px dashed var(--border-strong);
        border-radius: 7px;
        transition: background 100ms ease, color 100ms ease,
          border-color 100ms ease, border-style 100ms ease;
      }
      .filter-add:hover {
        color: var(--text);
        background: var(--surface-hover);
        border-style: solid;
      }

      /* Dropdown used by filter editors */
      .dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        min-width: 200px;
        max-height: 320px;
        overflow-y: auto;
        padding: 4px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow-lg);
        z-index: 40;
        animation: fadeIn 80ms ease-out;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
        transition: background 80ms ease;
      }
      .dropdown-item:hover {
        background: var(--surface-hover);
      }
      .dropdown-item.selected {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .dropdown-section {
        padding: 6px 10px 2px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .dropdown-input {
        display: block;
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        color: var(--text);
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin: 4px 0;
      }
      .dropdown-input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      /* Pills */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 9px;
        font-size: 11.5px;
        font-weight: 500;
        border-radius: 999px;
      }
      .pill-gray { background: var(--surface-active); color: var(--text-muted); }
      .pill-accent { background: var(--accent-soft); color: var(--accent); }
      .pill-success { background: var(--success-soft); color: var(--success); }
      .pill-warning { background: var(--warning-soft); color: var(--warning); }
      .pill-danger { background: var(--danger-soft); color: var(--danger); }

      .pill-dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: currentColor;
      }

      /* Empty state */
      .empty {
        padding: 48px 20px;
        text-align: center;
        color: var(--text-muted);
        border: 1px dashed var(--border-strong);
        border-radius: 12px;
        background: var(--surface);
      }
      .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
      .empty-body { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }

      /* Top bar bits */
      .org-switcher {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 500;
        background: var(--surface-hover);
        border: 1px solid var(--border);
        border-radius: 7px;
        transition: background 120ms ease;
      }
      .org-switcher:hover { background: var(--surface-active); }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px 4px 4px;
        background: var(--surface-hover);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 13px;
      }
      .user-chip:hover { background: var(--surface-active); }

      .avatar {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border-radius: 999px;
        font-weight: 600;
        color: rgba(0, 0, 0, 0.78);
        letter-spacing: 0.02em;
      }
      .avatar-xs { width: 22px; height: 22px; font-size: 10px; }
      .avatar-sm { width: 28px; height: 28px; font-size: 11px; }
      .avatar-md { width: 36px; height: 36px; font-size: 13px; }

      .spacer { flex: 1; }

      /* Org presence — stacked avatar chip */
      .presence-stack {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px 3px 4px;
        background: var(--surface-hover);
        border: 1px solid var(--border);
        border-radius: 999px;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .presence-stack:hover {
        background: var(--surface-active);
        border-color: var(--border-strong);
      }
      .presence-stack-avatars {
        display: flex;
      }
      .presence-stack-avatars .avatar {
        border: 2px solid var(--surface);
        box-sizing: content-box;
      }
      .presence-stack-avatars .avatar + .avatar {
        margin-left: -10px;
      }
      .presence-more {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        margin-left: -10px;
        border: 2px solid var(--surface);
        border-radius: 999px;
        background: var(--surface-active);
        color: var(--text-muted);
        font-size: 10px;
        font-weight: 600;
      }
      .presence-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        margin-left: 6px;
      }

      /* Login / onboarding */
      .split-screen {
        display: flex;
        height: 100vh;
        background: radial-gradient(
          ellipse 70% 50% at 100% 0%,
          rgba(79, 70, 229, 0.10),
          transparent 70%
        ), var(--bg);
      }
      .auth-panel {
        width: 420px;
        margin: auto;
        padding: 40px 36px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
      }
      .auth-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.015em;
        margin-bottom: 4px;
      }
      .auth-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 20px;
      }

      /* Modal */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        animation: fadeIn 100ms ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .modal {
        width: 460px;
        max-width: calc(100vw - 32px);
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        padding: 20px 22px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow-lg);
      }
      .modal-title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }
      .modal-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 14px;
      }
      .modal-body {
        overflow-y: auto;
        margin: 0 -4px;
        padding: 0 4px;
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding-top: 14px;
        margin-top: 6px;
        border-top: 1px solid var(--border);
      }

      /* Grid layouts */
      .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

      /* KPI cards */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .kpi {
        padding: 16px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .kpi-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .kpi-value {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-top: 4px;
        font-variant-numeric: tabular-nums;
      }
      .kpi-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Popover / dropdown */
      .popover {
        position: absolute;
        top: calc(100% + 6px);
        min-width: 220px;
        max-height: 360px;
        overflow-y: auto;
        padding: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: var(--shadow-lg);
        z-index: 30;
        animation: fadeIn 100ms ease-out;
      }
      .popover-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        border-radius: 7px;
        font-size: 13.5px;
        cursor: pointer;
        transition: background 80ms ease;
      }
      .popover-item:hover { background: var(--surface-hover); }
      .popover-item.selected { background: var(--accent-soft); color: var(--accent); }
      .popover-section {
        padding: 8px 10px 4px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .popover-wrap { position: relative; }

      .banner {
        padding: 10px 14px;
        margin-bottom: 16px;
        border-radius: 10px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
      }
      .banner-info {
        background: rgba(2, 132, 199, 0.07);
        border-color: rgba(2, 132, 199, 0.25);
        color: var(--info);
      }

      .error-text {
        color: var(--danger);
        font-size: 12px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

[workspace]
members = [
  "crates/action",
  "crates/auth",
  "crates/cli",
  "crates/core",
  "crates/policy",
  "crates/query",
  "crates/runtime",
  "crates/schema",
  "crates/staticgen",
  "crates/storage",
  "crates/studio_api",
  "crates/sync",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.lints.rust]
unused_crate_dependencies = "warn"

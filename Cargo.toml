[workspace]
members = [
  "crates/action",
  "crates/auth",
  "crates/cli",
  "crates/core",
  "crates/plugin",
  "crates/policy",
  "crates/query",
  "crates/runtime",
  "crates/schema",
  "crates/staticgen",
  "crates/storage",
  "crates/studio_api",
  "crates/sync",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.35", features = ["bundled"] }
tiny_http = "0.12"
postgres = "0.19"
tungstenite = "0.24"
hmac = "0.12"
sha2 = "0.10"
sha1 = "0.10"
rand = "0.8"
argon2 = "0.5"

[workspace.lints.rust]
unused_crate_dependencies = "warn"

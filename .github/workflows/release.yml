name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

# Workflow-level default. Individual jobs can narrow, but starting permissive
# here means every job gets the tokens it actually needs (contents for
# github releases, packages for ghcr, id-token for npm provenance + OIDC).
permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------
  # Sanity check: every published artifact must agree on the version.
  # Runs before anything mutates a registry.
  # ---------------------------------------------------------------
  verify:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          CARGO_V="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [[ "$CARGO_V" != "$TAG" ]]; then
            echo "::error::Cargo.toml workspace version $CARGO_V != tag $TAG"
            exit 1
          fi

          for pkg in packages/sdk packages/functions packages/react packages/sync packages/next; do
            if [[ -f "$pkg/package.json" ]]; then
              PKG_V="$(node -p "require('./$pkg/package.json').version")"
              if [[ "$PKG_V" != "$TAG" ]]; then
                echo "::error::$pkg/package.json version $PKG_V != tag $TAG"
                exit 1
              fi
            fi
          done

  # ---------------------------------------------------------------
  # npm publish. Idempotent: skips a package if that version is
  # already on npm (lets us re-run the workflow without drama).
  # ---------------------------------------------------------------
  publish-npm:
    name: Publish npm packages
    needs: verify
    runs-on: ubuntu-latest
    # NPM_TOKEN lives under the `Production` environment (not as a
    # repository secret). Declaring the environment here is what grants
    # this job access. Same story for publish-crates below.
    environment: Production
    permissions:
      contents: read
      id-token: write        # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin to the same version the repo declares in package.json's
          # `packageManager`. `latest` upgraded to 1.3.x mid-cycle and
          # broke .npmrc env-var expansion → `bun publish` started
          # failing with "missing authentication" even though
          # NODE_AUTH_TOKEN was set. Pin tracks `packageManager`.
          bun-version: "1.2.19"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Publish @pylonsync/* (skip-if-exists)
        # `bun publish` (not `npm publish`) is required: bun rewrites
        # `workspace:*` deps to the concrete sibling version at publish
        # time. npm publish ships them as-is, which produces broken
        # tarballs (npm install would try to resolve `workspace:*` and
        # fail).
        #
        # Auth: we write .npmrc into the repo root with the literal
        # token baked in. Earlier this step let actions/setup-node
        # write a temp .npmrc using ${NODE_AUTH_TOKEN} interpolation —
        # bun's discovery walks up from cwd, doesn't honor
        # $npm_config_userconfig the way npm does, so the temp file
        # was invisible after `cd $pkg`. Writing at the repo root
        # makes it discoverable from every package subdir.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # See note above on provenance — sigstore rejects bundles
          # referencing a private source repo. Flip to "true" once
          # pylonsync/pylon goes public.
          NPM_CONFIG_PROVENANCE: "false"
        shell: bash
        run: |
          set -euo pipefail

          # Sanity: prove the env binding is working before we touch
          # the registry. An empty NPM_TOKEN is the most common cause
          # of "missing authentication" — this fails loudly so the
          # cause shows up in the run summary instead of being buried.
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is empty in this job — the Production environment is not injecting it. Verify Settings → Environments → Production → Environment secrets contains NPM_TOKEN, and that the deployment branch/tag rules allow this ref." >&2
            exit 2
          fi
          echo "→ NPM_TOKEN length: ${#NPM_TOKEN}"

          # Write .npmrc with the literal token (no env-var ref). bun
          # discovers .npmrc by walking up from cwd, so a file at
          # the repo root is visible from every packages/* subdir.
          printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\nalways-auth=true\n' "$NPM_TOKEN" > .npmrc
          # Defense in depth: gitignore the file in this run so a
          # future `git add -A` somewhere can't accidentally commit it.
          echo ".npmrc" >> .gitignore

          # Prove npm itself accepts the token before bun gets a turn.
          # If this errors, the token is rejected by the registry —
          # regenerate at npmjs.com.
          npm whoami --registry=https://registry.npmjs.org

          # ---------------------------------------------------------------
          # Preflight: ensure every package about to be published declares
          # the SAME version. `bun publish` rewrites `workspace:*` deps to
          # whatever the local workspace version is at publish time. If
          # versions drift across packages (e.g. a half-finished release.sh
          # run leaves react@0.2.13 with sdk still at 0.2.12), each
          # publish ships internally-consistent metadata but the resulting
          # graph on npm becomes unsatisfiable: react@0.2.13 will pin
          # sdk@0.2.12 even though we're about to publish sdk@0.2.13.
          # Real-world bug we hit: 0.2.12 react/next published with
          # sdk/sync@0.2.7 deps that never existed on npm. This check
          # catches that BEFORE any package gets published, so the release
          # tag can be reverted and re-cut without leaving the registry
          # in a broken half-published state.
          PYLON_PKGS=(packages/sdk packages/sync packages/functions packages/react packages/next)
          REFERENCE_VERSION=""
          for pkg in "${PYLON_PKGS[@]}"; do
            [[ -f "$pkg/package.json" ]] || continue
            v="$(node -p "require('./$pkg/package.json').version")"
            if [[ -z "$REFERENCE_VERSION" ]]; then
              REFERENCE_VERSION="$v"
              echo "→ reference version: $REFERENCE_VERSION (from $pkg)"
            elif [[ "$v" != "$REFERENCE_VERSION" ]]; then
              echo "::error::Version mismatch in @pylonsync/* workspace: $pkg has $v, expected $REFERENCE_VERSION (matches $(echo ${PYLON_PKGS[0]})). Run ./release.sh <version> to bump everything in lockstep, then re-tag." >&2
              exit 3
            fi
          done

          # Also assert each rewritten dep would be satisfiable. We do
          # this by parsing the local package.json and confirming every
          # `@pylonsync/*` dep uses `workspace:*` (which bun rewrites to
          # REFERENCE_VERSION) — a literal version pin here would mean
          # someone bypassed the workspace protocol and we can't promise
          # the rewrite will land somewhere coherent.
          for pkg in "${PYLON_PKGS[@]}"; do
            [[ -f "$pkg/package.json" ]] || continue
            bad="$(node -e "
              const p = require('./$pkg/package.json');
              const all = { ...(p.dependencies||{}), ...(p.peerDependencies||{}) };
              for (const [k, v] of Object.entries(all)) {
                if (k.startsWith('@pylonsync/') && v !== 'workspace:*') {
                  console.log(\`\${k}=\${v}\`);
                }
              }
            ")"
            if [[ -n "$bad" ]]; then
              echo "::error::$pkg has non-workspace @pylonsync/* dep(s): $bad. Use \"workspace:*\" so bun's publish-time rewrite pins to the right version." >&2
              exit 4
            fi
          done

          # sync first: its siblings depend on it via workspace:*, so
          # the rewrite during their publish needs sync's published
          # version range to be queryable. (Bun rewrites to the local
          # workspace version regardless, but ordering by topology
          # keeps the registry consistent for anyone watching.)
          for pkg in "${PYLON_PKGS[@]}"; do
            [[ -f "$pkg/package.json" ]] || continue
            NAME="$(node -p "require('./$pkg/package.json').name")"
            VERSION="$(node -p "require('./$pkg/package.json').version")"
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "✓ $NAME@$VERSION already published — skipping"
            else
              echo "→ Publishing $NAME@$VERSION"
              (cd "$pkg" && bun publish --access public)
            fi
          done

          # Postflight: dry-resolve the published graph by trying to install
          # @pylonsync/react in a temp dir. If bun can't satisfy the deps,
          # we just produced another broken release — fail loudly so the
          # tag can be yanked before users hit it.
          POSTFLIGHT_DIR="$(mktemp -d)"
          (
            cd "$POSTFLIGHT_DIR"
            cat > package.json <<EOF
          {
            "name": "pylon-postflight-check",
            "private": true,
            "dependencies": { "@pylonsync/react": "$REFERENCE_VERSION" }
          }
          EOF
            if ! bun install --no-save 2>&1 | tee install.log; then
              echo "::error::Postflight: bun install of @pylonsync/react@$REFERENCE_VERSION FAILED. The graph published this run is unsatisfiable for end users. Investigate before announcing the release; consider yanking these versions." >&2
              cat install.log >&2
              exit 5
            fi
          )
          rm -rf "$POSTFLIGHT_DIR"

          rm -f .npmrc

  # ---------------------------------------------------------------
  # crates.io publish. katyo/publish-crates walks the workspace,
  # sorts topologically, skips unchanged crates, honors publish=false.
  # ---------------------------------------------------------------
  publish-crates:
    name: Publish crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `pylon-studio-api`'s build.rs requires `web/dist/index.html` to
      # exist (the Studio UI bundle). dist/ is gitignored, so CI must
      # build it before any cargo step runs. Without this, the entire
      # workspace fails to compile.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - name: Build Studio UI bundle
        working-directory: crates/studio_api/web
        run: bun install --frozen-lockfile && bun run build
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true
          check-repo: false

  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      # `pylon-studio-api`'s build.rs requires `web/dist/index.html` to
      # exist. Build the Studio UI bundle before cargo runs.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - name: Build Studio UI bundle
        working-directory: crates/studio_api/web
        shell: bash
        run: bun install --frozen-lockfile && bun run build
      - name: Build
        run: cargo build --release --locked --bin pylon --target ${{ matrix.target }}
      # Artifact names must match what install.sh and Formula/pylon.rb
      # expect: pylon-${TAG}-${TARGET}.{tar.gz,zip}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pylon
      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pylon-${{ github.ref_name }}-${{ matrix.target }}.zip pylon.exe
      - name: Compute SHA256 (unix)
        if: matrix.archive == 'tar.gz' && runner.os == 'Linux'
        run: |
          sha256sum pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - name: Compute SHA256 (macOS)
        if: matrix.archive == 'tar.gz' && runner.os == 'macOS'
        run: |
          shasum -a 256 pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      # Publish to the private source repo (so internal tooling, the
      # release-please flow, and crates/npm jobs all observe the same tag).
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pylon-${{ github.ref_name }}-${{ matrix.target }}.*
      # Mirror the same artifacts to the public release repo. This is the
      # download surface install.sh and the Homebrew formula point at — keeps
      # binaries reachable while the source repo is still private. Append-only
      # against an existing release tag (idempotent across matrix jobs).
      - name: Publish to public release repo
        uses: softprops/action-gh-release@v2
        with:
          repository: pylonsync/pylon-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            pylon-${{ github.ref_name }}-${{ matrix.target }}.*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/pylon
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Single-platform for now. linux/arm64 via QEMU emulation
          # quadruples the build time (45+ min cold, painful even
          # warm) and we have no native arm64 runners. Add it back
          # once we either: (a) introduce a separate arm64 build job
          # on a GitHub-hosted ARM runner, or (b) accept the wait
          # and queue parallel jobs by platform via matrix.
          platforms: linux/amd64
          # GHA cache backend persists buildx layers across runs so
          # the cargo dep tree (~80% of build time) doesn't recompile
          # unless Cargo.lock actually changed. mode=max preserves
          # intermediate layers, not just the final image — saves
          # the rust-builder stage's deps cache too.
          cache-from: type=gha
          cache-to: type=gha,mode=max

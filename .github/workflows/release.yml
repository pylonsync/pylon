name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

# Workflow-level default. Individual jobs can narrow, but starting permissive
# here means every job gets the tokens it actually needs (contents for
# github releases, packages for ghcr, id-token for npm provenance + OIDC).
permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------
  # Sanity check: every published artifact must agree on the version.
  # Runs before anything mutates a registry.
  # ---------------------------------------------------------------
  verify:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          CARGO_V="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [[ "$CARGO_V" != "$TAG" ]]; then
            echo "::error::Cargo.toml workspace version $CARGO_V != tag $TAG"
            exit 1
          fi

          for pkg in packages/sdk packages/functions packages/react packages/sync; do
            if [[ -f "$pkg/package.json" ]]; then
              PKG_V="$(node -p "require('./$pkg/package.json').version")"
              if [[ "$PKG_V" != "$TAG" ]]; then
                echo "::error::$pkg/package.json version $PKG_V != tag $TAG"
                exit 1
              fi
            fi
          done

  # ---------------------------------------------------------------
  # npm publish. Idempotent: skips a package if that version is
  # already on npm (lets us re-run the workflow without drama).
  # ---------------------------------------------------------------
  publish-npm:
    name: Publish npm packages
    needs: verify
    runs-on: ubuntu-latest
    # NPM_TOKEN lives under the `Production` environment (not as a
    # repository secret). Declaring the environment here is what grants
    # this job access. Same story for publish-crates below.
    environment: Production
    permissions:
      contents: read
      id-token: write        # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Publish @pylonsync/* (skip-if-exists)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for pkg in packages/sdk packages/functions packages/react packages/sync; do
            [[ -f "$pkg/package.json" ]] || continue
            NAME="$(node -p "require('./$pkg/package.json').name")"
            VERSION="$(node -p "require('./$pkg/package.json').version")"
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "✓ $NAME@$VERSION already published — skipping"
            else
              echo "→ Publishing $NAME@$VERSION"
              (cd "$pkg" && npm publish --access public --provenance)
            fi
          done

  # ---------------------------------------------------------------
  # crates.io publish. katyo/publish-crates walks the workspace,
  # sorts topologically, skips unchanged crates, honors publish=false.
  # ---------------------------------------------------------------
  publish-crates:
    name: Publish crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true
          check-repo: false

  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Build
        run: cargo build --release --locked --bin pylon --target ${{ matrix.target }}
      # Artifact names must match what install.sh and Formula/pylon.rb
      # expect: pylon-${TAG}-${TARGET}.{tar.gz,zip}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pylon
      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pylon-${{ github.ref_name }}-${{ matrix.target }}.zip pylon.exe
      - name: Compute SHA256 (unix)
        if: matrix.archive == 'tar.gz' && runner.os == 'Linux'
        run: |
          sha256sum pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - name: Compute SHA256 (macOS)
        if: matrix.archive == 'tar.gz' && runner.os == 'macOS'
        run: |
          shasum -a 256 pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > pylon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pylon-${{ github.ref_name }}-${{ matrix.target }}.*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/pylon
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

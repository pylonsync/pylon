name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Build
        run: cargo build --release --locked --bin statecraft --target ${{ matrix.target }}
      # Artifact names must match what install.sh and Formula/statecraft.rb
      # expect: statecraft-${TAG}-${TARGET}.{tar.gz,zip}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../statecraft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz statecraft
      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../statecraft-${{ github.ref_name }}-${{ matrix.target }}.zip statecraft.exe
      - name: Compute SHA256 (unix)
        if: matrix.archive == 'tar.gz' && runner.os == 'Linux'
        run: |
          sha256sum statecraft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > statecraft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - name: Compute SHA256 (macOS)
        if: matrix.archive == 'tar.gz' && runner.os == 'macOS'
        run: |
          shasum -a 256 statecraft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > statecraft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            statecraft-${{ github.ref_name }}-${{ matrix.target }}.*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/statecraft
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

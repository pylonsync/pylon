version.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
pylon-kernel = { path = "../core" }
pylon-http = { path = "../http" }
pylon-router = { path = "../router" }
pylon-auth = { path = "../auth" }
pylon-policy = { path = "../policy" }
pylon-plugin = { path = "../plugin" }
pylon-sync = { path = "../sync" }
pylon-studio-api = { path = "../studio_api" }

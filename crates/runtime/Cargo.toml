pylon-functions = { path = "../functions" }
pylon-migrate = { path = "../migrate" }
pylon-observability = { path = "../observability" }
pylon-realtime = { path = "../realtime" }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tiny_http = { workspace = true }

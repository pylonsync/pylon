[package]
name = "statecraft-cli"
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "statecraft"
path = "src/main.rs"

[dependencies]
statecraft-core = { path = "../core" }
statecraft-plugin = { path = "../plugin" }
statecraft-schema = { path = "../schema" }
statecraft-storage = { path = "../storage", features = ["postgres-live"] }
statecraft-runtime = { path = "../runtime" }
statecraft-staticgen = { path = "../staticgen" }
statecraft-migrate = { path = "../migrate" }
rusqlite = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

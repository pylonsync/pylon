 /posts/:slug) are skipped\n/// since they need runtime data to enumerate.\npub fn generate_static_pages(manifest: \u0026AppManifest) -\u003e Vec\u003cStaticPage\u003e {\n    let mut pages = Vec::new();\n\n    for route in \u0026manifest.routes {\n        if route.mode != \"static\" {\n            continue;\n        }\n\n        // Skip parameterized routes — they need data to enumerate.\n        if route.path.contains(':') {\n            continue;\n        }\n\n        let file_path = route_path_to_file(\u0026route.path);\n        let html = render_page(manifest, \u0026route.path, route.query.as_deref());\n        pages.push(StaticPage {\n            path: file_path,\n            html,\n        });\n    }\n\n    pages\n}\n\n/// Write generated pages to an output directory.\npub fn write_pages(pages: \u0026[StaticPage], out_dir: \u0026Path) -\u003e Result\u003cusize, String\u003e {\n    std::fs::create_dir_all(out_dir)\n        .map_err(|e| format!(\"Failed to create output directory: {e}\"))?;\n\n    for page in pages {\n        let full_path = out_dir.join(\u0026page.path);\n        if let Some(parent) = full_path.parent() {\n            std::fs::create_dir_all(parent)\n                .map_err(|e| format!(\"Failed to create directory {}: {e}\", parent.display()))?;\n        }\n        std::fs::write(\u0026full_path, \u0026page.html)\n            .map_err(|e| format!(\"Failed to write {}: {e}\", full_path.display()))?;\n    }\n\n    Ok(pages.len())\n}\n\nfn route_path_to_file(route_path: \u0026str) -\u003e String {\n    if route_path == \"/\" {\n        \"index.html\".to_string()\n    } else {\n        let trimmed = route_path.trim_start_matches('/');\n        format!(\"{}/index.html\", trimmed)\n    }\n}\n\nfn render_page(manifest: \u0026AppManifest, route_path: \u0026str, query_name: Option\u003c\u0026str\u003e) -\u003e String {\n    let title = format!(\"{} — {}\", route_path, manifest.name);\n    let query_info = match query_name {\n        Some(q) =\u003e format!(\"\u003cp\u003eQuery: \u003ccode\u003e{q}\u003c/code\u003e\u003c/p\u003e\"),\n        None =\u003e String::new(),\n    };\n\n    format!(\n        r#\"\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"en\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"UTF-8\"\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n  \u003ctitle\u003e{title}\u003c/title\u003e\n  \u003cscript\u003ewindow.__AGENTDB_MANIFEST__ = {manifest_json};\u003c/script\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003ch1\u003e{app_name}\u003c/h1\u003e\n  \u003cp\u003eRoute: \u003ccode\u003e{route_path}\u003c/code\u003e\u003c/p\u003e\n  {query_info}\n  \u003cdiv id=\"app\"\u003e\u003c/div\u003e\n  \u003cscript type=\"module\" src=\"/app.js\"\u003e\u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\"#,\n        title = title,\n        manifest_json = serde_json::to_string(manifest).unwrap_or_else(|_| \"{}\".into()),\n        app_name = manifest.name,\n        route_path = route_path,\n        query_info = query_info,\n    )\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn test_manifest() -\u003e AppManifest {\n        serde_json::from_str(include_str!(\"../../../examples/todo-app/agentdb.manifest.json\"))\n            .unwrap()\n    }\n\n    #[test]\n    fn no_static_routes_produces_no_pages() {\n        // The todo app has no static routes (all are \"server\" or \"live\").\n        // Wait — it has one static route: /todos/:todoId is \"server\".\n        // Let me check.\n        let m = test_manifest();\n        let pages = generate_static_pages(\u0026m);\n        // The todo app has server and live routes, no pure static.\n        // Unless we count... let me just test with a custom manifest.\n        assert!(pages.is_empty());\n    }\n\n    #[test]\n    fn static_route_generates_page() {\n        let m = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![],\n            routes: vec![\n                ManifestRoute {\n                    path: \"/\".into(),\n                    mode: \"static\".into(),\n                    query: None,\n                    auth: None,\n                },\n                ManifestRoute {\n                    path: \"/about\".into(),\n                    mode: \"static\".into(),\n                    query: None,\n                    auth: None,\n                },\n                ManifestRoute {\n                    path: \"/live\".into(),\n                    mode: \"live\".into(),\n                    query: None,\n                    auth: None,\n                },\n            ],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n\n        let pages = generate_static_pages(\u0026m);\n        assert_eq!(pages.len(), 2);\n        assert_eq!(pages[0].path, \"index.html\");\n        assert_eq!(pages[1].path, \"about/index.html\");\n        assert!(pages[0].html.contains(\"\u003c!DOCTYPE html\u003e\"));\n        assert!(pages[0].html.contains(\"test\"));\n    }\n\n    #[test]\n    fn parameterized_static_routes_skipped() {\n        let m = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![],\n            routes: vec![ManifestRoute {\n                path: \"/posts/:slug\".into(),\n                mode: \"static\".into(),\n                query: None,\n                auth: None,\n            }],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n\n        let pages = generate_static_pages(\u0026m);\n        assert!(pages.is_empty());\n    }\n\n    #[test]\n    fn route_path_to_file_mapping() {\n        assert_eq!(route_path_to_file(\"/\"), \"index.html\");\n        assert_eq!(route_path_to_file(\"/about\"), \"about/index.html\");\n        assert_eq!(route_path_to_file(\"/docs/api\"), \"docs/api/index.html\");\n    }\n\n    #[test]\n    fn rendered_page_contains_manifest() {\n        let m = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"myapp\".into(),\n            version: \"1.0.0\".into(),\n            entities: vec![],\n            routes: vec![ManifestRoute {\n                path: \"/\".into(),\n                mode: \"static\".into(),\n                query: Some(\"allPosts\".into()),\n                auth: None,\n            }],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n\n        let pages = generate_static_pages(\u0026m);\n        assert_eq!(pages.len(), 1);\n        assert!(pages[0].html.contains(\"__AGENTDB_MANIFEST__\"));\n        assert!(pages[0].html.contains(\"myapp\"));\n        assert!(pages[0].html.contains(\"allPosts\"));\n    }\n\n    #[test]\n    fn write_pages_to_temp_dir() {\n        let m = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![],\n            routes: vec![ManifestRoute {\n                path: \"/\".into(),\n                mode: \"static\".into(),\n                query: None,\n                auth: None,\n            }],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n\n        let pages = generate_static_pages(\u0026m);\n        let dir = std::env::temp_dir().join(\"agentdb-staticgen-test\");\n        let _ = std::fs::remove_dir_all(\u0026dir);\n\n        let count = write_pages(\u0026pages, \u0026dir).unwrap();\n        assert_eq!(count, 1);\n        assert!(dir.join(\"index.html\").exists());\n\n        let _ = std::fs::remove_dir_all(\u0026dir);\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":5}},{"line":23,"address":[],"length":0,"stats":{"Line":10}},{"line":25,"address":[],"length":0,"stats":{"Line":23}},{"line":26,"address":[],"length":0,"stats":{"Line":9}},{"line":27,"address":[],"length":0,"stats":{"Line":4}},{"line":31,"address":[],"length":0,"stats":{"Line":5}},{"line":32,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":12}},{"line":36,"address":[],"length":0,"stats":{"Line":24}},{"line":37,"address":[],"length":0,"stats":{"Line":12}},{"line":38,"address":[],"length":0,"stats":{"Line":4}},{"line":39,"address":[],"length":0,"stats":{"Line":4}},{"line":43,"address":[],"length":0,"stats":{"Line":5}},{"line":47,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[],"length":0,"stats":{"Line":2}},{"line":49,"address":[],"length":0,"stats":{"Line":1}},{"line":51,"address":[],"length":0,"stats":{"Line":3}},{"line":52,"address":[],"length":0,"stats":{"Line":4}},{"line":53,"address":[],"length":0,"stats":{"Line":2}},{"line":54,"address":[],"length":0,"stats":{"Line":2}},{"line":55,"address":[],"length":0,"stats":{"Line":1}},{"line":57,"address":[],"length":0,"stats":{"Line":3}},{"line":58,"address":[],"length":0,"stats":{"Line":1}},{"line":61,"address":[],"length":0,"stats":{"Line":1}},{"line":64,"address":[],"length":0,"stats":{"Line":7}},{"line":65,"address":[],"length":0,"stats":{"Line":7}},{"line":66,"address":[],"length":0,"stats":{"Line":8}},{"line":68,"address":[],"length":0,"stats":{"Line":9}},{"line":69,"address":[],"length":0,"stats":{"Line":6}},{"line":73,"address":[],"length":0,"stats":{"Line":4}},{"line":74,"address":[],"length":0,"stats":{"Line":12}},{"line":75,"address":[],"length":0,"stats":{"Line":8}},{"line":76,"address":[],"length":0,"stats":{"Line":3}},{"line":77,"address":[],"length":0,"stats":{"Line":3}},{"line":80,"address":[],"length":0,"stats":{"Line":4}},{"line":98,"address":[],"length":0,"stats":{"Line":12}}],"covered":36,"coverable":36},{"path":["/","Users","ericc59","Dev","agentdb","crates","storage","src","lib.rs"],"content":"pub mod postgres;\npub mod sqlite;\n\nuse std::fmt;\n\nuse agentdb_core::AppManifest;\nuse serde::{Deserialize, Serialize};\n\n// ---------------------------------------------------------------------------\n// Errors\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct StorageError {\n    pub code: String,\n    pub message: String,\n}\n\nimpl fmt::Display for StorageError {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"[{}] {}\", self.code, self.message)\n    }\n}\n\nimpl std::error::Error for StorageError {}\n\n// ---------------------------------------------------------------------------\n// Schema operations — what a plan is made of\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(tag = \"op\", rename_all = \"snake_case\")]\npub enum SchemaOperation {\n    CreateEntity {\n        name: String,\n        fields: Vec\u003cFieldSpec\u003e,\n    },\n    AddField {\n        entity: String,\n        field: FieldSpec,\n    },\n    RemoveField {\n        entity: String,\n        field_name: String,\n    },\n    RemoveEntity {\n        name: String,\n    },\n    AddIndex {\n        entity: String,\n        name: String,\n        fields: Vec\u003cString\u003e,\n        unique: bool,\n    },\n    RemoveIndex {\n        entity: String,\n        name: String,\n    },\n    Noop,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct FieldSpec {\n    pub name: String,\n    pub field_type: String,\n    pub optional: bool,\n    pub unique: bool,\n}\n\n// ---------------------------------------------------------------------------\n// Schema plan — the output of planning\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct SchemaPlan {\n    pub operations: Vec\u003cSchemaOperation\u003e,\n}\n\nimpl SchemaPlan {\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.operations.is_empty()\n            || self.operations.iter().all(|op| matches!(op, SchemaOperation::Noop))\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Schema snapshot — shared introspection types\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct SchemaSnapshot {\n    pub tables: Vec\u003cTableSnapshot\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct TableSnapshot {\n    pub name: String,\n    pub columns: Vec\u003cColumnSnapshot\u003e,\n    pub indexes: Vec\u003cIndexSnapshot\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct ColumnSnapshot {\n    pub name: String,\n    pub column_type: String,\n    pub notnull: bool,\n    pub primary_key: bool,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct IndexSnapshot {\n    pub name: String,\n    pub columns: Vec\u003cString\u003e,\n    pub unique: bool,\n}\n\n/// Plan additive schema changes from a snapshot to a target manifest.\n/// Shared by both SQLite and Postgres adapters.\n/// Only produces CreateEntity, AddField, AddIndex, and Noop.\npub fn plan_from_snapshot(snapshot: \u0026SchemaSnapshot, target: \u0026AppManifest) -\u003e SchemaPlan {\n    use std::collections::{HashMap, HashSet};\n\n    let existing_tables: HashMap\u003c\u0026str, \u0026TableSnapshot\u003e =\n        snapshot.tables.iter().map(|t| (t.name.as_str(), t)).collect();\n\n    let mut operations = Vec::new();\n\n    for entity in \u0026target.entities {\n        match existing_tables.get(entity.name.as_str()) {\n            None =\u003e {\n                let fields: Vec\u003cFieldSpec\u003e = entity\n                    .fields\n                    .iter()\n                    .map(|f| FieldSpec {\n                        name: f.name.clone(),\n                        field_type: f.field_type.clone(),\n                        optional: f.optional,\n                        unique: f.unique,\n                    })\n                    .collect();\n                operations.push(SchemaOperation::CreateEntity {\n                    name: entity.name.clone(),\n                    fields,\n                });\n                for index in \u0026entity.indexes {\n                    operations.push(SchemaOperation::AddIndex {\n                        entity: entity.name.clone(),\n                        name: index.name.clone(),\n                        fields: index.fields.clone(),\n                        unique: index.unique,\n                    });\n                }\n            }\n            Some(table) =\u003e {\n                let existing_cols: HashSet\u003c\u0026str\u003e =\n                    table.columns.iter().map(|c| c.name.as_str()).collect();\n                for field in \u0026entity.fields {\n                    if !existing_cols.contains(field.name.as_str()) {\n                        operations.push(SchemaOperation::AddField {\n                            entity: entity.name.clone(),\n                            field: FieldSpec {\n                                name: field.name.clone(),\n                                field_type: field.field_type.clone(),\n                                optional: field.optional,\n                                unique: field.unique,\n                            },\n                        });\n                    }\n                }\n                // Index names in DB are prefixed: {entity}_{index_name}.\n                let existing_indexes: HashSet\u003c\u0026str\u003e =\n                    table.indexes.iter().map(|i| i.name.as_str()).collect();\n                for index in \u0026entity.indexes {\n                    let full_name = format!(\"{}_{}\", entity.name, index.name);\n                    if !existing_indexes.contains(full_name.as_str()) {\n                        operations.push(SchemaOperation::AddIndex {\n                            entity: entity.name.clone(),\n                            name: index.name.clone(),\n                            fields: index.fields.clone(),\n                            unique: index.unique,\n                        });\n                    }\n                }\n            }\n        }\n    }\n\n    if operations.is_empty() {\n        operations.push(SchemaOperation::Noop);\n    }\n\n    SchemaPlan { operations }\n}\n\n// ---------------------------------------------------------------------------\n// Plan analysis — safety classification\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct PlanWarning {\n    pub code: String,\n    pub message: String,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct PlanAnalysis {\n    pub destructive: bool,\n    pub has_unsupported: bool,\n    pub warnings: Vec\u003cPlanWarning\u003e,\n}\n\n/// Analyze a schema plan for destructive or unsupported operations.\npub fn analyze_plan(plan: \u0026SchemaPlan) -\u003e PlanAnalysis {\n    let mut destructive = false;\n    let mut has_unsupported = false;\n    let mut warnings = Vec::new();\n\n    for op in \u0026plan.operations {\n        match op {\n            SchemaOperation::RemoveEntity { name } =\u003e {\n                destructive = true;\n                has_unsupported = true;\n                warnings.push(PlanWarning {\n                    code: \"DESTRUCTIVE_REMOVE_ENTITY\".into(),\n                    message: format!(\"Removing entity \\\"{}\\\" will drop the table and all its data\", name),\n                });\n            }\n            SchemaOperation::RemoveField { entity, field_name } =\u003e {\n                destructive = true;\n                has_unsupported = true;\n                warnings.push(PlanWarning {\n                    code: \"DESTRUCTIVE_REMOVE_FIELD\".into(),\n                    message: format!(\"Removing field \\\"{}.{}\\\" will drop the column and its data\", entity, field_name),\n                });\n            }\n            SchemaOperation::RemoveIndex { entity, name } =\u003e {\n                has_unsupported = true;\n                warnings.push(PlanWarning {\n                    code: \"UNSUPPORTED_REMOVE_INDEX\".into(),\n                    message: format!(\"Removing index \\\"{}.{}\\\" is not supported by the SQLite adapter\", entity, name),\n                });\n            }\n            _ =\u003e {}\n        }\n    }\n\n    PlanAnalysis {\n        destructive,\n        has_unsupported,\n        warnings,\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Storage adapter trait\n// ---------------------------------------------------------------------------\n\npub trait StorageAdapter {\n    /// Produce a plan that would bring storage in line with the target manifest.\n    fn plan_schema(\n        \u0026self,\n        target: \u0026AppManifest,\n    ) -\u003e Result\u003cSchemaPlan, StorageError\u003e;\n\n    /// Apply a schema plan. Not implemented by dry-run adapters.\n    fn apply_schema(\n        \u0026self,\n        _plan: \u0026SchemaPlan,\n    ) -\u003e Result\u003c(), StorageError\u003e {\n        Err(StorageError {\n            code: \"APPLY_NOT_IMPLEMENTED\".into(),\n            message: \"This adapter does not support applying schemas\".into(),\n        })\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Dry-run adapter — plans against an empty baseline\n// ---------------------------------------------------------------------------\n\n/// A storage adapter that assumes no existing schema.\n/// It produces a plan to create everything from scratch.\npub struct DryRunAdapter;\n\nimpl StorageAdapter for DryRunAdapter {\n    fn plan_schema(\n        \u0026self,\n        target: \u0026AppManifest,\n    ) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n        let mut operations = Vec::new();\n\n        for entity in \u0026target.entities {\n            let fields: Vec\u003cFieldSpec\u003e = entity\n                .fields\n                .iter()\n                .map(|f| FieldSpec {\n                    name: f.name.clone(),\n                    field_type: f.field_type.clone(),\n                    optional: f.optional,\n                    unique: f.unique,\n                })\n                .collect();\n\n            operations.push(SchemaOperation::CreateEntity {\n                name: entity.name.clone(),\n                fields,\n            });\n\n            for index in \u0026entity.indexes {\n                operations.push(SchemaOperation::AddIndex {\n                    entity: entity.name.clone(),\n                    name: index.name.clone(),\n                    fields: index.fields.clone(),\n                    unique: index.unique,\n                });\n            }\n        }\n\n        if operations.is_empty() {\n            operations.push(SchemaOperation::Noop);\n        }\n\n        Ok(SchemaPlan { operations })\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Diff-based adapter — plans from one manifest to another\n// ---------------------------------------------------------------------------\n\n/// A storage adapter that plans the transition from an old manifest to a new one.\npub struct DiffAdapter {\n    pub from: AppManifest,\n}\n\nimpl StorageAdapter for DiffAdapter {\n    fn plan_schema(\n        \u0026self,\n        target: \u0026AppManifest,\n    ) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n        let mut operations = Vec::new();\n\n        let old_entities: std::collections::HashMap\u003c\u0026str, \u0026agentdb_core::ManifestEntity\u003e =\n            self.from.entities.iter().map(|e| (e.name.as_str(), e)).collect();\n        let new_entities: std::collections::HashMap\u003c\u0026str, \u0026agentdb_core::ManifestEntity\u003e =\n            target.entities.iter().map(|e| (e.name.as_str(), e)).collect();\n\n        // Removed entities\n        for name in old_entities.keys() {\n            if !new_entities.contains_key(name) {\n                operations.push(SchemaOperation::RemoveEntity {\n                    name: name.to_string(),\n                });\n            }\n        }\n\n        // Added entities\n        for (name, entity) in \u0026new_entities {\n            if !old_entities.contains_key(name) {\n                let fields: Vec\u003cFieldSpec\u003e = entity\n                    .fields\n                    .iter()\n                    .map(|f| FieldSpec {\n                        name: f.name.clone(),\n                        field_type: f.field_type.clone(),\n                        optional: f.optional,\n                        unique: f.unique,\n                    })\n                    .collect();\n                operations.push(SchemaOperation::CreateEntity {\n                    name: name.to_string(),\n                    fields,\n                });\n                for index in \u0026entity.indexes {\n                    operations.push(SchemaOperation::AddIndex {\n                        entity: name.to_string(),\n                        name: index.name.clone(),\n                        fields: index.fields.clone(),\n                        unique: index.unique,\n                    });\n                }\n            }\n        }\n\n        // Field changes in shared entities\n        for (name, new_entity) in \u0026new_entities {\n            if let Some(old_entity) = old_entities.get(name) {\n                let old_fields: std::collections::HashSet\u003c\u0026str\u003e =\n                    old_entity.fields.iter().map(|f| f.name.as_str()).collect();\n                let new_fields: std::collections::HashSet\u003c\u0026str\u003e =\n                    new_entity.fields.iter().map(|f| f.name.as_str()).collect();\n\n                for field in \u0026new_entity.fields {\n                    if !old_fields.contains(field.name.as_str()) {\n                        operations.push(SchemaOperation::AddField {\n                            entity: name.to_string(),\n                            field: FieldSpec {\n                                name: field.name.clone(),\n                                field_type: field.field_type.clone(),\n                                optional: field.optional,\n                                unique: field.unique,\n                            },\n                        });\n                    }\n                }\n\n                for field in \u0026old_entity.fields {\n                    if !new_fields.contains(field.name.as_str()) {\n                        operations.push(SchemaOperation::RemoveField {\n                            entity: name.to_string(),\n                            field_name: field.name.clone(),\n                        });\n                    }\n                }\n\n                // Index changes\n                let old_indexes: std::collections::HashSet\u003c\u0026str\u003e =\n                    old_entity.indexes.iter().map(|i| i.name.as_str()).collect();\n                let new_indexes: std::collections::HashSet\u003c\u0026str\u003e =\n                    new_entity.indexes.iter().map(|i| i.name.as_str()).collect();\n\n                for index in \u0026new_entity.indexes {\n                    if !old_indexes.contains(index.name.as_str()) {\n                        operations.push(SchemaOperation::AddIndex {\n                            entity: name.to_string(),\n                            name: index.name.clone(),\n                            fields: index.fields.clone(),\n                            unique: index.unique,\n                        });\n                    }\n                }\n\n                for index in \u0026old_entity.indexes {\n                    if !new_indexes.contains(index.name.as_str()) {\n                        operations.push(SchemaOperation::RemoveIndex {\n                            entity: name.to_string(),\n                            name: index.name.clone(),\n                        });\n                    }\n                }\n            }\n        }\n\n        if operations.is_empty() {\n            operations.push(SchemaOperation::Noop);\n        }\n\n        Ok(SchemaPlan { operations })\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn minimal_manifest() -\u003e AppManifest {\n        AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![ManifestEntity {\n                name: \"User\".into(),\n                fields: vec![ManifestField {\n                    name: \"email\".into(),\n                    field_type: \"string\".into(),\n                    optional: false,\n                    unique: true,\n                }],\n                indexes: vec![],\n                relations: vec![],\n            }],\n            routes: vec![],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        }\n    }\n\n    #[test]\n    fn dry_run_creates_all_entities() {\n        let adapter = DryRunAdapter;\n        let manifest = minimal_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n\n        assert_eq!(plan.operations.len(), 1);\n        match \u0026plan.operations[0] {\n            SchemaOperation::CreateEntity { name, fields } =\u003e {\n                assert_eq!(name, \"User\");\n                assert_eq!(fields.len(), 1);\n                assert_eq!(fields[0].name, \"email\");\n            }\n            other =\u003e panic!(\"expected CreateEntity, got: {other:?}\"),\n        }\n    }\n\n    #[test]\n    fn dry_run_includes_indexes() {\n        let adapter = DryRunAdapter;\n        let mut manifest = minimal_manifest();\n        manifest.entities[0].indexes.push(ManifestIndex {\n            name: \"by_email\".into(),\n            fields: vec![\"email\".into()],\n            unique: true,\n        });\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n\n        assert_eq!(plan.operations.len(), 2);\n        match \u0026plan.operations[1] {\n            SchemaOperation::AddIndex { entity, name, fields, unique } =\u003e {\n                assert_eq!(entity, \"User\");\n                assert_eq!(name, \"by_email\");\n                assert_eq!(fields, \u0026vec![\"email\".to_string()]);\n                assert!(unique);\n            }\n            other =\u003e panic!(\"expected AddIndex, got: {other:?}\"),\n        }\n    }\n\n    #[test]\n    fn dry_run_empty_manifest_produces_noop() {\n        let adapter = DryRunAdapter;\n        let manifest = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"empty\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![],\n            routes: vec![],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        assert!(plan.is_empty());\n    }\n\n    #[test]\n    fn diff_adapter_detects_new_entity() {\n        let old = minimal_manifest();\n        let mut new = minimal_manifest();\n        new.entities.push(ManifestEntity {\n            name: \"Post\".into(),\n            fields: vec![ManifestField {\n                name: \"title\".into(),\n                field_type: \"string\".into(),\n                optional: false,\n                unique: false,\n            }],\n            indexes: vec![],\n            relations: vec![],\n        });\n\n        let adapter = DiffAdapter { from: old };\n        let plan = adapter.plan_schema(\u0026new).unwrap();\n\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"Post\"\n        )));\n    }\n\n    #[test]\n    fn diff_adapter_detects_removed_entity() {\n        let old = minimal_manifest();\n        let mut new = minimal_manifest();\n        new.entities.clear();\n\n        let adapter = DiffAdapter { from: old };\n        let plan = adapter.plan_schema(\u0026new).unwrap();\n\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::RemoveEntity { name } if name == \"User\"\n        )));\n    }\n\n    #[test]\n    fn diff_adapter_detects_added_field() {\n        let old = minimal_manifest();\n        let mut new = minimal_manifest();\n        new.entities[0].fields.push(ManifestField {\n            name: \"name\".into(),\n            field_type: \"string\".into(),\n            optional: false,\n            unique: false,\n        });\n\n        let adapter = DiffAdapter { from: old };\n        let plan = adapter.plan_schema(\u0026new).unwrap();\n\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::AddField { entity, field } if entity == \"User\" \u0026\u0026 field.name == \"name\"\n        )));\n    }\n\n    #[test]\n    fn diff_adapter_detects_removed_field() {\n        let old = minimal_manifest();\n        let mut new = minimal_manifest();\n        new.entities[0].fields.clear();\n\n        let adapter = DiffAdapter { from: old };\n        let plan = adapter.plan_schema(\u0026new).unwrap();\n\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::RemoveField { entity, field_name } if entity == \"User\" \u0026\u0026 field_name == \"email\"\n        )));\n    }\n\n    #[test]\n    fn diff_adapter_no_changes_produces_noop() {\n        let m = minimal_manifest();\n        let adapter = DiffAdapter { from: m.clone() };\n        let plan = adapter.plan_schema(\u0026m).unwrap();\n        assert!(plan.is_empty());\n    }\n\n    #[test]\n    fn apply_schema_not_implemented() {\n        let adapter = DryRunAdapter;\n        let plan = SchemaPlan { operations: vec![] };\n        let result = adapter.apply_schema(\u0026plan);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"APPLY_NOT_IMPLEMENTED\");\n    }\n\n    // -- Plan analysis tests --\n\n    #[test]\n    fn safe_plan_has_no_warnings() {\n        let plan = SchemaPlan {\n            operations: vec![\n                SchemaOperation::CreateEntity {\n                    name: \"User\".into(),\n                    fields: vec![],\n                },\n                SchemaOperation::AddIndex {\n                    entity: \"User\".into(),\n                    name: \"idx\".into(),\n                    fields: vec![\"email\".into()],\n                    unique: true,\n                },\n                SchemaOperation::Noop,\n            ],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(!analysis.destructive);\n        assert!(!analysis.has_unsupported);\n        assert!(analysis.warnings.is_empty());\n    }\n\n    #[test]\n    fn remove_entity_is_destructive() {\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveEntity {\n                name: \"User\".into(),\n            }],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(analysis.destructive);\n        assert!(analysis.has_unsupported);\n        assert_eq!(analysis.warnings.len(), 1);\n        assert_eq!(analysis.warnings[0].code, \"DESTRUCTIVE_REMOVE_ENTITY\");\n    }\n\n    #[test]\n    fn remove_field_is_destructive() {\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveField {\n                entity: \"User\".into(),\n                field_name: \"email\".into(),\n            }],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(analysis.destructive);\n        assert!(analysis.has_unsupported);\n        assert_eq!(analysis.warnings[0].code, \"DESTRUCTIVE_REMOVE_FIELD\");\n    }\n\n    #[test]\n    fn remove_index_is_unsupported_not_destructive() {\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveIndex {\n                entity: \"User\".into(),\n                name: \"idx\".into(),\n            }],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(!analysis.destructive);\n        assert!(analysis.has_unsupported);\n        assert_eq!(analysis.warnings[0].code, \"UNSUPPORTED_REMOVE_INDEX\");\n    }\n\n    #[test]\n    fn mixed_plan_flags_both() {\n        let plan = SchemaPlan {\n            operations: vec![\n                SchemaOperation::CreateEntity {\n                    name: \"Post\".into(),\n                    fields: vec![],\n                },\n                SchemaOperation::RemoveEntity {\n                    name: \"User\".into(),\n                },\n                SchemaOperation::RemoveIndex {\n                    entity: \"Post\".into(),\n                    name: \"idx\".into(),\n                },\n            ],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(analysis.destructive);\n        assert!(analysis.has_unsupported);\n        assert_eq!(analysis.warnings.len(), 2);\n    }\n\n    #[test]\n    fn noop_plan_is_safe() {\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::Noop],\n        };\n        let analysis = analyze_plan(\u0026plan);\n        assert!(!analysis.destructive);\n        assert!(!analysis.has_unsupported);\n        assert!(analysis.warnings.is_empty());\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":10}},{"line":81,"address":[],"length":0,"stats":{"Line":20}},{"line":82,"address":[],"length":0,"stats":{"Line":30}},{"line":120,"address":[],"length":0,"stats":{"Line":60}},{"line":123,"address":[],"length":0,"stats":{"Line":120}},{"line":124,"address":[],"length":0,"stats":{"Line":246}},{"line":126,"address":[],"length":0,"stats":{"Line":120}},{"line":128,"address":[],"length":0,"stats":{"Line":196}},{"line":129,"address":[],"length":0,"stats":{"Line":204}},{"line":131,"address":[],"length":0,"stats":{"Line":138}},{"line":132,"address":[],"length":0,"stats":{"Line":46}},{"line":134,"address":[],"length":0,"stats":{"Line":46}},{"line":135,"address":[],"length":0,"stats":{"Line":264}},{"line":136,"address":[],"length":0,"stats":{"Line":264}},{"line":137,"address":[],"length":0,"stats":{"Line":132}},{"line":138,"address":[],"length":0,"stats":{"Line":132}},{"line":141,"address":[],"length":0,"stats":{"Line":138}},{"line":142,"address":[],"length":0,"stats":{"Line":92}},{"line":143,"address":[],"length":0,"stats":{"Line":46}},{"line":145,"address":[],"length":0,"stats":{"Line":166}},{"line":146,"address":[],"length":0,"stats":{"Line":120}},{"line":147,"address":[],"length":0,"stats":{"Line":120}},{"line":148,"address":[],"length":0,"stats":{"Line":120}},{"line":149,"address":[],"length":0,"stats":{"Line":80}},{"line":150,"address":[],"length":0,"stats":{"Line":40}},{"line":154,"address":[],"length":0,"stats":{"Line":22}},{"line":155,"address":[],"length":0,"stats":{"Line":44}},{"line":156,"address":[],"length":0,"stats":{"Line":234}},{"line":157,"address":[],"length":0,"stats":{"Line":162}},{"line":158,"address":[],"length":0,"stats":{"Line ne":396,"address":[],"length":0,"stats":{"Line":6}},{"line":397,"address":[],"length":0,"stats":{"Line":2}},{"line":398,"address":[],"length":0,"stats":{"Line":6}},{"line":399,"address":[],"length":0,"stats":{"Line":6}},{"line":400,"address":[],"length":0,"stats":{"Line":2}},{"line":401,"address":[],"length":0,"stats":{"Line":2}},{"line":407,"address":[],"length":0,"stats":{"Line":24}},{"line":408,"address":[],"length":0,"stats":{"Line":26}},{"line":409,"address":[],"length":0,"stats":{"Line":6}},{"line":410,"address":[],"length":0,"stats":{"Line":6}},{"line":411,"address":[],"length":0,"stats":{"Line":2}},{"line":417,"address":[],"length":0,"stats":{"Line":16}},{"line":418,"address":[],"length":0,"stats":{"Line":24}},{"line":419,"address":[],"length":0,"stats":{"Line":16}},{"line":420,"address":[],"length":0,"stats":{"Line":24}},{"line":422,"address":[],"length":0,"stats":{"Line":8}},{"line":423,"address":[],"length":0,"stats":{"Line":0}},{"line":424,"address":[],"length":0,"stats":{"Line":0}},{"line":425,"address":[],"length":0,"stats":{"Line":0}},{"line":426,"address":[],"length":0,"stats":{"Line":0}},{"line":427,"address":[],"length":0,"stats":{"Line":0}},{"line":428,"address":[],"length":0,"stats":{"Line":0}},{"line":433,"address":[],"length":0,"stats":{"Line":8}},{"line":434,"address":[],"length":0,"stats":{"Line":0}},{"line":435,"address":[],"length":0,"stats":{"Line":0}},{"line":436,"address":[],"length":0,"stats":{"Line":0}},{"line":437,"address":[],"length":0,"stats":{"Line":0}},{"line":444,"address":[],"length":0,"stats":{"Line":22}},{"line":445,"address":[],"length":0,"stats":{"Line":4}},{"line":448,"address":[],"length":0,"stats":{"Line":10}}],"covered":151,"coverable":168},{"path":["/","Users","ericc59","Dev","agentdb","crates","storage","src","postgres.rs"],"content":"use crate::{FieldSpec, SchemaOperation, SchemaPlan, StorageAdapter, StorageError};\nuse agentdb_core::AppManifest;\n\n// ---------------------------------------------------------------------------\n// Type mapping: manifest field types -\u003e PostgreSQL column types\n//\n//   string    -\u003e TEXT\n//   int       -\u003e INTEGER\n//   float     -\u003e DOUBLE PRECISION\n//   bool      -\u003e BOOLEAN\n//   datetime  -\u003e TIMESTAMPTZ\n//   richtext  -\u003e TEXT\n//   id(...)   -\u003e TEXT\n// ---------------------------------------------------------------------------\n\nfn pg_column_type(field_type: \u0026str) -\u003e \u0026'static str {\n    match field_type {\n        \"string\" =\u003e \"TEXT\",\n        \"int\" =\u003e \"INTEGER\",\n        \"float\" =\u003e \"DOUBLE PRECISION\",\n        \"bool\" =\u003e \"BOOLEAN\",\n        \"datetime\" =\u003e \"TIMESTAMPTZ\",\n        \"richtext\" =\u003e \"TEXT\",\n        _ if field_type.starts_with(\"id(\") =\u003e \"TEXT\",\n        _ =\u003e \"TEXT\",\n    }\n}\n\n// ---------------------------------------------------------------------------\n// SQL generation\n// ---------------------------------------------------------------------------\n\n/// Generate a Postgres CREATE TABLE statement.\npub fn create_table_sql(entity_name: \u0026str, fields: \u0026[FieldSpec]) -\u003e String {\n    let mut columns = vec![\"id TEXT PRIMARY KEY NOT NULL\".to_string()];\n\n    for field in fields {\n        let col_type = pg_column_type(\u0026field.field_type);\n        let not_null = if field.optional { \"\" } else { \" NOT NULL\" };\n        let unique = if field.unique { \" UNIQUE\" } else { \"\" };\n        columns.push(format!(\n            \"\\\"{}\\\" {}{}{}\",\n            field.name, col_type, not_null, unique\n        ));\n    }\n\n    format!(\n        \"CREATE TABLE IF NOT EXISTS \\\"{}\\\" ({})\",\n        entity_name,\n        columns.join(\", \")\n    )\n}\n\n/// Generate a Postgres ALTER TABLE ADD COLUMN statement.\n/// NOT NULL is omitted on ADD COLUMN to avoid requiring DEFAULT values.\n/// Required-ness is tracked in the manifest; enforcement deferred.\npub fn add_column_sql(entity_name: \u0026str, field: \u0026FieldSpec) -\u003e String {\n    let col_type = pg_column_type(\u0026field.field_type);\n    let unique = if field.unique { \" UNIQUE\" } else { \"\" };\n    format!(\n        \"ALTER TABLE \\\"{}\\\" ADD COLUMN \\\"{}\\\" {}{}\",\n        entity_name, field.name, col_type, unique\n    )\n}\n\n/// Generate a Postgres CREATE INDEX statement.\npub fn create_index_sql(\n    entity_name: \u0026str,\n    index_name: \u0026str,\n    fields: \u0026[String],\n    unique: bool,\n) -\u003e String {\n    let unique_str = if unique { \"UNIQUE \" } else { \"\" };\n    let full_index_name = format!(\"{}_{}\", entity_name, index_name);\n    let quoted_fields: Vec\u003cString\u003e = fields.iter().map(|f| format!(\"\\\"{}\\\"\", f)).collect();\n    format!(\n        \"CREATE {}INDEX IF NOT EXISTS \\\"{}\\\" ON \\\"{}\\\" ({})\",\n        unique_str,\n        full_index_name,\n        entity_name,\n        quoted_fields.join(\", \")\n    )\n}\n\n// ---------------------------------------------------------------------------\n// PostgresAdapter — planning-only adapter\n// ---------------------------------------------------------------------------\n\n/// A Postgres storage adapter. Currently supports planning only.\n/// No live connection — SQL generation and planning from manifest.\npub struct PostgresAdapter;\n\nimpl StorageAdapter for PostgresAdapter {\n    fn plan_schema(\u0026self, target: \u0026AppManifest) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n        // Plan from empty baseline.\n        let mut operations = Vec::new();\n\n        for entity in \u0026target.entities {\n            let fields: Vec\u003cFieldSpec\u003e = entity\n                .fields\n                .iter()\n                .map(|f| FieldSpec {\n                    name: f.name.clone(),\n                    field_type: f.field_type.clone(),\n                    optional: f.optional,\n                    unique: f.unique,\n                })\n                .collect();\n\n            operations.push(SchemaOperation::CreateEntity {\n                name: entity.name.clone(),\n                fields,\n            });\n\n            for index in \u0026entity.indexes {\n                operations.push(SchemaOperation::AddIndex {\n                    entity: entity.name.clone(),\n                    name: index.name.clone(),\n                    fields: index.fields.clone(),\n                    unique: index.unique,\n                });\n            }\n        }\n\n        if operations.is_empty() {\n            operations.push(SchemaOperation::Noop);\n        }\n\n        Ok(SchemaPlan { operations })\n    }\n\n    // apply_schema intentionally not implemented — uses default trait error.\n}\n\n/// Generate all SQL statements for a plan, in order.\n/// Useful for dry-run preview of what Postgres DDL would be executed.\npub fn plan_to_sql(plan: \u0026SchemaPlan) -\u003e Result\u003cVec\u003cString\u003e, StorageError\u003e {\n    let mut statements = Vec::new();\n\n    for op in \u0026plan.operations {\n        match op {\n            SchemaOperation::CreateEntity { name, fields } =\u003e {\n                statements.push(create_table_sql(name, fields));\n            }\n            SchemaOperation::AddField { entity, field } =\u003e {\n                statements.push(add_column_sql(entity, field));\n            }\n            SchemaOperation::AddIndex {\n                entity,\n                name,\n                fields,\n                unique,\n            } =\u003e {\n                statements.push(create_index_sql(entity, name, fields, *unique));\n            }\n            SchemaOperation::Noop =\u003e {}\n            other =\u003e {\n                return Err(StorageError {\n                    code: \"PG_OP_UNSUPPORTED\".into(),\n                    message: format!(\n                        \"Operation not supported by Postgres adapter: {other:?}\"\n                    ),\n                });\n            }\n        }\n    }\n\n    Ok(statements)\n}\n\n// ---------------------------------------------------------------------------\n// Introspection SQL helpers\n//\n// These generate the SQL queries that a live Postgres connection would run\n// to read the current schema. No connection required — just SQL strings.\n// ---------------------------------------------------------------------------\n\n/// SQL to list user tables in the public schema.\npub const INTROSPECT_TABLES_SQL: \u0026str = \"\\\n    SELECT table_name \\\n    FROM information_schema.tables \\\n    WHERE table_schema = 'public' \\\n      AND table_type = 'BASE TABLE' \\\n      AND table_name NOT LIKE '_agentdb_%' \\\n    ORDER BY table_name\";\n\n/// SQL to list columns for a given table.\n/// Use with parameter: table_name.\npub const INTROSPECT_COLUMNS_SQL: \u0026str = \"\\\n    SELECT column_name, data_type, is_nullable, \\\n           (SELECT COUNT(*) FROM information_schema.table_constraints tc \\\n            JOIN information_schema.key_column_usage kcu \\\n              ON tc.constraint_name = kcu.constraint_name \\\n            WHERE tc.table_name = c.table_name \\\n              AND kcu.column_name = c.column_name \\\n              AND tc.constraint_type = 'PRIMARY KEY') as is_pk \\\n    FROM information_schema.columns c \\\n    WHERE table_schema = 'public' AND table_name = $1 \\\n    ORDER BY ordinal_position\";\n\n/// SQL to list indexes for a given table.\n/// Use with parameter: table_name.\npub const INTROSPECT_INDEXES_SQL: \u0026str = \"\\\n    SELECT i.relname as index_name, \\\n           ix.indisunique as is_unique, \\\n           array_agg(a.attname ORDER BY array_position(ix.indkey, a.attnum)) as columns \\\n    FROM pg_index ix \\\n    JOIN pg_class t ON t.oid = ix.indrelid \\\n    JOIN pg_class i ON i.oid = ix.indexrelid \\\n    JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = ANY(ix.indkey) \\\n    JOIN pg_namespace n ON n.oid = t.relnamespace \\\n    WHERE n.nspname = 'public' \\\n      AND t.relname = $1 \\\n      AND NOT ix.indisprimary \\\n    GROUP BY i.relname, ix.indisunique \\\n    ORDER BY i.relname\";\n\n/// Plan from a snapshot (reuses the shared plan_from_snapshot).\n/// This allows Postgres to plan incrementally once introspection data is available.\npub fn plan_from_snapshot(\n    snapshot: \u0026crate::SchemaSnapshot,\n    target: \u0026AppManifest,\n) -\u003e SchemaPlan {\n    crate::plan_from_snapshot(snapshot, target)\n}\n\n// ---------------------------------------------------------------------------\n// Live Postgres adapter (requires \"postgres-live\" feature)\n// ---------------------------------------------------------------------------\n\n#[cfg(feature = \"postgres-live\")]\npub mod live {\n    use super::*;\n    use crate::{\n        ColumnSnapshot, IndexSnapshot, SchemaSnapshot, StorageAdapter, StorageError, TableSnapshot,\n    };\n\n    /// A live Postgres adapter with a real database connection.\n    pub struct LivePostgresAdapter {\n        client: postgres::Client,\n    }\n\n    impl LivePostgresAdapter {\n        /// Connect to a Postgres database.\n        pub fn connect(url: \u0026str) -\u003e Result\u003cSelf, StorageError\u003e {\n            let client = postgres::Client::connect(url, postgres::NoTls).map_err(|e| {\n                StorageError {\n                    code: \"PG_CONNECT_FAILED\".into(),\n                    message: format!(\"Failed to connect to Postgres: {e}\"),\n                }\n            })?;\n            Ok(Self { client })\n        }\n\n        /// Read the current schema from the live database.\n        pub fn read_schema(\u0026mut self) -\u003e Result\u003cSchemaSnapshot, StorageError\u003e {\n            let table_rows = self\n                .client\n                .query(INTROSPECT_TABLES_SQL, \u0026[])\n                .map_err(pg_err)?;\n\n            let mut tables = Vec::new();\n            for row in \u0026table_rows {\n                let table_name: String = row.get(0);\n                let columns = self.read_columns(\u0026table_name)?;\n                let indexes = self.read_indexes(\u0026table_name)?;\n                tables.push(TableSnapshot {\n                    name: table_name,\n                    columns,\n                    indexes,\n                });\n            }\n\n            Ok(SchemaSnapshot { tables })\n        }\n\n        fn read_columns(\u0026mut self, table: \u0026str) -\u003e Result\u003cVec\u003cColumnSnapshot\u003e, StorageError\u003e {\n            let rows = self\n                .client\n                .query(INTROSPECT_COLUMNS_SQL, \u0026[\u0026table])\n                .map_err(pg_err)?;\n\n            let mut columns = Vec::new();\n            for row in \u0026rows {\n                let name: String = row.get(0);\n                let data_type: String = row.get(1);\n                let is_nullable: String = row.get(2);\n                let is_pk: i64 = row.get(3);\n                columns.push(ColumnSnapshot {\n                    name,\n                    column_type: data_type,\n                    notnull: is_nullable == \"NO\",\n                    primary_key: is_pk \u003e 0,\n                });\n            }\n            Ok(columns)\n        }\n\n        fn read_indexes(\u0026mut self, table: \u0026str) -\u003e Result\u003cVec\u003cIndexSnapshot\u003e, StorageError\u003e {\n            let rows = self\n                .client\n                .query(INTROSPECT_INDEXES_SQL, \u0026[\u0026table])\n                .map_err(pg_err)?;\n\n            let mut indexes = Vec::new();\n            for row in \u0026rows {\n                let name: String = row.get(0);\n                let unique: bool = row.get(1);\n                let columns: Vec\u003cString\u003e = row.get(2);\n                indexes.push(IndexSnapshot {\n                    name,\n                    columns,\n                    unique,\n                });\n            }\n            Ok(indexes)\n        }\n\n        /// Plan from live database state.\n        pub fn plan_from_live(\n            \u0026mut self,\n            target: \u0026AppManifest,\n        ) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n            let snapshot = self.read_schema()?;\n            Ok(crate::plan_from_snapshot(\u0026snapshot, target))\n        }\n    }\n\n    impl StorageAdapter for LivePostgresAdapter {\n        fn plan_schema(\u0026self, _target: \u0026AppManifest) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n            Err(StorageError {\n                code: \"PG_PLAN_NEEDS_MUTABLE\".into(),\n                message: \"Use plan_from_live() instead for live Postgres planning\".into(),\n            })\n        }\n\n        fn apply_schema(\u0026self, _plan: \u0026SchemaPlan) -\u003e Result\u003c(), StorageError\u003e {\n            Err(StorageError {\n                code: \"PG_APPLY_USE_METHOD\".into(),\n                message: \"Use apply_plan() instead of the trait method for live Postgres\".into(),\n            })\n        }\n    }\n\n    impl LivePostgresAdapter {\n        /// Apply a schema plan to the live database.\n        pub fn apply_plan(\u0026mut self, plan: \u0026SchemaPlan) -\u003e Result\u003c(), StorageError\u003e {\n            let statements = plan_to_sql(plan)?;\n            for sql in \u0026statements {\n                self.client.execute(sql.as_str(), \u0026[]).map_err(pg_err)?;\n            }\n            Ok(())\n        }\n    }\n\n    fn pg_err(e: postgres::Error) -\u003e StorageError {\n        StorageError {\n            code: \"PG_QUERY_FAILED\".into(),\n            message: format!(\"Postgres query failed: {e}\"),\n        }\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn test_manifest() -\u003e AppManifest {\n        serde_json::from_str(include_str!(\"../../../examples/todo-app/agentdb.manifest.json\"))\n            .unwrap()\n    }\n\n    #[test]\n    fn pg_type_mapping() {\n        assert_eq!(pg_column_type(\"string\"), \"TEXT\");\n        assert_eq!(pg_column_type(\"int\"), \"INTEGER\");\n        assert_eq!(pg_column_type(\"float\"), \"DOUBLE PRECISION\");\n        assert_eq!(pg_column_type(\"bool\"), \"BOOLEAN\");\n        assert_eq!(pg_column_type(\"datetime\"), \"TIMESTAMPTZ\");\n        assert_eq!(pg_column_type(\"richtext\"), \"TEXT\");\n        assert_eq!(pg_column_type(\"id(User)\"), \"TEXT\");\n    }\n\n    #[test]\n    fn create_table_sql_basic() {\n        let fields = vec![\n            FieldSpec {\n                name: \"email\".into(),\n                field_type: \"string\".into(),\n                optional: false,\n                unique: true,\n            },\n            FieldSpec {\n                name: \"age\".into(),\n                field_type: \"int\".into(),\n                optional: true,\n                unique: false,\n            },\n        ];\n        let sql = create_table_sql(\"User\", \u0026fields);\n        assert_eq!(\n            sql,\n            \"CREATE TABLE IF NOT EXISTS \\\"User\\\" (id TEXT PRIMARY KEY NOT NULL, \\\"email\\\" TEXT NOT NULL UNIQUE, \\\"age\\\" INTEGER)\"\n        );\n    }\n\n    #[test]\n    fn create_index_sql_unique() {\n        let sql = create_index_sql(\"User\", \"by_email\", \u0026[\"email\".into()], true);\n        assert_eq!(\n            sql,\n            \"CREATE UNIQUE INDEX IF NOT EXISTS \\\"User_by_email\\\" ON \\\"User\\\" (\\\"email\\\")\"\n        );\n    }\n\n    #[test]\n    fn create_index_sql_non_unique() {\n        let sql = create_index_sql(\"Todo\", \"by_author\", \u0026[\"authorId\".into()], false);\n        assert_eq!(\n            sql,\n            \"CREATE INDEX IF NOT EXISTS \\\"Todo_by_author\\\" ON \\\"Todo\\\" (\\\"authorId\\\")\"\n        );\n    }\n\n    #[test]\n    fn add_column_sql_basic() {\n        let field = FieldSpec {\n            name: \"bio\".into(),\n            field_type: \"string\".into(),\n            optional: true,\n            unique: false,\n        };\n        let sql = add_column_sql(\"User\", \u0026field);\n        assert_eq!(\n            sql,\n            \"ALTER TABLE \\\"User\\\" ADD COLUMN \\\"bio\\\" TEXT\"\n        );\n    }\n\n    #[test]\n    fn plan_from_manifest() {\n        let adapter = PostgresAdapter;\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n\n        // Should have CreateEntity for User and Todo, plus AddIndex for by_author.\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"User\"\n        )));\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"Todo\"\n        )));\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::AddIndex { entity, name, .. } if entity == \"Todo\" \u0026\u0026 name == \"by_author\"\n        )));\n    }\n\n    #[test]\n    fn plan_to_sql_produces_statements() {\n        let adapter = PostgresAdapter;\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        let stmts = plan_to_sql(\u0026plan).unwrap();\n\n        assert_eq!(stmts.len(), 3); // 2 CREATE TABLE + 1 CREATE INDEX\n        assert!(stmts[0].starts_with(\"CREATE TABLE\"));\n        assert!(stmts[1].starts_with(\"CREATE TABLE\"));\n        assert!(stmts[2].starts_with(\"CREATE INDEX\"));\n    }\n\n    #[test]\n    fn plan_to_sql_rejects_unsupported() {\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveEntity {\n                name: \"User\".into(),\n            }],\n        };\n        let result = plan_to_sql(\u0026plan);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"PG_OP_UNSUPPORTED\");\n    }\n\n    #[test]\n    fn apply_not_implemented() {\n        let adapter = PostgresAdapter;\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::Noop],\n        };\n        let result = adapter.apply_schema(\u0026plan);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"APPLY_NOT_IMPLEMENTED\");\n    }\n\n    #[test]\n    fn sql_uses_quoted_identifiers() {\n        let fields = vec![FieldSpec {\n            name: \"createdAt\".into(),\n            field_type: \"datetime\".into(),\n            optional: false,\n            unique: false,\n        }];\n        let sql = create_table_sql(\"User\", \u0026fields);\n        // Postgres identifiers should be quoted for case-sensitivity.\n        assert!(sql.contains(\"\\\"User\\\"\"));\n        assert!(sql.contains(\"\\\"createdAt\\\"\"));\n        assert!(sql.contains(\"TIMESTAMPTZ\"));\n    }\n\n    // -- Introspection SQL tests --\n\n    #[test]\n    fn introspect_sql_constants_are_valid() {\n        // Sanity checks that the SQL strings exist and look reasonable.\n        assert!(INTROSPECT_TABLES_SQL.contains(\"information_schema.tables\"));\n        assert!(INTROSPECT_COLUMNS_SQL.contains(\"$1\"));\n        assert!(INTROSPECT_INDEXES_SQL.contains(\"$1\"));\n        assert!(INTROSPECT_TABLES_SQL.contains(\"_agentdb_\"));\n    }\n\n    // -- Plan from snapshot tests --\n\n    #[test]\n    fn plan_from_empty_snapshot_creates_all() {\n        let snapshot = crate::SchemaSnapshot { tables: vec![] };\n        let manifest = test_manifest();\n        let plan = plan_from_snapshot(\u0026snapshot, \u0026manifest);\n\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"User\"\n        )));\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"Todo\"\n        )));\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::AddIndex { entity, name, .. } if entity == \"Todo\" \u0026\u0026 name == \"by_author\"\n        )));\n    }\n\n    #[test]\n    fn plan_from_full_snapshot_is_noop() {\n        let snapshot = crate::SchemaSnapshot {\n            tables: vec![\n                crate::TableSnapshot {\n                    name: \"User\".into(),\n                    columns: vec![\n                        crate::ColumnSnapshot { name: \"id\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: true },\n                        crate::ColumnSnapshot { name: \"email\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"displayName\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"createdAt\".into(), column_type: \"TIMESTAMPTZ\".into(), notnull: true, primary_key: false },\n                    ],\n                    indexes: vec![],\n                },\n                crate::TableSnapshot {\n                    name: \"Todo\".into(),\n                    columns: vec![\n                        crate::ColumnSnapshot { name: \"id\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: true },\n                        crate::ColumnSnapshot { name: \"title\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"done\".into(), column_type: \"BOOLEAN\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"authorId\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"createdAt\".into(), column_type: \"TIMESTAMPTZ\".into(), notnull: true, primary_key: false },\n                    ],\n                    indexes: vec![\n                        crate::IndexSnapshot { name: \"Todo_by_author\".into(), columns: vec![\"authorId\".into()], unique: false },\n                    ],\n                },\n            ],\n        };\n        let manifest = test_manifest();\n        let plan = plan_from_snapshot(\u0026snapshot, \u0026manifest);\n        assert!(plan.is_empty());\n    }\n\n    #[test]\n    fn plan_detects_missing_column_in_snapshot() {\n        let snapshot = crate::SchemaSnapshot {\n            tables: vec![\n                crate::TableSnapshot {\n                    name: \"User\".into(),\n                    columns: vec![\n                        crate::ColumnSnapshot { name: \"id\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: true },\n                        crate::ColumnSnapshot { name: \"email\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        // missing displayName and createdAt\n                    ],\n                    indexes: vec![],\n                },\n                crate::TableSnapshot {\n                    name: \"Todo\".into(),\n                    columns: vec![\n                        crate::ColumnSnapshot { name: \"id\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: true },\n                        crate::ColumnSnapshot { name: \"title\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"done\".into(), column_type: \"BOOLEAN\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"authorId\".into(), column_type: \"TEXT\".into(), notnull: true, primary_key: false },\n                        crate::ColumnSnapshot { name: \"createdAt\".into(), column_type: \"TIMESTAMPTZ\".into(), notnull: true, primary_key: false },\n                    ],\n                    indexes: vec![\n

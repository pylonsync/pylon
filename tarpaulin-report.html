<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

                 field_type: \"string\".into(),\n                    optional: false,\n                    unique: false,\n                },\n                ManifestField {\n                    name: \"y\".into(),\n                    field_type: \"int\".into(),\n                    optional: true,\n                    unique: false,\n                },\n            ],\n        };\n        let desc = ActionDescriptor::from_manifest(\u0026ma);\n        assert_eq!(desc.name, \"doThing\");\n        assert_eq!(desc.input.len(), 2);\n        assert!(!desc.input[0].optional);\n        assert!(desc.input[1].optional);\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":22}},{"line":27,"address":[],"length":0,"stats":{"Line":66}},{"line":28,"address":[],"length":0,"stats":{"Line":44}},{"line":29,"address":[],"length":0,"stats":{"Line":22}},{"line":35,"address":[],"length":0,"stats":{"Line":14}},{"line":37,"address":[],"length":0,"stats":{"Line":42}},{"line":38,"address":[],"length":0,"stats":{"Line":28}},{"line":54,"address":[],"length":0,"stats":{"Line":6}},{"line":56,"address":[],"length":0,"stats":{"Line":12}},{"line":64,"address":[],"length":0,"stats":{"Line":4}},{"line":65,"address":[],"length":0,"stats":{"Line":20}},{"line":68,"address":[],"length":0,"stats":{"Line":2}},{"line":69,"address":[],"length":0,"stats":{"Line":14}}],"covered":13,"coverable":13},{"path":["/","Users","ericc59","Dev","agentdb","crates","auth","src","lib.rs"],"content":"use serde::{Deserialize, Serialize};\n\n// ---------------------------------------------------------------------------\n// Auth context — the identity available to runtime operations\n// ---------------------------------------------------------------------------\n\n/// The auth context for a request. Represents who is making the request.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct AuthContext {\n    /// The authenticated user ID, or None for public/anonymous access.\n    pub user_id: Option\u003cString\u003e,\n    /// Whether this is an admin context (bypasses policies).\n    #[serde(default)]\n    pub is_admin: bool,\n}\n\nimpl AuthContext {\n    /// Create an anonymous/public auth context.\n    pub fn anonymous() -\u003e Self {\n        Self { user_id: None, is_admin: false }\n    }\n\n    /// Create an authenticated auth context.\n    pub fn authenticated(user_id: String) -\u003e Self {\n        Self {\n            user_id: Some(user_id),\n            is_admin: false,\n        }\n    }\n\n    /// Create an admin auth context that bypasses all policies.\n    pub fn admin() -\u003e Self {\n        Self {\n            user_id: Some(\"__admin__\".into()),\n            is_admin: true,\n        }\n    }\n\n    /// Check if this context represents an authenticated user.\n    pub fn is_authenticated(\u0026self) -\u003e bool {\n        self.user_id.is_some()\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Auth mode — matches the route \"auth\" field values\n// ---------------------------------------------------------------------------\n\n/// The auth mode declared on a route.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum AuthMode {\n    /// Anyone can access.\n    Public,\n    /// Only authenticated users can access.\n    User,\n}\n\nimpl AuthMode {\n    /// Parse from the manifest auth string.\n    pub fn from_str(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s {\n            \"public\" =\u003e Some(AuthMode::Public),\n            \"user\" =\u003e Some(AuthMode::User),\n            _ =\u003e None,\n        }\n    }\n\n    /// Check if the given auth context satisfies this mode.\n    pub fn check(\u0026self, ctx: \u0026AuthContext) -\u003e bool {\n        match self {\n            AuthMode::Public =\u003e true,\n            AuthMode::User =\u003e ctx.is_authenticated(),\n        }\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Session — opaque token session\n// ---------------------------------------------------------------------------\n\n/// A session token and its associated user.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Session {\n    pub token: String,\n    pub user_id: String,\n}\n\nimpl Session {\n    /// Create a new session with a generated token.\n    pub fn new(user_id: String) -\u003e Self {\n        Self {\n            token: generate_token(),\n            user_id,\n        }\n    }\n\n    /// Convert this session to an auth context.\n    pub fn to_auth_context(\u0026self) -\u003e AuthContext {\n        AuthContext::authenticated(self.user_id.clone())\n    }\n}\n\n// ---------------------------------------------------------------------------\n// OAuth provider config\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct OAuthConfig {\n    pub provider: String,\n    pub client_id: String,\n    pub client_secret: String,\n    pub redirect_uri: String,\n}\n\nimpl OAuthConfig {\n    /// Generate the authorization URL for the provider.\n    pub fn auth_url(\u0026self) -\u003e String {\n        match self.provider.as_str() {\n            \"google\" =\u003e format!(\n                \"https://accounts.google.com/o/oauth2/v2/auth?client_id={}\u0026redirect_uri={}\u0026response_type=code\u0026scope=openid%20email%20profile\",\n                self.client_id, self.redirect_uri\n            ),\n            \"github\" =\u003e format!(\n                \"https://github.com/login/oauth/authorize?client_id={}\u0026redirect_uri={}\u0026scope=user:email\",\n                self.client_id, self.redirect_uri\n            ),\n            _ =\u003e String::new(),\n        }\n    }\n\n    /// Generate the token exchange URL.\n    pub fn token_url(\u0026self) -\u003e \u0026str {\n        match self.provider.as_str() {\n            \"google\" =\u003e \"https://oauth2.googleapis.com/token\",\n            \"github\" =\u003e \"https://github.com/login/oauth/access_token\",\n            _ =\u003e \"\",\n        }\n    }\n}\n\n/// OAuth provider registry.\npub struct OAuthRegistry {\n    providers: std::collections::HashMap\u003cString, OAuthConfig\u003e,\n}\n\nimpl OAuthRegistry {\n    pub fn new() -\u003e Self {\n        Self {\n            providers: std::collections::HashMap::new(),\n        }\n    }\n\n    pub fn register(\u0026mut self, config: OAuthConfig) {\n        self.providers.insert(config.provider.clone(), config);\n    }\n\n    pub fn get(\u0026self, provider: \u0026str) -\u003e Option\u003c\u0026OAuthConfig\u003e {\n        self.providers.get(provider)\n    }\n\n    /// Build from environment variables.\n    /// Looks for AGENTDB_OAUTH_GOOGLE_CLIENT_ID, etc.\n    pub fn from_env() -\u003e Self {\n        let mut reg = Self::new();\n\n        // Google\n        if let (Ok(id), Ok(secret)) = (\n            std::env::var(\"AGENTDB_OAUTH_GOOGLE_CLIENT_ID\"),\n            std::env::var(\"AGENTDB_OAUTH_GOOGLE_CLIENT_SECRET\"),\n        ) {\n            reg.register(OAuthConfig {\n                provider: \"google\".into(),\n                client_id: id,\n                client_secret: secret,\n                redirect_uri: std::env::var(\"AGENTDB_OAUTH_GOOGLE_REDIRECT\")\n                    .unwrap_or_else(|_| \"http://localhost:3000/api/auth/callback/google\".into()),\n            });\n        }\n\n        // GitHub\n        if let (Ok(id), Ok(secret)) = (\n            std::env::var(\"AGENTDB_OAUTH_GITHUB_CLIENT_ID\"),\n            std::env::var(\"AGENTDB_OAUTH_GITHUB_CLIENT_SECRET\"),\n        ) {\n            reg.register(OAuthConfig {\n                provider: \"github\".into(),\n                client_id: id,\n                client_secret: secret,\n                redirect_uri: std::env::var(\"AGENTDB_OAUTH_GITHUB_REDIRECT\")\n                    .unwrap_or_else(|_| \"http://localhost:3000/api/auth/callback/github\".into()),\n            });\n        }\n\n        reg\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Magic code auth — email verification codes\n// ---------------------------------------------------------------------------\n\n/// An in-memory magic code store for development.\npub struct MagicCodeStore {\n    codes: Mutex\u003cHashMap\u003cString, MagicCode\u003e\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct MagicCode {\n    pub email: String,\n    pub code: String,\n    pub expires_at: u64,\n}\n\nimpl MagicCodeStore {\n    pub fn new() -\u003e Self {\n        Self {\n            codes: Mutex::new(HashMap::new()),\n        }\n    }\n\n    /// Generate a 6-digit code for an email. Returns the code.\n    /// In production this would send an email. In dev it just stores and returns.\n    pub fn create(\u0026self, email: \u0026str) -\u003e String {\n        use std::time::{SystemTime, UNIX_EPOCH};\n        let ts = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_secs();\n\n        // Generate a 6-digit code from timestamp + email hash.\n        let hash = email.bytes().fold(0u64, |acc, b| acc.wrapping_mul(31).wrapping_add(b as u64));\n        let code = format!(\"{:06}\", (ts.wrapping_mul(hash)) % 1_000_000);\n\n        let mc = MagicCode {\n            email: email.to_string(),\n            code: code.clone(),\n            expires_at: ts + 600, // 10 minutes\n        };\n\n        self.codes.lock().unwrap().insert(email.to_string(), mc);\n        code\n    }\n\n    /// Verify a code for an email. Returns true if valid and not expired.\n    pub fn verify(\u0026self, email: \u0026str, code: \u0026str) -\u003e bool {\n        use std::time::{SystemTime, UNIX_EPOCH};\n        let now = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_secs();\n\n        let mut codes = self.codes.lock().unwrap();\n        if let Some(mc) = codes.get(email) {\n            if mc.code == code \u0026\u0026 mc.expires_at \u003e now {\n                codes.remove(email);\n                return true;\n            }\n        }\n        false\n    }\n}\n\nfn generate_token() -\u003e String {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let ts = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default();\n    // Simple token: timestamp + nanos. Good enough for dev.\n    format!(\"session_{}.{:09}\", ts.as_secs(), ts.subsec_nanos())\n}\n\n// ---------------------------------------------------------------------------\n// Session store — in-memory for dev\n// ---------------------------------------------------------------------------\n\nuse std::collections::HashMap;\nuse std::sync::Mutex;\n\n/// A simple in-memory session store for development.\npub struct SessionStore {\n    sessions: Mutex\u003cHashMap\u003cString, Session\u003e\u003e,\n}\n\nimpl SessionStore {\n    pub fn new() -\u003e Self {\n        Self {\n            sessions: Mutex::new(HashMap::new()),\n        }\n    }\n\n    /// Create a session for a user and return it.\n    pub fn create(\u0026self, user_id: String) -\u003e Session {\n        let session = Session::new(user_id);\n        let mut sessions = self.sessions.lock().unwrap();\n        sessions.insert(session.token.clone(), session.clone());\n        session\n    }\n\n    /// Look up a session by token.\n    pub fn get(\u0026self, token: \u0026str) -\u003e Option\u003cSession\u003e {\n        let sessions = self.sessions.lock().unwrap();\n        sessions.get(token).cloned()\n    }\n\n    /// Resolve a token to an auth context.\n    /// Returns anonymous context if the token is invalid or missing.\n    pub fn resolve(\u0026self, token: Option\u003c\u0026str\u003e) -\u003e AuthContext {\n        match token {\n            Some(t) =\u003e match self.get(t) {\n                Some(session) =\u003e session.to_auth_context(),\n                None =\u003e AuthContext::anonymous(),\n            },\n            None =\u003e AuthContext::anonymous(),\n        }\n    }\n\n    /// Remove a session.\n    pub fn revoke(\u0026self, token: \u0026str) -\u003e bool {\n        let mut sessions = self.sessions.lock().unwrap();\n        sessions.remove(token).is_some()\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn anonymous_context() {\n        let ctx = AuthContext::anonymous();\n        assert!(!ctx.is_authenticated());\n        assert!(ctx.user_id.is_none());\n    }\n\n    #[test]\n    fn authenticated_context() {\n        let ctx = AuthContext::authenticated(\"user-1\".into());\n        assert!(ctx.is_authenticated());\n        assert_eq!(ctx.user_id, Some(\"user-1\".into()));\n    }\n\n    #[test]\n    fn auth_mode_public_allows_anonymous() {\n        let mode = AuthMode::Public;\n        assert!(mode.check(\u0026AuthContext::anonymous()));\n        assert!(mode.check(\u0026AuthContext::authenticated(\"user-1\".into())));\n    }\n\n    #[test]\n    fn auth_mode_user_requires_authenticated() {\n        let mode = AuthMode::User;\n        assert!(!mode.check(\u0026AuthContext::anonymous()));\n        assert!(mode.check(\u0026AuthContext::authenticated(\"user-1\".into())));\n    }\n\n    #[test]\n    fn auth_mode_from_str() {\n        assert_eq!(AuthMode::from_str(\"public\"), Some(AuthMode::Public));\n        assert_eq!(AuthMode::from_str(\"user\"), Some(AuthMode::User));\n        assert_eq!(AuthMode::from_str(\"admin\"), None);\n    }\n\n    #[test]\n    fn session_store_create_and_get() {\n        let store = SessionStore::new();\n        let session = store.create(\"user-1\".into());\n        assert!(!session.token.is_empty());\n\n        let retrieved = store.get(\u0026session.token).unwrap();\n        assert_eq!(retrieved.user_id, \"user-1\");\n    }\n\n    #[test]\n    fn session_store_resolve() {\n        let store = SessionStore::new();\n        let session = store.create(\"user-1\".into());\n\n        let ctx = store.resolve(Some(\u0026session.token));\n        assert!(ctx.is_authenticated());\n        assert_eq!(ctx.user_id, Some(\"user-1\".into()));\n\n        let anon = store.resolve(None);\n        assert!(!anon.is_authenticated());\n\n        let bad = store.resolve(Some(\"invalid-token\"));\n        assert!(!bad.is_authenticated());\n    }\n\n    #[test]\n    fn session_store_revoke() {\n        let store = SessionStore::new();\n        let session = store.create(\"user-1\".into());\n\n        assert!(store.revoke(\u0026session.token));\n        assert!(store.get(\u0026session.token).is_none());\n        assert!(!store.revoke(\u0026session.token)); // already revoked\n    }\n\n    #[test]\n    fn session_to_auth_context() {\n        let session = Session::new(\"user-42\".into());\n        let ctx = session.to_auth_context();\n        assert_eq!(ctx.user_id, Some(\"user-42\".into()));\n    }\n\n    // -- Admin context --\n\n    #[test]\n    fn admin_context() {\n        let ctx = AuthContext::admin();\n        assert!(ctx.is_admin);\n        assert!(ctx.is_authenticated());\n    }\n\n    #[test]\n    fn anonymous_not_admin() {\n        let ctx = AuthContext::anonymous();\n        assert!(!ctx.is_admin);\n    }\n\n    #[test]\n    fn authenticated_not_admin() {\n        let ctx = AuthContext::authenticated(\"user-1\".into());\n        assert!(!ctx.is_admin);\n    }\n\n    // -- Magic codes --\n\n    #[test]\n    fn magic_code_create_and_verify() {\n        let store = MagicCodeStore::new();\n        let code = store.create(\"test@example.com\");\n        assert_eq!(code.len(), 6);\n        assert!(store.verify(\"test@example.com\", \u0026code));\n    }\n\n    #[test]\n    fn magic_code_wrong_code_rejected() {\n        let store = MagicCodeStore::new();\n        store.create(\"test@example.com\");\n        assert!(!store.verify(\"test@example.com\", \"000000\"));\n    }\n\n    #[test]\n    fn magic_code_wrong_email_rejected() {\n        let store = MagicCodeStore::new();\n        let code = store.create(\"test@example.com\");\n        assert!(!store.verify(\"other@example.com\", \u0026code));\n    }\n\n    #[test]\n    fn magic_code_consumed_after_verify() {\n        let store = MagicCodeStore::new();\n        let code = store.create(\"test@example.com\");\n        assert!(store.verify(\"test@example.com\", \u0026code));\n        // Second verify should fail — code consumed.\n        assert!(!store.verify(\"test@example.com\", \u0026code));\n    }\n\n    #[test]\n    fn magic_code_different_emails_independent() {\n        let store = MagicCodeStore::new();\n        let code1 = store.create(\"alice@example.com\");\n        let code2 = store.create(\"bob@example.com\");\n        // Each email has its own code.\n        assert!(store.verify(\"alice@example.com\", \u0026code1));\n        assert!(store.verify(\"bob@example.com\", \u0026code2));\n    }\n\n    // -- OAuth registry --\n\n    #[test]\n    fn oauth_registry_empty() {\n        let reg = OAuthRegistry::new();\n        assert!(reg.get(\"google\").is_none());\n    }\n\n    #[test]\n    fn oauth_registry_register_and_get() {\n        let mut reg = OAuthRegistry::new();\n        reg.register(OAuthConfig {\n            provider: \"google\".into(),\n            client_id: \"test-id\".into(),\n            client_secret: \"test-secret\".into(),\n            redirect_uri: \"http://localhost/callback\".into(),\n        });\n        let config = reg.get(\"google\").unwrap();\n        assert_eq!(config.client_id, \"test-id\");\n        assert!(config.auth_url().contains(\"accounts.google.com\"));\n    }\n\n    #[test]\n    fn oauth_auth_url_github() {\n        let config = OAuthConfig {\n            provider: \"github\".into(),\n            client_id: \"gh-id\".into(),\n            client_secret: \"gh-secret\".into(),\n            redirect_uri: \"http://localhost/cb\".into(),\n        };\n        assert!(config.auth_url().contains(\"github.com\"));\n        assert!(config.auth_url().contains(\"gh-id\"));\n    }\n}\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":18}},{"line":24,"address":[],"length":0,"stats":{"Line":17}},{"line":26,"address":[],"length":0,"stats":{"Line":17}},{"line":32,"address":[],"length":0,"stats":{"Line":4}},{"line":34,"address":[],"length":0,"stats":{"Line":4}},{"line":40,"address":[],"length":0,"stats":{"Line":19}},{"line":41,"address":[],"length":0,"stats":{"Line":38}},{"line":60,"address":[],"length":0,"stats":{"Line":6}},{"line":61,"address":[],"length":0,"stats":{"Line":6}},{"line":62,"address":[],"length":0,"stats":{"Line":8}},{"line":63,"address":[],"length":0,"stats":{"Line":6}},{"line":64,"address":[],"length":0,"stats":{"Line":2}},{"line":69,"address":[],"length":0,"stats":{"Line":8}},{"line":70,"address":[],"length":0,"stats":{"Line":8}},{"line":71,"address":[],"length":0,"stats":{"Line":4}},{"line":72,"address":[],"length":0,"stats":{"Line":8}},{"line":90,"address":[],"length":0,"stats":{"Line":8}},{"line":92,"address":[],"length":0,"stats":{"Line":8}},{"line":98,"address":[],"length":0,"stats":{"Line":4}},{"line":99,"address":[],"length":0,"stats":{"Line":12}},{"line":117,"address":[],"length":0,"stats":{"Line":6}},{"line":118,"address":[],"length":0,"stats":{"Line":6}},{"line":119,"address":[],"length":0,"stats":{"Line":8}},{"line":123,"address":[],"length":0,"stats":{"Line":8}},{"line":127,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":0}},{"line":133,"address":[],"length":0,"stats":{"Line":0}},{"line":134,"address":[],"length":0,"stats":{"Line":0}},{"line":135,"address":[],"length":0,"stats":{"Line":0}},{"line":136,"address":[],"length":0,"stats":{"Line":0}},{"line":147,"address":[],"length":0,"stats":{"Line":4}},{"line":149,"address":[],"len ,"crates","cli","src","bun.rs"],"content":"use agentdb_core::Diagnostic;\nuse agentdb_core::Severity;\n\nuse crate::manifest::parse_manifest;\n\n/// Run a TS entry file with Bun and return the trimmed stdout as manifest JSON.\n/// Validates that the output parses as a valid manifest.\npub fn run_bun_codegen(entry_file: \u0026str) -\u003e Result\u003cString, Diagnostic\u003e {\n    let output = std::process::Command::new(\"bun\")\n        .arg(\"run\")\n        .arg(entry_file)\n        .output()\n        .map_err(|e| Diagnostic {\n            severity: Severity::Error,\n            code: \"BUN_EXEC_FAILED\".into(),\n            message: format!(\"Failed to execute bun: {e}\"),\n            span: None,\n            hint: Some(\"Ensure bun is installed and available on PATH\".into()),\n        })?;\n\n    if !output.status.success() {\n        let stderr = String::from_utf8_lossy(\u0026output.stderr);\n        let stdout = String::from_utf8_lossy(\u0026output.stdout);\n        let detail = if !stderr.is_empty() {\n            stderr.trim().to_string()\n        } else {\n            stdout.trim().to_string()\n        };\n        return Err(Diagnostic {\n            severity: Severity::Error,\n            code: \"BUN_EXIT\".into(),\n            message: format!(\n                \"bun run {entry_file} exited with status {}\",\n                output.status.code().unwrap_or(-1)\n            ),\n            span: None,\n            hint: if detail.is_empty() { None } else { Some(detail) },\n        });\n    }\n\n    let manifest_json = String::from_utf8_lossy(\u0026output.stdout).trim().to_string();\n\n    // Validate it parses as a manifest.\n    parse_manifest(\u0026manifest_json, entry_file).map_err(|diags| Diagnostic {\n        severity: Severity::Error,\n        code: \"BUN_INVALID_OUTPUT\".into(),\n        message: \"Output is not a valid manifest\".into(),\n        span: None,\n        hint: diags.first().map(|d| d.message.clone()),\n    })?;\n\n    Ok(manifest_jso n        \"int\" =\u003e \"number\",\n        \"float\" =\u003e \"number\",\n        \"bool\" =\u003e \"boolean\",\n        \"datetime\" =\u003e \"string\",\n        \"richtext\" =\u003e \"string\",\n        _ if field_type.starts_with(\"id(\") =\u003e \"string\",\n        _ =\u003e \"unknown\",\n    }\n}\n\n/// Generate a TypeScript client bindings file from a manifest.\npub fn generate_client_ts(manifest: \u0026AppManifest) -\u003e String {\n    let mut out = String::new();\n\n    out.push_str(\"// Generated by agentdb codegen client. Do not edit.\\n\\n\");\n\n    // Entity names\n    if !manifest.entities.is_empty() {\n        let names: Vec\u003cString\u003e = manifest\n            .entities\n            .iter()\n            .map(|e| format!(\"\\\"{}\\\"\", e.name))\n            .collect();\n        out.push_str(\u0026format!(\n            \"export type EntityName = {};\\n\\n\",\n            names.join(\" | \")\n        ));\n\n        out.push_str(\u0026format!(\n            \"export const ENTITIES: EntityName[] = [{}];\\n\\n\",\n            names.join(\", \")\n        ));\n    }\n\n    // Entity field interfaces\n    for entity in \u0026manifest.entities {\n        out.push_str(\u0026format!(\"export interface {} {{\\n\", entity.name));\n        out.push_str(\"  id: string;\\n\");\n        for field in \u0026entity.fields {\n            let ts = ts_type(\u0026field.field_type);\n            let optional = if field.optional { \"?\" } else { \"\" };\n            out.push_str(\u0026format!(\"  {}{}: {};\\n\", field.name, optional, ts));\n        }\n        out.push_str(\"}\\n\\n\");\n    }\n\n    // Query names\n    if !manifest.queries.is_empty() {\n        let names: Vec\u003cString\u003e = manifest\n            .queries\n            .iter()\n            .map(|q| format!(\"\\\"{}\\\"\", q.name))\n            .collect();\n        out.push_str(\u0026format!(\n            \"export type QueryName = {};\\n\\n\",\n            names.join(\" | \")\n        ));\n\n        out.push_str(\u0026format!(\n            \"export const QUERIES: QueryName[] = [{}];\\n\\n\",\n            names.join(\", \")\n        ));\n    }\n\n    // Query input interfaces\n    for query in \u0026manifest.queries {\n        if !query.input.is_empty() {\n            out.push_str(\u0026format!(\"export interface {}Input {{\\n\", capitalize(\u0026query.name)));\n            for field in \u0026query.input {\n                let ts = ts_type(\u0026field.field_type);\n                let optional = if field.optional { \"?\" } else { \"\" };\n                out.push_str(\u0026format!(\"  {}{}: {};\\n\", field.name, optional, ts));\n            }\n            out.push_str(\"}\\n\\n\");\n        }\n    }\n\n    // Action names\n    if !manifest.actions.is_empty() {\n        let names: Vec\u003cString\u003e = manifest\n            .actions\n            .iter()\n            .map(|a| format!(\"\\\"{}\\\"\", a.name))\n            .collect();\n        out.push_str(\u0026format!(\n            \"export type ActionName = {};\\n\\n\",\n            names.join(\" | \")\n        ));\n\n        out.push_str(\u0026format!(\n            \"export const ACTIONS: ActionName[] = [{}];\\n\\n\",\n            names.join(\", \")\n        ));\n    }\n\n    // Action input interfaces\n    for action in \u0026manifest.actions {\n        if !action.input.is_empty() {\n            out.push_str(\u0026format!(\"export interface {}Input {{\\n\", capitalize(\u0026action.name)));\n            for field in \u0026action.input {\n                let ts = ts_type(\u0026field.field_type);\n                let optional = if field.optional { \"?\" } else { \"\" };\n                out.push_str(\u0026format!(\"  {}{}: {};\\n\", field.name, optional, ts));\n            }\n            out.push_str(\"}\\n\\n\");\n        }\n    }\n\n    // Runtime client\n    out.push_str(\"// ---------------------------------------------------------------------------\\n\");\n    out.push_str(\"// Runtime client\\n\");\n    out.push_str(\"// ---------------------------------------------------------------------------\\n\\n\");\n\n    out.push_str(\"const DEFAULT_BASE_URL = \\\"http://localhost:4321\\\";\\n\\n\");\n\n    out.push_str(\"async function _request(baseUrl: string, method: string, path: string, body?: unknown, token?: string): Promise\u003cunknown\u003e {\\n\");\n    out.push_str(\"  const headers: Record\u003cstring, string\u003e = {};\\n\");\n    out.push_str(\"  if (body) headers[\\\"Content-Type\\\"] = \\\"application/json\\\";\\n\");\n    out.push_str(\"  if (token) headers[\\\"Authorization\\\"] = `Bearer ${token}`;\\n\");\n    out.push_str(\"  const res = await fetch(`${baseUrl}${path}`, {\\n\");\n    out.push_str(\"    method,\\n\");\n    out.push_str(\"    headers,\\n\");\n    out.push_str(\"    body: body ? JSON.stringify(body) : undefined,\\n\");\n    out.push_str(\"  });\\n\");\n    out.push_str(\"  if (!res.ok) {\\n\");\n    out.push_str(\"    const err = await res.json().catch(() =\u003e ({})) as Record\u003cstring, unknown\u003e;\\n\");\n    out.push_str(\"    const errorObj = err?.error as Record\u003cstring, unknown\u003e | undefined;\\n\");\n    out.push_str(\"    throw new Error((errorObj?.message as string) ?? `HTTP ${res.status}`);\\n\");\n    out.push_str(\"  }\\n\");\n    out.push_str(\"  return res.json();\\n\");\n    out.push_str(\"}\\n\\n\");\n\n    // CRUD client\n    out.push_str(\"export interface AgentDBClient {\\n\");\n    out.push_str(\"  list(entity: EntityName): Promise\u003cRecord\u003cstring, unknown\u003e[]\u003e;\\n\");\n    out.push_str(\"  get(entity: EntityName, id: string): Promise\u003cRecord\u003cstring, unknown\u003e | null\u003e;\\n\");\n    out.push_str(\"  insert(entity: EntityName, data: Record\u003cstring, unknown\u003e): Promise\u003c{ id: string }\u003e;\\n\");\n    out.push_str(\"  update(entity: EntityName, id: string, data: Record\u003cstring, unknown\u003e): Promise\u003c{ updated: boolean }\u003e;\\n\");\n    out.push_str(\"  remove(entity: EntityName, id: string): Promise\u003c{ deleted: boolean }\u003e;\\n\");\n    out.push_str(\"  action(name: ActionName, input: Record\u003cstring, unknown\u003e): Promise\u003cActionResult\u003e;\\n\");\n    out.push_str(\"  actions: Actions;\\n\");\n    out.push_str(\"}\\n\\n\");\n\n    out.push_str(\"export interface ActionResult {\\n\");\n    out.push_str(\"  action: string;\\n\");\n    out.push_str(\"  input: Record\u003cstring, unknown\u003e;\\n\");\n    out.push_str(\"  executed: boolean;\\n\");\n    out.push_str(\"}\\n\\n\");\n\n    // Typed actions interface\n    out.push_str(\"export interface Actions {\\n\");\n    for action in \u0026manifest.actions {\n        let input_type = if action.input.is_empty() {\n            \"Record\u003cstring, never\u003e\".to_string()\n        } else {\n            format!(\"{}Input\", capitalize(\u0026action.name))\n        };\n        out.push_str(\u0026format!(\n            \"  {}(input: {}): Promise\u003cActionResult\u003e;\\n\",\n            action.name, input_type\n        ));\n    }\n    out.push_str(\"}\\n\\n\");\n\n    out.push_str(\"export function createClient(baseUrl: string = DEFAULT_BASE_URL, token?: string): AgentDBClient {\\n\");\n    out.push_str(\"  const req = (method: string, path: string, body?: unknown) =\u003e _request(baseUrl, method, path, body, token);\\n\\n\");\n\n    // Typed actions object\n    out.push_str(\"  const actions: Actions = {\\n\");\n    for action in \u0026manifest.actions {\n        out.push_str(\u0026format!(\n            \"    {name}: (input) =\u003e req(\\\"POST\\\", \\\"/api/actions/{name}\\\", input) as Promise\u003cActionResult\u003e,\\n\",\n            name = action.name\n        ));\n    }\n    out.push_str(\"  };\\n\\n\");\n\n    out.push_str(\"  return {\\n\");\n    out.push_str(\"    list: (entity) =\u003e req(\\\"GET\\\", `/api/entities/${entity}`) as Promise\u003cRecord\u003cstring, unknown\u003e[]\u003e,\\n\");\n    out.push_str(\"    get: (entity, 0}}],"covered":0,"coverable":76},{"path":["/","Users","ericc59","Dev","agentdb","crates","cli","src","commands","dev.rs"],"content":"use std::collections::HashMap;\nuse std::path::Path;\nuse std::sync::Arc;\nuse std::time::{Duration, SystemTime};\n\nuse agentdb_core::{Diagnostic, ExitCode, Severity};\nuse serde::Serialize;\n\nuse crate::bun::run_bun_codegen;\nuse crate::client_codegen::generate_client_ts;\nuse crate::manifest::{parse_manifest, validate_all};\nuse crate::output::{print_diagnostics, print_json};\n\nconst DEFAULT_PORT: u16 = 4321;\n\n// ---------------------------------------------------------------------------\n// Output types\n// ---------------------------------------------------------------------------\n\n#[derive(Serialize)]\nstruct DevOutput {\n    code: \u0026'static str,\n    name: String,\n    version: String,\n    entry: String,\n    entities: Vec\u003cString\u003e,\n    queries: Vec\u003cString\u003e,\n    actions: Vec\u003cString\u003e,\n    policies: Vec\u003cString\u003e,\n    routes: Vec\u003cString\u003e,\n    warnings: Vec\u003cDevWarning\u003e,\n}\n\n#[derive(Serialize)]\nstruct DevWarning {\n    code: String,\n    message: String,\n}\n\n#[derive(Serialize)]\nstruct WatchEvent {\n    code: \u0026'static str,\n    rebuild: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    name: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    version: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    error: Option\u003cString\u003e,\n    diagnostics: Vec\u003cDiagnostic\u003e,\n}\n\n// ---------------------------------------------------------------------------\n// Entry point\n// ---------------------------------------------------------------------------\n\npub fn run(args: \u0026[String], json_mode: bool) -\u003e ExitCode {\n    let once_mode = args.iter().any(|a| a == \"--once\");\n\n    let port: u16 = args\n        .windows(2)\n        .find(|w| w[0] == \"--port\")\n        .and_then(|w| w[1].parse().ok())\n        .unwrap_or(DEFAULT_PORT);\n\n    let positional: Vec\u003c\u0026str\u003e = args\n        .iter()\n        .filter(|a| !a.starts_with('-') \u0026\u0026 *a != \"dev\")\n        .map(|s| s.as_str())\n        .collect();\n\n    let entry_file = match positional.first() {\n        Some(f) =\u003e f.to_string(),\n        None =\u003e {\n            if Path::new(\"app.ts\").exists() {\n                \"app.ts\".to_string()\n            } else {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: \"DEV_NO_ENTRY\".into(),\n                        message: \"No entry file provided and no app.ts found in current directory\"\n                            .into(),\n                        span: None,\n                        hint: Some(\"Usage: agentdb dev [app.ts] [--once]\".into()),\n                    }],\n                    json_mode,\n                );\n                return ExitCode::Usage;\n            }\n        }\n    };\n\n    if !Path::new(\u0026entry_file).exists() {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"DEV_ENTRY_NOT_FOUND\".into(),\n                message: format!(\"Entry file not found: {entry_file}\"),\n                span: None,\n                hint: Some(\n                    \"Provide a path to a .ts file that exports a manifest via buildManifest\".into(),\n                ),\n            }],\n            json_mode,\n        );\n        return ExitCode::Error;\n    }\n\n    if once_mode {\n        run_once(\u0026entry_file, json_mode)\n    } else {\n        run_watch(\u0026entry_file, json_mode, port)\n    }\n}\n\n// ---------------------------------------------------------------------------\n// One-shot mode (existing behavior)\n// ---------------------------------------------------------------------------\n\nfn run_once(entry_file: \u0026str, json_mode: bool) -\u003e ExitCode {\n    let manifest_json = match run_bun_codegen(entry_file) {\n        Ok(json) =\u003e json,\n        Err(diag) =\u003e {\n            print_diagnostics(\u0026[diag], json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let manifest = match parse_manifest(\u0026manifest_json, entry_file) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let diagnostics = validate_all(\u0026manifest);\n    let has_errors = diagnostics.iter().any(|d| d.severity == Severity::Error);\n\n    if has_errors {\n        print_diagnostics(\u0026diagnostics, json_mode);\n        return ExitCode::Error;\n    }\n\n    // Write generated files alongside the entry file.\n    write_generated_files(entry_file, \u0026manifest_json, \u0026manifest);\n\n    if json_mode {\n        let output = DevOutput {\n            code: \"DEV_OK\",\n            name: manifest.name.clone(),\n            version: manifest.version.clone(),\n            entry: entry_file.to_string(),\n            entities: manifest.entities.iter().map(|e| e.name.clone()).collect(),\n            queries: manifest.queries.iter().map(|q| q.name.clone()).collect(),\n            actions: manifest.actions.iter().map(|a| a.name.clone()).collect(),\n            policies: manifest.policies.iter().map(|p| p.name.clone()).collect(),\n            routes: manifest.routes.iter().map(|r| r.path.clone()).collect(),\n            warnings: diagnostics\n                .iter()\n                .filter(|d| d.severity == Severity::Warning)\n                .map(|d| DevWarning {\n                    code: d.code.clone(),\n                    message: d.message.clone(),\n                })\n                .collect(),\n        };\n        print_json(\u0026output);\n    } else {\n        println!(\"agentdb dev\");\n        println!();\n        println!(\"  App:       {} v{}\", manifest.name, manifest.version);\n        println!(\"  Entry:     {entry_file}\");\n        println!(\"  Entities:  {}\", manifest.entities.len());\n        println!(\"  Queries:   {}\", manifest.queries.len());\n        println!(\"  Actions:   {}\", manifest.actions.len());\n        println!(\"  Policies:  {}\", manifest.policies.len());\n        println!(\"  Routes:    {}\", manifest.routes.len());\n        println!();\n\n        if !diagnostics.is_empty() {\n            for d in \u0026diagnostics {\n                println!(\"  {d}\");\n            }\n            println!();\n        }\n\n        println!(\"Schema valid. Use 'agentdb dev' (without --once) to start the dev server.\");\n    }\n\n    ExitCode::Ok\n}\n\n// ---------------------------------------------------------------------------\n// Watch mode\n// ---------------------------------------------------------------------------\n\nfn run_watch(entry_file: \u0026str, json_mode: bool, port: u16) -\u003e ExitCode {\n    let entry_path = Path::new(entry_file);\n    let watch_dir = entry_path.parent().unwrap_or(Path::new(\".\"));\n\n    if !json_mode {\n        println!(\"agentdb dev\");\n        println!(\"  Watching: {} (*.ts)\", watch_dir.display());\n        println!(\"  Server:   http://localhost:{port}\");\n        println!();\n    }\n\n    // Initial build — also start the dev server on success.\n    let mut rebuild_count: u32 = 0;\n    let manifest = run_rebuild_and_get_manifest(entry_file, json_mode, \u0026mut rebuild_count);\n\n    // Start dev server in background if initial build succeeded.\n    if let Some(m) = manifest {\n        let db_path = watch_dir.join(\"agentdb.dev.db\");\n        let db_str = db_path.to_string_lossy().to_string();\n\n        // Auto-push schema to the dev database.\n        if let Ok(adapter) = agentdb_storage::sqlite::SqliteAdapter::open(\u0026db_str) {\n            if let Ok(plan) = adapter.plan_from_live(\u0026m) {\n                let meta = agentdb_storage::sqlite::PushMetadata {\n                    manifest_version: m.manifest_version,\n                    app_version: \u0026m.version,\n                    baseline: \"dev\",\n                };\n                let _ = adapter.apply_with_history(\u0026plan, \u0026meta);\n                if !json_mode \u0026\u0026 !plan.is_empty() {\n                    println!(\"  Database: {db_str} (schema synced)\");\n                    println!();\n                }\n            }\n        }\n\n        // Open runtime against the persistent DB.\n        let runtime = match agentdb_runtime::Runtime::open(\u0026db_str, m) {\n            Ok(rt) =\u003e Arc::new(rt),\n            Err(e) =\u003e {\n                if !json_mode {\n                    eprintln!(\"[dev] Failed to start runtime: {e}\");\n                }\n                return ExitCode::Error;\n            }\n        };\n\n        let rt_clone = Arc::clone(\u0026runtime);\n        std::thread::spawn(move || {\n            let _ = agentdb_runtime::server::start(rt_clone, port);\n        });\n    }\n\n    // Poll loop.\n    let mut last_mtimes = collect_ts_mtimes(watch_dir);\n\n    loop {\n        std::thread::sleep(Duration::from_millis(500));\n\n        let current_mtimes = collect_ts_mtimes(watch_dir);\n        if current_mtimes != last_mtimes {\n            last_mtimes = current_mtimes;\n            run_rebuild(entry_file, json_mode, \u0026mut rebuild_count);\n        }\n    }\n}\n\n/// Like run_rebuild but returns the manifest on success (for server init).\nfn run_rebuild_and_get_manifest(\n    entry_file: \u0026str,\n    json_mode: bool,\n    count: \u0026mut u32,\n) -\u003e Option\u003cagentdb_core::AppManifest\u003e {\n    *count += 1;\n    let n = *count;\n\n    let manifest_json = match run_bun_codegen(entry_file) {\n        Ok(json) =\u003e json,\n        Err(diag) =\u003e {\n            if json_mode {\n                print_json(\u0026WatchEvent {\n                    code: \"DEV_ERROR\",\n                    rebuild: n,\n                    name: None,\n                    version: None,\n                    error: Some(diag.message.clone()),\n                    diagnostics: vec![diag],\n                });\n            } else {\n                eprintln!(\"[{n}] Error: {}\", diag.message);\n            }\n            return None;\n        }\n    };\n\n    let manifest = match parse_manifest(\u0026manifest_json, entry_file) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            if json_mode {\n                print_json(\u0026WatchEvent {\n                    code: \"DEV_ERROR\",\n                    rebuild: n,\n                    name: None,\n                    version: None,\n                    error: Some(diags.first().map(|d| d.message.clone()).unwrap_or_default()),\n                    diagnostics: diags,\n                });\n            } else {\n                for d in \u0026diags {\n                    eprintln!(\"[{n}] {d}\");\n                }\n            }\n            return None;\n        }\n    };\n\n    let diagnostics = validate_all(\u0026manifest);\n    let has_errors = diagnostics.iter().any(|d| d.severity == Severity::Error);\n\n    if !has_errors {\n        write_generated_files(entry_file, \u0026manifest_json, \u0026manifest);\n    }\n\n    if json_mode {\n        print_json(\u0026WatchEvent {\n            code: if has_errors { \"DEV_ERROR\" } else { \"DEV_OK\" },\n            rebuild: n,\n            name: Some(manifest.name.clone()),\n            version: Some(manifest.version.clone()),\n            error: None,\n            diagnostics: diagnostics.clone(),\n        });\n    } else if has_errors {\n        for d in \u0026diagnostics {\n            eprintln!(\"[{n}] {d}\");\n        }\n    } else {\n        println!(\n            \"[{n}] OK: {} v{} — {} entities, {} queries, {} actions, {} policies, {} routes\",\n            manifest.name,\n            manifest.version,\n            manifest.entities.len(),\n            manifest.queries.len(),\n            manifest.actions.len(),\n            manifest.policies.len(),\n            manifest.routes.len(),\n        );\n    }\n\n    if has_errors { None } else { Some(manifest) }\n}\n\nfn run_rebuild(entry_file: \u0026str, json_mode: bool, count: \u0026mut u32) {\n    *count += 1;\n    let n = *count;\n\n    let manifest_json = match run_bun_codegen(entry_file) {\n        Ok(json) =\u003e json,\n        Err(diag) =\u003e {\n            if json_mode {\n                print_json(\u0026WatchEvent {\n                    code: \"DEV_ERROR\",\n                    rebuild: n,\n                    name: None,\n                    version: None,\n                    error: Some(diag.message.clone()),\n                    diagnostics: vec![diag],\n                });\n            } else {\n                eprintln!(\"[{n}] Error: {}\", diag.message);\n            }\n            return;\n        }\n    };\n\n    let manifest = match parse_manifest(\u0026manifest_json, entry_file) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            if json_mode {\n                print_json(\u0026WatchEvent {\n                    code: \"DEV_ERROR\",\n                    rebuild: n,\n                    name: None,\n                    version: None,\n                    error: Some(diags.first().map(|d| d.message.clone()).unwrap_or_default()),\n                    diagnostics: diags,\n                });\n            } else {\n                for d in \u0026diags {\n                    eprintln!(\"[{n}] {d}\");\n                }\n            }\n            return;\n        }\n    };\n\n    let diagnostics = validate_all(\u0026manifest);\n    let has_errors = diagnostics.iter().any(|d| d.severity == Severity::Error);\n\n    // Write generated files on success.\n    if !has_errors {\n        write_generated_files(entry_file, \u0026manifest_json, \u0026manifest);\n    }\n\n    if json_mode {\n        print_json(\u0026WatchEvent {\n            code: if has_errors { \"DEV_ERROR\" } else { \"DEV_OK\" },\n            rebuild: n,\n            name: Some(manifest.name.clone()),\n            version: Some(manifest.version.clone()),\n            error: None,\n            diagnostics: diagnostics.clone(),\n        });\n    } else if has_errors {\n        for d in \u0026diagnostics {\n            eprintln!(\"[{n}] {d}\");\n        }\n    } else {\n        println!(\n            \"[{n}] OK: {} v{} — {} entities, {} queries, {} actions, {} policies, {} routes\",\n            manifest.name,\n            manifest.version,\n            manifest.entities.len(),\n            manifest.queries.len(),\n            manifest.actions.len(),\n            manifest.policies.len(),\n            manifest.routes.len(),\n        );\n    }\n}\n\n/// Collect mtime of all `.ts` files in a directory (non-recursive).\n/// Write generated manifest and client bindings alongside the entry file.\nfn write_generated_files(\n    entry_file: \u0026str,\n    manifest_json: \u0026str,\n    manifest: \u0026agentdb_core::AppManifest,\n) {\n    let entry_path = Path::new(entry_file);\n    let dir = entry_path.parent().unwrap_or(Path::new(\".\"));\n\n    // Write manifest.\n    let manifest_path = dir.join(\"agentdb.manifest.json\");\n    let _ = std::fs::write(\u0026manifest_path, format!(\"{manifest_json}\\n\"));\n\n    // Write client bindings.\n    let client_path = dir.join(\"agentdb.client.ts\");\n    let client_ts = generate_client_ts(manifest);\n    let _ = std::fs::write(\u0026client_path, client_ts);\n}\n\n/// Collect mtime of `.ts` files in a directory, excluding generated files.\nfn collect_ts_mtimes(dir: \u0026Path) -\u003e HashMap\u003cString, SystemTime\u003e {\n    let mut mtimes = HashMap::new();\n    if let Ok(entries) = std::fs::read_dir(dir) {\n        for entry in entries.flatten() {\n            let path = entry.path();\n            if path.extension().and_then(|e| e.to_str()) == Some(\"ts\" .json\");\n\n    let manifest = match load_manifest(manifest_path) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    if json_mode {\n        print_json(\u0026manifest);\n    } else {\n        println!(\"App: {} v{} (manifest v{})\", manifest.name, manifest.version, manifest.manifest_version);\n        println!();\n        println!(\"Entities:\");\n        for entity in \u0026manifest.entities {\n            println!(\"  {}\", entity.name);\n            for field in \u0026entity.fields {\n                let mut modifiers = Vec::new();\n                if field.optional {\n                    modifiers.push(\"optional\");\n                }\n                if field.unique {\n                    modifiers.push(\"unique\");\n                }\n                let mod_str = if modifiers.is_empty() {\n                    String::new()\n                } else {\n                    format!(\" ({})\", modifiers.join(\", \"))\n                };\n                println!(\"    {}: {}{}\", field.name, field.field_type, mod_str);\n            }\n            for index in \u0026entity.indexes {\n                let unique_str = if index.unique { \" [unique]\" } else { \"\" };\n                println!(\n                    \"    index {}: [{}]{}\",\n                    index.name,\n                    index.fields.join(\", \"),\n                    unique_str\n                );\n            }\n        }\n        if !manifest.queries.is_empty() {\n            println!();\n            println!(\"Queries:\");\n            for query in \u0026manifest.queries {\n                if query.input.is_empty() {\n                    println!(\"  {}\", query.name);\n                } else {\n                    let inputs: Vec\u003cString\u003e = query\n                        .input\n                        .iter()\n                        .map(|f| format!(\"{}: overable":72},{"path":["/","Users","ericc59","Dev","agentdb","crates","cli","src","commands","init.rs"],"content":"use std::path::Path;\n\nuse agentdb_core::{Diagnostic, ExitCode, Severity};\nuse serde::Serialize;\n\nuse crate::bun::run_bun_codegen;\nuse crate::client_codegen::generate_client_ts;\nuse crate::manifest::parse_manifest;\nuse crate::output::{print_diagnostics, print_json};\n\nconst TEMPLATE_BASIC_APP: \u0026str = include_str!(\"../../../../templates/basic/app.ts\");\nconst TEMPLATE_BASIC_TSCONFIG: \u0026str = include_str!(\"../../../../templates/basic/tsconfig.json\");\nconst SDK_SOURCE: \u0026str = include_str!(\"../../../../packages/sdk/src/index.ts\");\n\n#[derive(Serialize)]\nstruct InitOutput {\n    code: \u0026'static str,\n    name: String,\n    path: String,\n    template: String,\n    files: Vec\u003cString\u003e,\n}\n\npub fn run(args: \u0026[String], json_mode: bool) -\u003e ExitCode {\n    let flag_values: std::collections::HashSet\u003c\u0026str\u003e = args\n        .windows(2)\n        .filter(|w| w[0] == \"--template\")\n        .map(|w| w[1].as_str())\n        .collect();\n\n    let positional: Vec\u003c\u0026str\u003e = args\n        .iter()\n        .filter(|a| !a.starts_with('-') \u0026\u0026 *a != \"init\" \u0026\u0026 !flag_values.contains(a.as_str()))\n        .map(|s| s.as_str())\n        .collect();\n\n    let template = args\n        .windows(2)\n        .find(|w| w[0] == \"--template\")\n        .map(|w| w[1].as_str())\n        .unwrap_or(\"basic\");\n\n    let target_arg = match positional.first() {\n        Some(n) =\u003e *n,\n        None =\u003e {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Error,\n                    code: \"INIT_NO_PATH\".into(),\n                    message: \"No target path provided\".into(),\n                    span: None,\n                    hint: Some(\"Usage: agentdb init \u003cpath\u003e [--template basic]\".into()),\n                }],\n                json_mode,\n            );\n            return ExitCode::Usage;\n        }\n    };\n\n    let target = Path::new(target_arg);\n\n    let app_name = match target.file_name().and_then(|n| n.to_str()) {\n        Some(n) if !n.is_empty() \u0026\u0026 !n.starts_with('.') =\u003e n.to_string(),\n        _ =\u003e {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Error,\n                    code: \"INIT_INVALID_NAME\".into(),\n                    message: format!(\n                        \"Could not derive a valid app name from path: \\\"{}\\\"\",\n                        target.display()\n                    ),\n                    span: None,\n                    hint: Some(\n                        \"The final path segment must be a valid name (non-empty, no leading dot)\"\n                            .into(),\n                    ),\n                }],\n                json_mode,\n            );\n            return ExitCode::Usage;\n        }\n    };\n\n    if template != \"basic\" {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"INIT_UNKNOWN_TEMPLATE\".into(),\n                message: format!(\"Unknown template: \\\"{template}\\\"\"),\n                span: None,\n                hint: Some(\"Available templates: basic\".into()),\n            }],\n            json_mode,\n        );\n        return ExitCode::Usage;\n    }\n\n    if target.exists() {\n        let is_empty = match std::fs::read_dir(target) {\n            Ok(mut entries) =\u003e entries.next().is_none(),\n            Err(_) =\u003e false,\n        };\n        if !is_empty {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Error,\n                    code: \"INIT_DIR_EXISTS\".into(),\n                    message: format!(\n                        \"Directory \\\"{}\\\" already exists and is not empty\",\n                        target.display()\n                    ),\n                    span: None,\n                    hint: Some(\"Choose a different path or remove the existing directory\".into()),\n                }],\n                json_mode,\n            );\n            return ExitCode::Error;\n        }\n    }\n\n    if let Err(e) = std::fs::create_dir_all(target) {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"INIT_MKDIR_FAILED\".into(),\n                message: format!(\"Could not create directory \\\"{}\\\": {e}\", target.display()),\n                span: None,\n                hint: None,\n            }],\n            json_mode,\n        );\n        return ExitCode::Error;\n    }\n\n    let app_ts = TEMPLATE_BASIC_APP.replace(\"__APP_NAME__\", \u0026app_name);\n    let package_json = serde_json::to_string_pretty(\u0026serde_json::json!({\n        \"name\": app_name,\n        \"version\": \"0.1.0\",\n        \"private\": true,\n        \"type\": \"module\",\n        \"scripts\": {\n            \"codegen\": \"agentdb codegen app.ts --out agentdb.manifest.json\",\n            \"doctor\": \"agentdb doctor agentdb.manifest.json\",\n            \"check\": \"tsc -p tsconfig.json --noEmit\"\n        }\n    }))\n    .unwrap()\n        + \"\\n\";\n\n    let files: \u0026[(\u0026str, \u0026str)] = \u0026[\n        (\"sdk.ts\", SDK_SOURCE),\n        (\"app.ts\", \u0026app_ts),\n        (\"tsconfig.json\", TEMPLATE_BASIC_TSCONFIG),\n        (\"package.json\", \u0026package_json),\n    ];\n\n    for (name, contents) in files {\n        let file_path = target.join(name);\n        if let Err(e) = std::fs::write(\u0026file_path, contents) {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Error,\n                    code: \"INIT_WRITE_FAILED\".into(),\n                    message: format!(\"Could not write {}: {e}\", file_path.display()),\n                    span: None,\n                    hint: None,\n                }],\n                json_mode,\n            );\n            return ExitCode::Error;\n        }\n    }\n\n    let entry_path = target.join(\"app.ts\");\n    let manifest_path = target.join(\"agentdb.manifest.json\");\n    let entry_str = entry_path.to_string_lossy().to_string();\n\n    match run_bun_codegen(\u0026entry_str) {\n        Ok(manifest_json) =\u003e {\n            let contents = format!(\"{manifest_json}\\n\");\n            if let Err(e) = std::fs::write(\u0026manifest_path, \u0026contents) {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Warning,\n                        code: \"INIT_CODEGEN_WRITE_FAILED\".into(),\n                        message: format!(\"Files created but could not write manifest: {e}\"),\n                        span: None,\n                        hint: Some(\n                            \"Run 'agentdb codegen app.ts --out agentdb.manifest.json' manually\"\n                                .into(),\n                        ),\n                    }],\n                    json_mode,\n                );\n            }\n\n            // Generate client bindings.\n            if let Ok(manifest) = parse_manifest(\u0026manifest_json, \u0026entry_str) {\n                let client_ts = generate_client_ts(\u0026manifest);\n                let client_path = target.join(\"agentdb.client.ts\");\n                let _ = std::fs::write(\u0026client_path, client_ts);\n            }\n        }\n        Err(diag) =\u003e {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Warning,\n                    code: \"INIT_CODEGEN_FAILED\".into(),\n                    message: format!(\n                        \"Files created but manifest generation failed: {}\",\n                        diag.message\n                    ),\n                    span: None,\n                    hint: Some(\n                        \"Run 'agentdb codegen app.ts --out agentdb.manifest.json' manually\".into(),\n                    ),\n                }],\n                json_mode,\n            );\n        }\n    }\n\n    let target_display = target.display().to_string();\n    let mut file_list: Vec\u003cString\u003e = files\n        .iter()\n        .map(|(name, _)| format!(\"{target_display}/{name}\"))\n        .collect();\n    if manifest_path.exists() {\n        file_list.push(format!(\"{target_display}/agentdb.manifest.json\"));\n    }\n    let client_path = target.join(\"agentdb.client.ts\");\n    if client_path.exists() {\n        file_list.push(format!(\"{target_display}/agentdb.client.ts\"));\n    }\n\n    if json_mode {\n        print_json(\u0026InitOutput {\n            code: \"INIT_OK\",\n            name: app_name.clone(),\n            path: target_display.clone(),\n            template: template.to_string(),\n            files: file_list,\n        });\n    } else {\n        println!(\"Created {target_display}/\");\n        for (name, _) in files {\n            println!(\"  {name}\");\n        }\n        if manifest_path.exists() {\n            println!(\"  agentdb.manifest.json\");\n        }\n        if client_path.exists() {\n            println!(\"  agentdb.client.ts\");\n        }\n        println!();\n        println!(\"Next steps:\");\n        println!(\"  cd {target_display}\");\n        println!(\"  agentdb doctor agentdb.manifest.json\");\n        println!(\"  agentdb explain agentdb.manifest.json\");\n    }\n\n    ExitCode::Ok\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Li

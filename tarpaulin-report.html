\"id(\") =\u003e \"TEXT\",\n        _ =\u003e \"TEXT\",\n    }\n}\n\n// ---------------------------------------------------------------------------\n// SQL generation\n// ---------------------------------------------------------------------------\n\n/// Generate a CREATE TABLE statement for an entity.\npub fn create_table_sql(entity_name: \u0026str, fields: \u0026[FieldSpec]) -\u003e String {\n    let mut columns = vec![\"id TEXT PRIMARY KEY NOT NULL\".to_string()];\n\n    for field in fields {\n        let col_type = sqlite_column_type(\u0026field.field_type);\n        let not_null = if field.optional { \"\" } else { \" NOT NULL\" };\n        let unique = if field.unique { \" UNIQUE\" } else { \"\" };\n        columns.push(format!(\"{} {}{}{}\", field.name, col_type, not_null, unique));\n    }\n\n    format!(\"CREATE TABLE IF NOT EXISTS {} ({})\", entity_name, columns.join(\", \"))\n}\n\n/// Generate an ALTER TABLE ADD COLUMN statement.\npub fn add_column_sql(entity_name: \u0026str, field: \u0026FieldSpec) -\u003e String {\n    let col_type = sqlite_column_type(\u0026field.field_type);\n    // SQLite ALTER TABLE ADD COLUMN does not support NOT NULL without a default for existing rows.\n    // For optional fields, omit NOT NULL. For required fields, we still omit NOT NULL here\n    // because SQLite requires a default value for ADD COLUMN NOT NULL.\n    let unique = if field.unique { \" UNIQUE\" } else { \"\" };\n    format!(\"ALTER TABLE {} ADD COLUMN {} {}{}\", entity_name, field.name, col_type, unique)\n}\n\n/// Generate a CREATE INDEX statement.\npub fn create_index_sql(entity_name: \u0026str, index_name: \u0026str, fields: \u0026[String], unique: bool) -\u003e String {\n    let unique_str = if unique { \"UNIQUE \" } else { \"\" };\n    let full_index_name = format!(\"{}_{}\", entity_name, index_name);\n    format!(\n        \"CREATE {}INDEX IF NOT EXISTS {} ON {} ({})\",\n        unique_str,\n        full_index_name,\n        entity_name,\n        fields.join(\", \")\n    )\n}\n\n// ---------------------------------------------------------------------------\n// SqliteAdapter\n// ---------------------------------------------------------------------------\n\npub struct SqliteAdapter {\n    conn: Connection,\n}\n\nimpl SqliteAdapter {\n    /// Open or create a SQLite database at the given path.\n    pub fn open(path: \u0026str) -\u003e Result\u003cSelf, StorageError\u003e {\n        let conn = Connection::open(path).map_err(|e| StorageError {\n            code: \"SQLITE_OPEN_FAILED\".into(),\n            message: format!(\"Failed to open SQLite database at {path}: {e}\"),\n        })?;\n        Ok(Self { conn })\n    }\n\n    /// Create an in-memory SQLite database.\n    pub fn in_memory() -\u003e Result\u003cSelf, StorageError\u003e {\n        let conn = Connection::open_in_memory().map_err(|e| StorageError {\n            code: \"SQLITE_OPEN_FAILED\".into(),\n            message: format!(\"Failed to open in-memory SQLite database: {e}\"),\n        })?;\n        Ok(Self { conn })\n    }\n}\n\nimpl SqliteAdapter {\n    /// Plan schema changes by comparing the live DB state against the target manifest.\n    /// Only plans additive operations: CreateEntity, AddField, AddIndex.\n    pub fn plan_from_live(\u0026self, target: \u0026AppManifest) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n        let snapshot = self.read_schema()?;\n        Ok(crate::plan_from_snapshot(\u0026snapshot, target))\n    }\n}\n\nimpl StorageAdapter for SqliteAdapter {\n    fn plan_schema(\u0026self, target: \u0026AppManifest) -\u003e Result\u003cSchemaPlan, StorageError\u003e {\n        // Plan from live DB state.\n        self.plan_from_live(target)\n    }\n\n    fn apply_schema(\u0026self, plan: \u0026SchemaPlan) -\u003e Result\u003c(), StorageError\u003e {\n        self.apply_schema_impl(plan)\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Migration history\n// ---------------------------------------------------------------------------\n\nconst HISTORY_TABLE: \u0026str = \"_agentdb_schema_history\";\n\n/// A single row from the schema push history table.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize)]\npub struct HistoryEntry {\n    pub id: String,\n    pub manifest_version: i64,\n    pub app_version: String,\n    pub applied_at: String,\n    pub operation_count: i64,\n    pub baseline: String,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub plan: Option\u003cSchemaPlan\u003e,\n    pub plan_json: String,\n}\n\n/// Metadata for a schema push event.\npub struct PushMetadata\u003c'a\u003e {\n    pub manifest_version: u32,\n    pub app_version: \u0026'a str,\n    pub baseline: \u0026'a str,\n}\n\nimpl SqliteAdapter {\n    /// Ensure the history table exists.\n    fn ensure_history_table(\u0026self) -\u003e Result\u003c(), StorageError\u003e {\n        let sql = format!(\n            \"CREATE TABLE IF NOT EXISTS {} (\\\n                id TEXT PRIMARY KEY NOT NULL, \\\n                manifest_version INTEGER NOT NULL, \\\n                app_version TEXT NOT NULL, \\\n                applied_at TEXT NOT NULL, \\\n                operation_count INTEGER NOT NULL, \\\n                baseline TEXT NOT NULL, \\\n                plan_json TEXT NOT NULL\\\n            )\",\n            HISTORY_TABLE\n        );\n        self.conn.execute(\u0026sql, []).map_err(|e| StorageError {\n            code: \"SQLITE_EXEC_FAILED\".into(),\n            message: format!(\"Failed to create history table: {e}\"),\n        })?;\n        Ok(())\n    }\n\n    /// Apply a schema plan and record the push in the history table.\n    pub fn apply_with_history(\n        \u0026self,\n        plan: \u0026SchemaPlan,\n        meta: \u0026PushMetadata\u003c'_\u003e,\n    ) -\u003e Result\u003c(), StorageError\u003e {\n        // Apply the plan.\n        self.apply_schema_impl(plan)?;\n\n        // Record history.\n        self.ensure_history_table()?;\n\n        let plan_json = serde_json::to_string(plan).map_err(|e| StorageError {\n            code: \"SQLITE_SERIALIZE_FAILED\".into(),\n            message: format!(\"Failed to serialize plan: {e}\"),\n        })?;\n\n        let id = generate_push_id();\n        let now = now_iso8601();\n        let op_count = plan\n            .operations\n            .iter()\n            .filter(|op| !matches!(op, SchemaOperation::Noop))\n            .count() as i64;\n\n        self.conn\n            .execute(\n                \u0026format!(\n                    \"INSERT INTO {} (id, manifest_version, app_version, applied_at, operation_count, baseline, plan_json) \\\n                     VALUES (?1, ?2, ?3, ?4, ?5, ?6, ?7)\",\n                    HISTORY_TABLE\n                ),\n                rusqlite::params![\n                    id,\n                    meta.manifest_version as i64,\n                    meta.app_version,\n                    now,\n                    op_count,\n                    meta.baseline,\n                    plan_json,\n                ],\n            )\n            .map_err(|e| StorageError {\n                code: \"SQLITE_EXEC_FAILED\".into(),\n                message: format!(\"Failed to insert history row: {e}\"),\n            })?;\n\n        Ok(())\n    }\n\n    /// Read schema push history, newest-first.\n    /// Returns empty vec if the history table does not exist.\n    pub fn read_history(\u0026self, limit: Option\u003cu32\u003e) -\u003e Result\u003cVec\u003cHistoryEntry\u003e, StorageError\u003e {\n        if !self.history_table_exists()? {\n            return Ok(Vec::new());\n        }\n\n        let sql = match limit {\n            Some(n) =\u003e format!(\n                \"SELECT id, manifest_version, app_version, applied_at, operation_count, baseline, plan_json \\\n                 FROM {} ORDER BY id DESC LIMIT {}\",\n                HISTORY_TABLE, n\n            ),\n            None =\u003e format!(\n                \"SELECT id, manifest_version, app_version, applied_at, operation_count, baseline, plan_json \\\n                 FROM {} ORDER BY id DESC\",\n                HISTORY_TABLE\n            ),\n        };\n\n        let mut stmt = self.conn.prepare(\u0026sql).map_err(sqlite_err)?;\n\n        let entries = stmt\n            .query_map([], |row| {\n                let plan_json: String = row.get(6)?;\n                let plan = serde_json::from_str(\u0026plan_json).ok();\n                Ok(HistoryEntry {\n                    id: row.get(0)?,\n                    manifest_version: row.get(1)?,\n                    app_version: row.get(2)?,\n                    applied_at: row.get(3)?,\n                    operation_count: row.get(4)?,\n                    baseline: row.get(5)?,\n                    plan,\n                    plan_json,\n                })\n            })\n            .map_err(sqlite_err)?\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(sqlite_err)?;\n\n        Ok(entries)\n    }\n\n    /// Read a single history entry by ID.\n    /// Returns None if the history table doesn't exist or the ID is not found.\n    pub fn read_history_entry(\u0026self, entry_id: \u0026str) -\u003e Result\u003cOption\u003cHistoryEntry\u003e, StorageError\u003e {\n        if !self.history_table_exists()? {\n            return Ok(None);\n        }\n\n        let mut stmt = self\n            .conn\n            .prepare(\u0026format!(\n                \"SELECT id, manifest_version, app_version, applied_at, operation_count, baseline, plan_json \\\n                 FROM {} WHERE id = ?1\",\n                HISTORY_TABLE\n            ))\n            .map_err(sqlite_err)?;\n\n        let mut rows = stmt\n            .query_map([entry_id], |row| {\n                let plan_json: String = row.get(6)?;\n                let plan = serde_json::from_str(\u0026plan_json).ok();\n                Ok(HistoryEntry {\n                    id: row.get(0)?,\n                    manifest_version: row.get(1)?,\n                    app_version: row.get(2)?,\n                    applied_at: row.get(3)?,\n                    operation_count: row.get(4)?,\n                    baseline: row.get(5)?,\n                    plan,\n                    plan_json,\n                })\n            })\n            .map_err(sqlite_err)?;\n\n        match rows.next() {\n            Some(Ok(entry)) =\u003e Ok(Some(entry)),\n            Some(Err(e)) =\u003e Err(sqlite_err(e)),\n            None =\u003e Ok(None),\n        }\n    }\n\n    fn history_table_exists(\u0026self) -\u003e Result\u003cbool, StorageError\u003e {\n        let exists: bool = self\n            .conn\n            .query_row(\n                \u0026format!(\n                    \"SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='{}'\",\n                    HISTORY_TABLE\n                ),\n                [],\n                |row| row.get::\u003c_, i64\u003e(0),\n            )\n            .map_err(sqlite_err)?\n            \u003e 0;\n        Ok(exists)\n    }\n\n    /// Internal apply implementation shared by both `apply_schema` and `apply_with_history`.\n    fn apply_schema_impl(\u0026self, plan: \u0026SchemaPlan) -\u003e Result\u003c(), StorageError\u003e {\n        for op in \u0026plan.operations {\n            match op {\n                SchemaOperation::CreateEntity { name, fields } =\u003e {\n                    let sql = create_table_sql(name, fields);\n                    self.conn.execute(\u0026sql, []).map_err(|e| StorageError {\n                        code: \"SQLITE_EXEC_FAILED\".into(),\n                        message: format!(\"Failed to create table {name}: {e}\"),\n                    })?;\n                }\n                SchemaOperation::AddField { entity, field } =\u003e {\n                    let sql = add_column_sql(entity, field);\n                    self.conn.execute(\u0026sql, []).map_err(|e| StorageError {\n                        code: \"SQLITE_EXEC_FAILED\".into(),\n                        message: format!(\"Failed to add column {}.{}: {e}\", entity, field.name),\n                    })?;\n                }\n                SchemaOperation::AddIndex {\n                    entity,\n                    name,\n                    fields,\n                    unique,\n                } =\u003e {\n                    let sql = create_index_sql(entity, name, fields, *unique);\n                    self.conn.execute(\u0026sql, []).map_err(|e| StorageError {\n                        code: \"SQLITE_EXEC_FAILED\".into(),\n                        message: format!(\"Failed to create index {entity}.{name}: {e}\"),\n                    })?;\n                }\n                SchemaOperation::Noop =\u003e {}\n                other =\u003e {\n                    return Err(StorageError {\n                        code: \"SQLITE_OP_UNSUPPORTED\".into(),\n                        message: format!(\"Operation not supported by SQLite adapter: {other:?}\"),\n                    });\n                }\n            }\n        }\n        Ok(())\n    }\n}\n\nfn generate_push_id() -\u003e String {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let ts = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default();\n    format!(\"{}.{:09}\", ts.as_secs(), ts.subsec_nanos())\n}\n\nfn now_iso8601() -\u003e String {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let ts = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n    // Simple UTC timestamp. Not worth pulling in chrono for this.\n    let secs_per_day: u64 = 86400;\n    let days = ts / secs_per_day;\n    let rem = ts % secs_per_day;\n    let hours = rem / 3600;\n    let mins = (rem % 3600) / 60;\n    let secs = rem % 60;\n    // Approximate date from epoch days (good enough for audit purposes).\n    let (year, month, day) = epoch_days_to_date(days);\n    format!(\"{year:04}-{month:02}-{day:02}T{hours:02}:{mins:02}:{secs:02}Z\")\n}\n\nfn epoch_days_to_date(days: u64) -\u003e (u64, u64, u64) {\n    // Civil date from epoch days. Algorithm from Howard Hinnant.\n    let z = days + 719468;\n    let era = z / 146097;\n    let doe = z - era * 146097;\n    let yoe = (doe - doe / 1460 + doe / 36524 - doe / 146096) / 365;\n    let y = yoe + era * 400;\n    let doy = doe - (365 * yoe + yoe / 4 - yoe / 100);\n    let mp = (5 * doy + 2) / 153;\n    let d = doy - (153 * mp + 2) / 5 + 1;\n    let m = if mp \u003c 10 { mp + 3 } else { mp - 9 };\n    let y = if m \u003c= 2 { y + 1 } else { y };\n    (y, m, d)\n}\n\n// ---------------------------------------------------------------------------\n// Introspection\n// ---------------------------------------------------------------------------\n\nimpl SqliteAdapter {\n    /// Read the current schema from the live SQLite database.\n    /// Only inspects user tables (not sqlite_* internal tables).\n    pub fn read_schema(\u0026self) -\u003e Result\u003cSchemaSnapshot, StorageError\u003e {\n        // Get all user tables, sorted for determinism.\n        let mut stmt = self\n            .conn\n            .prepare(\"SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '_agentdb_%' ORDER BY name\")\n            .map_err(sqlite_err)?;\n\n        let table_names: Vec\u003cString\u003e = stmt\n            .query_map([], |row| row.get(0))\n            .map_err(sqlite_err)?\n            .collect::\u003cResult\u003cVec\u003cString\u003e, _\u003e\u003e()\n            .map_err(sqlite_err)?;\n\n        let mut tables = Vec::new();\n        for table_name in \u0026table_names {\n            let columns = self.read_columns(table_name)?;\n            let indexes = self.read_indexes(table_name)?;\n            tables.push(TableSnapshot {\n                name: table_name.clone(),\n                columns,\n                indexes,\n            });\n        }\n\n        Ok(SchemaSnapshot { tables })\n    }\n\n    fn read_columns(\u0026self, table: \u0026str) -\u003e Result\u003cVec\u003cColumnSnapshot\u003e, StorageError\u003e {\n        let mut stmt = self\n            .conn\n            .prepare(\u0026format!(\"PRAGMA table_info({})\", table))\n            .map_err(sqlite_err)?;\n\n        let columns: Vec\u003cColumnSnapshot\u003e = stmt\n            .query_map([], |row| {\n                Ok(ColumnSnapshot {\n                    name: row.get(1)?,\n                    column_type: row.get(2)?,\n                    notnull: row.get::\u003c_, i32\u003e(3)? != 0,\n                    primary_key: row.get::\u003c_, i32\u003e(5)? != 0,\n                })\n            })\n            .map_err(sqlite_err)?\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(sqlite_err)?;\n\n        Ok(columns)\n    }\n\n    fn read_indexes(\u0026self, table: \u0026str) -\u003e Result\u003cVec\u003cIndexSnapshot\u003e, StorageError\u003e {\n        let mut stmt = self\n            .conn\n            .prepare(\u0026format!(\"PRAGMA index_list({})\", table))\n            .map_err(sqlite_err)?;\n\n        // Collect index metadata: (name, unique).\n        let index_meta: Vec\u003c(String, bool)\u003e = stmt\n            .query_map([], |row| {\n                let name: String = row.get(1)?;\n                let unique: bool = row.get::\u003c_, i32\u003e(2)? != 0;\n                Ok((name, unique))\n            })\n            .map_err(sqlite_err)?\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(sqlite_err)?;\n\n        // Build ordered map for determinism, then read columns for each index.\n        let ordered: BTreeMap\u003cString, bool\u003e = index_meta.into_iter().collect();\n\n        let mut indexes = Vec::new();\n        for (name, unique) in \u0026ordered {\n            // Skip SQLite autoindexes (internal unique constraint indexes).\n            if name.starts_with(\"sqlite_autoindex_\") {\n                continue;\n            }\n\n            let mut col_stmt = self\n                .conn\n                .prepare(\u0026format!(\"PRAGMA index_info({})\", name))\n                .map_err(sqlite_err)?;\n\n            let columns: Vec\u003cString\u003e = col_stmt\n                .query_map([], |row| row.get(2))\n                .map_err(sqlite_err)?\n                .collect::\u003cResult\u003cVec\u003cString\u003e, _\u003e\u003e()\n                .map_err(sqlite_err)?;\n\n            indexes.push(IndexSnapshot {\n                name: name.clone(),\n                columns,\n                unique: *unique,\n            });\n        }\n\n        Ok(indexes)\n    }\n}\n\nfn sqlite_err(e: rusqlite::Error) -\u003e StorageError {\n    StorageError {\n        code: \"SQLITE_QUERY_FAILED\".into(),\n        message: format!(\"SQLite query failed: {e}\"),\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn test_manifest() -\u003e AppManifest {\n        AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![ManifestEntity {\n                name: \"User\".into(),\n                fields: vec![\n                    ManifestField {\n                        name: \"email\".into(),\n                        field_type: \"string\".into(),\n                        optional: false,\n                        unique: true,\n                    },\n                    ManifestField {\n                        name: \"displayName\".into(),\n                        field_type: \"string\".into(),\n                        optional: false,\n                        unique: false,\n                    },\n                    ManifestField {\n                        name: \"age\".into(),\n                        field_type: \"int\".into(),\n                        optional: true,\n                        unique: false,\n                    },\n                ],\n                indexes: vec![ManifestIndex {\n                    name: \"by_email\".into(),\n                    fields: vec![\"email\".into()],\n                    unique: true,\n                }],\n                relations: vec![],\n            }],\n            routes: vec![],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        }\n    }\n\n    #[test]\n    fn create_table_sql_basic() {\n        let fields = vec![\n            FieldSpec { name: \"email\".into(), field_type: \"string\".into(), optional: false, unique: true },\n            FieldSpec { name: \"age\".into(), field_type: \"int\".into(), optional: true, unique: false },\n        ];\n        let sql = create_table_sql(\"User\", \u0026fields);\n        assert_eq!(\n            sql,\n            \"CREATE TABLE IF NOT EXISTS User (id TEXT PRIMARY KEY NOT NULL, email TEXT NOT NULL UNIQUE, age INTEGER)\"\n        );\n    }\n\n    #[test]\n    fn create_index_sql_basic() {\n        let sql = create_index_sql(\"User\", \"by_email\", \u0026[\"email\".into()], true);\n        assert_eq!(sql, \"CREATE UNIQUE INDEX IF NOT EXISTS User_by_email ON User (email)\");\n    }\n\n    #[test]\n    fn create_index_sql_non_unique() {\n        let sql = create_index_sql(\"Todo\", \"by_author\", \u0026[\"authorId\".into()], false);\n        assert_eq!(sql, \"CREATE INDEX IF NOT EXISTS Todo_by_author ON Todo (authorId)\");\n    }\n\n    #[test]\n    fn add_column_sql_basic() {\n        let field = FieldSpec {\n            name: \"bio\".into(),\n            field_type: \"string\".into(),\n            optional: true,\n            unique: false,\n        };\n        let sql = add_column_sql(\"User\", \u0026field);\n        assert_eq!(sql, \"ALTER TABLE User ADD COLUMN bio TEXT\");\n    }\n\n    #[test]\n    fn sqlite_adapter_creates_table() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        // Verify table exists by querying sqlite_master.\n        let table_count: i64 = adapter\n            .conn\n            .query_row(\n                \"SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='User'\",\n                [],\n                |row| row.get(0),\n            )\n            .unwrap();\n        assert_eq!(table_count, 1);\n    }\n\n    #[test]\n    fn sqlite_adapter_creates_index() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        // Verify index exists.\n        let index_count: i64 = adapter\n            .conn\n            .query_row(\n                \"SELECT COUNT(*) FROM sqlite_master WHERE type='index' AND name='User_by_email'\",\n                [],\n                |row| row.get(0),\n            )\n            .unwrap();\n        assert_eq!(index_count, 1);\n    }\n\n    #[test]\n    fn sqlite_adapter_add_field() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n\n        // Create table first.\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        // Add a field.\n        let add_plan = SchemaPlan {\n            operations: vec![SchemaOperation::AddField {\n                entity: \"User\".into(),\n                field: FieldSpec {\n                    name: \"bio\".into(),\n                    field_type: \"string\".into(),\n                    optional: true,\n                    unique: false,\n                },\n            }],\n        };\n        adapter.apply_schema(\u0026add_plan).unwrap();\n\n        // Verify column exists by checking pragma.\n        let has_bio: bool = adapter\n            .conn\n            .prepare(\"PRAGMA table_info(User)\")\n            .unwrap()\n            .query_map([], |row| {\n                let name: String = row.get(1)?;\n                Ok(name)\n            })\n            .unwrap()\n            .any(|r| r.unwrap() == \"bio\");\n        assert!(has_bio);\n    }\n\n    #[test]\n    fn sqlite_adapter_rejects_remove_entity() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveEntity {\n                name: \"User\".into(),\n            }],\n        };\n        let result = adapter.apply_schema(\u0026plan);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"SQLITE_OP_UNSUPPORTED\");\n    }\n\n    #[test]\n    fn sqlite_adapter_rejects_remove_field() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let plan = SchemaPlan {\n            operations: vec![SchemaOperation::RemoveField {\n                entity: \"User\".into(),\n                field_name: \"email\".into(),\n            }],\n        };\n        let result = adapter.apply_schema(\u0026plan);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"SQLITE_OP_UNSUPPORTED\");\n    }\n\n    #[test]\n    fn sqlite_adapter_column_types() {\n        assert_eq!(sqlite_column_type(\"string\"), \"TEXT\");\n        assert_eq!(sqlite_column_type(\"int\"), \"INTEGER\");\n        assert_eq!(sqlite_column_type(\"float\"), \"REAL\");\n        assert_eq!(sqlite_column_type(\"bool\"), \"INTEGER\");\n        assert_eq!(sqlite_column_type(\"datetime\"), \"TEXT\");\n        assert_eq!(sqlite_column_type(\"richtext\"), \"TEXT\");\n        assert_eq!(sqlite_column_type(\"id(User)\"), \"TEXT\");\n    }\n\n    // -- Introspection tests --\n\n    #[test]\n    fn introspect_empty_db() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let snapshot = adapter.read_schema().unwrap();\n        assert!(snapshot.tables.is_empty());\n    }\n\n    #[test]\n    fn introspect_after_apply() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        let snapshot = adapter.read_schema().unwrap();\n\n        // Should have one table.\n        assert_eq!(snapshot.tables.len(), 1);\n        let user = \u0026snapshot.tables[0];\n        assert_eq!(user.name, \"User\");\n\n        // id + 3 manifest fields = 4 columns.\n        assert_eq!(user.columns.len(), 4);\n        assert_eq!(user.columns[0].name, \"id\");\n        assert!(user.columns[0].primary_key);\n        assert_eq!(user.columns[1].name, \"email\");\n        assert_eq!(user.columns[1].column_type, \"TEXT\");\n        assert!(user.columns[1].notnull);\n        assert_eq!(user.columns[2].name, \"displayName\");\n        assert_eq!(user.columns[3].name, \"age\");\n        assert!(!user.columns[3].notnull); // optional\n\n        // Should have the by_email index.\n        assert_eq!(user.indexes.len(), 1);\n        assert_eq!(user.indexes[0].name, \"User_by_email\");\n        assert_eq!(user.indexes[0].columns, vec![\"email\"]);\n        assert!(user.indexes[0].unique);\n    }\n\n    #[test]\n    fn introspect_multiple_tables() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n\n        let manifest = AppManifest {\n            manifest_version: MANIFEST_VERSION,\n            name: \"test\".into(),\n            version: \"0.1.0\".into(),\n            entities: vec![\n                ManifestEntity {\n                    name: \"Post\".into(),\n                    fields: vec![ManifestField {\n                        name: \"title\".into(),\n                        field_type: \"string\".into(),\n                        optional: false,\n                        unique: false,\n                    }],\n                    indexes: vec![],\n                relations: vec![],\n                },\n                ManifestEntity {\n                    name: \"User\".into(),\n                    fields: vec![ManifestField {\n                        name: \"email\".into(),\n                        field_type: \"string\".into(),\n                        optional: false,\n                        unique: true,\n                    }],\n                    indexes: vec![],\n                relations: vec![],\n                },\n            ],\n            routes: vec![],\n            queries: vec![],\n            actions: vec![],\n            policies: vec![],\n        };\n\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        let snapshot = adapter.read_schema().unwrap();\n\n        // Sorted alphabetically.\n        assert_eq!(snapshot.tables.len(), 2);\n        assert_eq!(snapshot.tables[0].name, \"Post\");\n        assert_eq!(snapshot.tables[1].name, \"User\");\n    }\n\n    #[test]\n    fn introspect_after_add_field() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        // Add a column.\n        let add_plan = SchemaPlan {\n            operations: vec![SchemaOperation::AddField {\n                entity: \"User\".into(),\n                field: FieldSpec {\n                    name: \"bio\".into(),\n                    field_type: \"string\".into(),\n                    optional: true,\n                    unique: false,\n                },\n            }],\n        };\n        adapter.apply_schema(\u0026add_plan).unwrap();\n\n        let snapshot = adapter.read_schema().unwrap();\n        let user = \u0026snapshot.tables[0];\n\n        // id + 3 original + 1 added = 5.\n        assert_eq!(user.columns.len(), 5);\n        assert!(user.columns.iter().any(|c| c.name == \"bio\"));\n    }\n\n    #[test]\n    fn introspect_snapshot_is_deterministic() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_schema(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026plan).unwrap();\n\n        let s1 = adapter.read_schema().unwrap();\n        let s2 = adapter.read_schema().unwrap();\n        assert_eq!(s1, s2);\n    }\n\n    // -- Live planning tests --\n\n    #[test]\n    fn plan_from_empty_db_creates_everything() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n\n        // Should create the table and its index.\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { name, .. } if name == \"User\"\n        )));\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::AddIndex { entity, name, .. } if entity == \"User\" \u0026\u0026 name == \"by_email\"\n        )));\n    }\n\n    #[test]\n    fn plan_from_fully_applied_db_is_noop() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        // Apply everything first.\n        let initial = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_schema(\u0026initial).unwrap();\n\n        // Plan again — should be noop.\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        assert!(plan.is_empty(), \"expected noop, got: {:?}\", plan.operations);\n    }\n\n    #[test]\n    fn plan_detects_missing_column() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n\n        // Create table with only email.\n        adapter\n            .conn\n            .execute(\n                \"CREATE TABLE User (id TEXT PRIMARY KEY NOT NULL, email TEXT NOT NULL UNIQUE)\",\n                [],\n            )\n            .unwrap();\n\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n\n        // Should plan AddField for displayName and age.\n        let add_fields: Vec\u003c_\u003e = plan\n            .operations\n            .iter()\n            .filter(|op| matches!(op, SchemaOperation::AddField { .. }))\n            .collect();\n        assert_eq!(add_fields.len(), 2);\n    }\n\n    #[test]\n    fn plan_detects_missing_index() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n\n        // Create table with all columns but no index.\n        adapter\n            .conn\n            .execute(\n                \"CREATE TABLE User (id TEXT PRIMARY KEY NOT NULL, email TEXT NOT NULL UNIQUE, displayName TEXT NOT NULL, age INTEGER)\",\n                [],\n            )\n            .unwrap();\n\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n\n        // Should plan AddIndex only.\n        assert!(plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::AddIndex { entity, name, .. } if entity == \"User\" \u0026\u0026 name == \"by_email\"\n        )));\n        assert!(!plan.operations.iter().any(|op| matches!(\n            op,\n            SchemaOperation::CreateEntity { .. }\n        )));\n    }\n\n    // -- Migration history tests --\n\n    fn push_meta(baseline: \u0026str) -\u003e PushMetadata\u003c'_\u003e {\n        PushMetadata {\n            manifest_version: 1,\n            app_version: \"0.1.0\",\n            baseline,\n        }\n    }\n\n    fn history_count(adapter: \u0026SqliteAdapter) -\u003e i64 {\n        adapter\n            .conn\n            .query_row(\n                \u0026format!(\"SELECT COUNT(*) FROM {}\", HISTORY_TABLE),\n                [],\n                |row| row.get(0),\n            )\n            .unwrap()\n    }\n\n    #[test]\n    fn history_table_created_on_apply() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let table_exists: i64 = adapter\n            .conn\n            .query_row(\n                \u0026format!(\n                    \"SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='{}'\",\n                    HISTORY_TABLE\n                ),\n                [],\n                |row| row.get(0),\n            )\n            .unwrap();\n        assert_eq!(table_exists, 1);\n    }\n\n    #[test]\n    fn history_row_inserted_on_apply() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        assert_eq!(history_count(\u0026adapter), 1);\n\n        // Verify stored data.\n        let (mv, av, baseline, op_count): (i64, String, String, i64) = adapter\n            .conn\n            .query_row(\n                \u0026format!(\n                    \"SELECT manifest_version, app_version, baseline, operation_count FROM {} LIMIT 1\",\n                    HISTORY_TABLE\n                ),\n                [],\n                |row| Ok((row.get(0)?, row.get(1)?, row.get(2)?, row.get(3)?)),\n            )\n            .unwrap();\n        assert_eq!(mv, 1);\n        assert_eq!(av, \"0.1.0\");\n        assert_eq!(baseline, \"live_sqlite\");\n        assert_eq!(op_count, 2); // CreateEntity + AddIndex (Noop not counted)\n    }\n\n    #[test]\n    fn noop_push_also_recorded() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        // First push creates tables.\n        let plan1 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan1, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        // Second push is noop.\n        let plan2 = adapter.plan_from_live(\u0026manifest).unwrap();\n        assert!(plan2.is_empty());\n        adapter.apply_with_history(\u0026plan2, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        // Both pushes recorded.\n        assert_eq!(history_count(\u0026adapter), 2);\n\n        // Second row has 0 operations.\n        let op_count: i64 = adapter\n            .conn\n            .query_row(\n                \u0026format!(\n                    \"SELECT operation_count FROM {} ORDER BY id DESC LIMIT 1\",\n                    HISTORY_TABLE\n                ),\n                [],\n                |row| row.get(0),\n            )\n            .unwrap();\n        assert_eq!(op_count, 0);\n    }\n\n    #[test]\n    fn history_plan_json_is_valid() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let plan_json: String = adapter\n            .conn\n            .query_row(\n                \u0026format!(\"SELECT plan_json FROM {} LIMIT 1\", HISTORY_TABLE),\n                [],\n                |row| row.get(0),\n            )\n            .unwrap();\n\n        // Should be valid JSON.\n        let parsed: serde_json::Value = serde_json::from_str(\u0026plan_json).unwrap();\n        assert!(parsed.get(\"operations\").unwrap().is_array());\n    }\n\n    #[test]\n    fn history_table_excluded_from_introspection() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let snapshot = adapter.read_schema().unwrap();\n        assert!(!snapshot.tables.iter().any(|t| t.name.starts_with(\"_agentdb\")));\n    }\n\n    // -- read_history tests --\n\n    #[test]\n    fn read_history_empty_db() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let entries = adapter.read_history(None).unwrap();\n        assert!(entries.is_empty());\n    }\n\n    #[test]\n    fn read_history_after_one_push() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let entries = adapter.read_history(None).unwrap();\n        assert_eq!(entries.len(), 1);\n        assert_eq!(entries[0].manifest_version, 1);\n        assert_eq!(entries[0].app_version, \"0.1.0\");\n        assert_eq!(entries[0].baseline, \"live_sqlite\");\n        assert_eq!(entries[0].operation_count, 2); // CreateEntity + AddIndex\n    }\n\n    #[test]\n    fn read_history_after_noop_push() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        let plan1 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan1, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let plan2 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan2, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let entries = adapter.read_history(None).unwrap();\n        assert_eq!(entries.len(), 2);\n        // Newest first.\n        assert_eq!(entries[0].operation_count, 0);\n        assert_eq!(entries[1].operation_count, 2);\n    }\n\n    #[test]\n    fn read_history_newest_first() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter\n            .apply_with_history(\u0026plan, \u0026PushMetadata {\n                manifest_version: 1,\n                app_version: \"0.1.0\",\n                baseline: \"first\",\n            })\n            .unwrap();\n\n        // Small delay not needed — timestamps have nanosecond precision.\n        let plan2 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter\n            .apply_with_history(\u0026plan2, \u0026PushMetadata {\n                manifest_version: 1,\n                app_version: \"0.2.0\",\n                baseline: \"second\",\n            })\n            .unwrap();\n\n        let entries = adapter.read_history(None).unwrap();\n        assert_eq!(entries.len(), 2);\n        assert_eq!(entries[0].baseline, \"second\");\n        assert_eq!(entries[1].baseline, \"first\");\n    }\n\n    #[test]\n    fn read_history_with_limit() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        // Push twice.\n        let plan1 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan1, \u0026push_meta(\"live_sqlite\")).unwrap();\n        let plan2 = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan2, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let all = adapter.read_history(None).unwrap();\n        assert_eq!(all.len(), 2);\n\n        let limited = adapter.read_history(Some(1)).unwrap();\n        assert_eq!(limited.len(), 1);\n    }\n\n    #[test]\n    fn read_history_entry_by_id() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let entries = adapter.read_history(None).unwrap();\n        let id = \u0026entries[0].id;\n\n        let entry = adapter.read_history_entry(id).unwrap().unwrap();\n        assert_eq!(\u0026entry.id, id);\n        assert_eq!(entry.operation_count, 2);\n    }\n\n    #[test]\n    fn read_history_entry_missing_id() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let result = adapter.read_history_entry(\"nonexistent\").unwrap();\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn history_entry_has_parsed_plan() {\n        let adapter = SqliteAdapter::in_memory().unwrap();\n        let manifest = test_manifest();\n\n        let plan = adapter.plan_from_live(\u0026manifest).unwrap();\n        adapter.apply_with_history(\u0026plan, \u0026push_meta(\"live_sqlite\")).unwrap();\n\n        let entries = adapter.read_history(None).unwrap();\n        let entry = \u0026entries[0];\n\n        // plan should be parsed from plan_json.\n        assert!(entry.plan.is_some());\n        let parsed_plan = entry.plan.as_ref().unwrap();\n        assert!(!parsed_plan.operations.is_empty());\n\n        // plan_json should still be present as raw string.\n        assert!(!entry.plan_json.is_empty());\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":640}},{"line":25,"address":[],"length":0,"stats":{"Line":74}},{"line":26,"address":[],"length":0,"stats":{"Line":942}},{"line":27,"address":[],"length":0,"stats":{"Line":378}},{"line":28,"address":[],"length":0,"stats":{"Line":300}},{"line":29,"address":[],"length":0,"stats":{"Line":370}},{"line":30,"address":[],"length":0,"stats":{"Line":368}},{"line":31,"address":[],"length":0,"stats":{"Line":78}},{"line":32,"address":[],"length":0,"stats":{"Line":296}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":186}},{"line":43,"address":[],"length":0,"stats":{"Li ,{"line":472,"address":[],"length":0,"stats":{"Line":84}},{"line":473,"address":[],"length":0,"stats":{"Line":130}},{"line":474,"address":[],"length":0,"stats":{"Line":296}},{"line":475,"address":[],"length":0,"stats":{"Line":296}},{"line":476,"address":[],"length":0,"stats":{"Line":74}},{"line":478,"address":[],"length":0,"stats":{"Line":28}},{"line":480,"address":[],"length":0,"stats":{"Line":28}},{"line":483,"address":[],"length":0,"stats":{"Line":140}},{"line":485,"address":[],"length":0,"stats":{"Line":56}},{"line":486,"address":[],"length":0,"stats":{"Line":250}},{"line":488,"address":[],"length":0,"stats":{"Line":74}},{"line":489,"address":[],"length":0,"stats":{"Line":54}},{"line":492,"address":[],"length":0,"stats":{"Line":40}},{"line":493,"address":[],"length":0,"stats":{"Line":20}},{"line":494,"address":[],"length":0,"stats":{"Line":40}},{"line":495,"address":[],"length":0,"stats":{"Line":20}},{"line":497,"address":[],"length":0,"stats":{"Line":60}},{"line":498,"address":[],"length":0,"stats":{"Line":80}},{"line":499,"address":[],"length":0,"stats":{"Line":20}},{"line":501,"address":[],"length":0,"stats":{"Line":20}},{"line":503,"address":[],"length":0,"stats":{"Line":60}},{"line":504,"address":[],"length":0,"stats":{"Line":60}},{"line":505,"address":[],"length":0,"stats":{"Line":20}},{"line":506,"address":[],"length":0,"stats":{"Line":20}},{"line":510,"address":[],"length":0,"stats":{"Line":28}},{"line":514,"address":[],"length":0,"stats":{"Line":0}},{"line":516,"address":[],"length":0,"stats":{"Line":0}},{"line":517,"address":[],"length":0,"stats":{"Line":0}}],"covered":226,"coverable":251},{"path":["/","Users","ericc59","Dev","agentdb","crates","studio_api","src","lib.rs"],"content":"use agentdb_core::AppManifest;\n\n// ---------------------------------------------------------------------------\n// Studio — debug inspection HTML\n// ---------------------------------------------------------------------------\n\n/// Generate the Studio inspector HTML page.\n/// This is a self-contained single-page app that talks to the dev server API.\npub fn generate_studio_html(manifest: \u0026AppManifest, api_base: \u0026str) -\u003e String {\n    let manifest_json = serde_json::to_string_pretty(manifest).unwrap_or_else(|_| \"{}\".into());\n\n    let entity_options: String = manifest\n        .entities\n        .iter()\n        .map(|e| format!(\"\u003coption value=\\\"{}\\\"\u003e{}\u003c/option\u003e\", e.name, e.name))\n        .collect::\u003cVec\u003c_\u003e\u003e()\n        .join(\"\\n            \");\n\n    format!(\n        r##\"\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"en\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"UTF-8\"\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n  \u003ctitle\u003e{name} — agentdb Studio\u003c/title\u003e\n  \u003cstyle\u003e\n    * {{ margin: 0; padding: 0; box-sizing: border-box; }}\n    body {{ font-family: system-ui, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background: #f8f9fa; }}\n    h1 {{ margin-bottom: 4px; }}\n    .subtitle {{ color: #666; margin-bottom: 20px; }}\n    .section {{ background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }}\n    h2 {{ margin-bottom: 12px; font-size: 16px; }}\n    select, input, button, textarea {{ font-size: 14px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }}\n    button {{ background: #333; color: white; cursor: pointer; border: none; padding: 8px 16px; }}\n    button:hover {{ background: #555; }}\n    pre {{ background: #f0f0f0; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; max-height: 400px; overflow-y: auto; }}\n    table {{ width: 100%; border-collapse: collapse; font-size: 13px; }}\n    th, td {{ text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; }}\n    th {{ font-weight: 600; background: #f8f8f8; }}\n    .toolbar {{ display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }}\n    #result {{ margin-top: 12px; }}\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003ch1\u003eagentdb Studio\u003c/h1\u003e\n  \u003cp class=\"subtitle\"\u003e{name} v{version}\u003c/p\u003e\n\n  \u003cdiv class=\"section\"\u003e\n    \u003ch2\u003eEntity Browser\u003c/h2\u003e\n    \u003cdiv class=\"toolbar\"\u003e\n      \u003cselect id=\"entitySelect\"\u003e\n        {entity_options}\n      \u003c/select\u003e\n      \u003cbutton onclick=\"loadRows()\"\u003eLoad\u003c/button\u003e\n      \u003cbutton onclick=\"showInsertForm()\"\u003e+ Insert\u003c/button\u003e\n    \u003c/div\u003e\n    \u003cdiv id=\"tableView\"\u003e\u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"section\" id=\"insertSection\" style=\"display:none\"\u003e\n    \u003ch2\u003eInsert Row\u003c/h2\u003e\n    \u003ctextarea id=\"insertData\" rows=\"4\" style=\"width:100%;font-family:monospace\"\u003e{{}}\u003c/textarea\u003e\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cbutton onclick=\"insertRow()\"\u003eInsert\u003c/button\u003e\n    \u003cspan id=\"insertResult\"\u003e\u003c/span\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"section\"\u003e\n    \u003ch2\u003eManifest\u003c/h2\u003e\n    \u003cpre\u003e{manifest_json}\u003c/pre\u003e\n  \u003c/div\u003e\n\n  \u003cscript\u003e\n    const API = \"{api_base}\";\n\n    async function loadRows() {{\n      const entity = document.getElementById(\"entitySelect\").value;\n      const res = await fetch(`${{API}}/api/entities/${{entity}}`);\n      const rows = await res.json();\n      if (rows.length === 0) {{\n        document.getElementById(\"tableView\").innerHTML = \"\u003cp\u003eNo rows.\u003c/p\u003e\";\n        return;\n      }}\n      const cols = Object.keys(rows[0]);\n      let html = \"\u003ctable\u003e\u003ctr\u003e\" + cols.map(c =\u003e `\u003cth\u003e${{c}}\u003c/th\u003e`).join(\"\") + \"\u003cth\u003e\u003c/th\u003e\u003c/tr\u003e\";\n      for (const row of rows) {{\n        html += \"\u003ctr\u003e\" + cols.map(c =\u003e `\u003ctd\u003e${{row[c] ?? \"\"}}\u003c/td\u003e`).join(\"\");\n        html += `\u003ctd\u003e\u003cbutton onclick=\"deleteRow('${{entity}}', '${{row.id}}')\"\u003eDelete\u003c/button\u003e\u003c/td\u003e`;\n        html += \"\u003c/tr\u003e\";\n      }}\n      html += \"\u003c/table\u003e\";\n      document.getElementById(\"tableView\").innerHTML = html;\n    }}\n\n    function showInsertForm() {{\n      document.getElementById(\"insertSection\").style.display = \"block\";\n    }}\n\n    async function insertRow() {{\n      const entity = document.getElementById(\"entitySelect\").value;\n      const data = JSON.parse(document.getElementById(\"insertData\").value);\n      const res = await fetch(`${{API}}/api/entities/${{entity}}`, {{\n        method: \"POST\",\n        headers: {{ \"Content-Type\": \"application/json\" }},\n        body: JSON.stringify(data)\n      }});\n      const result = await res.json();\n      document.getElementById(\"insertResult\").textContent = JSON.stringify(result);\n      loadRows();\n    }}\n\n    async function deleteRow(entity, id) {{\n      await fetch(`${{API}}/api/entities/${{entity}}/${{id}}`, {{ method: \"DELETE\" }});\n      loadRows();\n    }}\n\n    loadRows();\n  \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\"##,\n        name = manifest.name,\n        version = manifest.version,\n        entity_options = entity_options,\n        manifest_json = manifest_json,\n        api_base = api_base,\n    )\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn test_manifest() -\u003e AppManifest {\n        serde_json::from_str(include_str!(\"../../../examples/todo-app/agentdb.manifest.json\"))\n            .unwrap()\n    }\n\n    #[test]\n    fn generates_html() {\n        let html = gene ne for deletes).\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub data: Option\u003cserde_json::Value\u003e,\n    /// Timestamp of the change.\n    pub timestamp: String,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"lowercase\")]\npub enum ChangeKind {\n    Insert,\n    Update,\n    Delete,\n}\n\n// ---------------------------------------------------------------------------\n// Sync cursor — tracks client position in the log\n// ---------------------------------------------------------------------------\n\n/// A sync cursor representing a client's position in the change log.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct SyncCursor {\n    /// The last sequence number the client has seen.\n    pub last_seq: u64,\n}\n\nimpl SyncCursor {\n    pub fn beginning() -\u003e Self {\n        Self { last_seq: 0 }\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Pull response — what the server sends to a pulling client\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PullResponse {\n    /// Changes since the client's cursor.\n    pub changes: Vec\u003cChangeEvent\u003e,\n    /// The new cursor position after these changes.\n    pub cursor: SyncCursor,\n    /// Whether there are more changes to pull.\n    pub has_more: bool,\n}\n\n// ---------------------------------------------------------------------------\n// Push request — what a client sends to push changes\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PushRequest {\n    /// The changes the client wants to push.\n    pub changes: Vec\u003cClientChange\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ClientChange {\n    pub entity: String,\n    pub row_id: String,\n    pub kind: ChangeKind,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub data: Option\u003cserde_json::Value\u003e,\n}\n\n// ---------------------------------------------------------------------------\n// Change log — in-memory append-only log\n// ---------------------------------------------------------------------------\n\n/// An in-memory change log for development.\npub struct ChangeLog {\n    events: Mutex\u003cVec\u003cChangeEvent\u003e\u003e,\n    seq: Mutex\u003cu64\u003e,\n}\n\nimpl ChangeLog {\n    pub fn new() -\u003e Self {\n        Self {\n            events: Mutex::new(Vec::new()),\n            seq: Mutex::new(0),\n        }\n    }\n\n    /// Append a change event. Returns the assigned sequence number.\n    pub fn append(\u0026self, entity: \u0026str, row_id: \u0026str, kind: ChangeKind, data: Option\u003cserde_json::Value\u003e) -\u003e u64 {\n        let mut seq = self.seq.lock().unwrap();\n        *seq += 1;\n        let event = ChangeEvent {\n            seq: *seq,\n            entity: entity.to_string(),\n            row_id: row_id.to_string(),\n            kind,\n            data,\n            timestamp: now_iso8601(),\n        };\n        self.events.lock().unwrap().push(event);\n        *seq\n    }\n\n    /// Pull changes since a cursor, up to a limit.\n    pub fn pull(\u0026self, cursor: \u0026SyncCursor, limit: usize) -\u003e PullResponse {\n        let events = self.events.lock().unwrap();\n        let changes: Vec\u003cChangeEvent\u003e = events\n            .iter()\n            .filter(|e| e.seq \u003e cursor.last_seq)\n            .take(limit)\n            .cloned()\n            .collect();\n\n        let last_seq = changes.last().map(|e| e.seq).unwrap_or(cursor.last_seq);\n        let has_more = events.iter().any(|e| e.seq \u003e last_seq);\n\n        PullResponse {\n            changes,\n            cursor: SyncCursor { last_seq },\n            has_more,\n        }\n    }\n\n    /// Get the total number of events in the log.\n    pub fn len(\u0026self) -\u003e usize {\n        self.events.lock().unwrap().len()\n    }\n\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.events.lock().unwrap().is_empty()\n    }\n}\n\nfn now_iso8601() -\u003e String {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let ts = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n    format!(\"{}Z\", ts)\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn empty_log() {\n        let log = ChangeLog::new();\n        assert!(log.is_empty());\n        assert_eq!(log.len(), 0);\n    }\n\n    #[test]\n    fn append_and_pull() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Insert, Some(serde_json::json!({\"name\": \"Alice\"})));\n        log.append(\"User\", \"u2\", ChangeKind::Insert, Some(serde_json::json!({\"name\": \"Bob\"})));\n\n        assert_eq!(log.len(), 2);\n\n        let resp = log.pull(\u0026SyncCursor::beginning(), 100);\n        assert_eq!(resp.changes.len(), 2);\n        assert_eq!(resp.cursor.last_seq, 2);\n        assert!(!resp.has_more);\n    }\n\n    #[test]\n    fn pull_with_cursor() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Insert, None);\n        log.append(\"User\", \"u2\", ChangeKind::Insert, None);\n        log.append(\"User\", \"u3\", ChangeKind::Insert, None);\n\n        // Pull from seq 1 — should get events 2 and 3.\n        let resp = log.pull(\u0026SyncCursor { last_seq: 1 }, 100);\n        assert_eq!(resp.changes.len(), 2);\n        assert_eq!(resp.changes[0].seq, 2);\n        assert_eq!(resp.changes[1].seq, 3);\n    }\n\n    #[test]\n    fn pull_with_limit() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Insert, None);\n        log.append(\"User\", \"u2\", ChangeKind::Insert, None);\n        log.append(\"User\", \"u3\", ChangeKind::Insert, None);\n\n        let resp = log.pull(\u0026SyncCursor::beginning(), 2);\n        assert_eq!(resp.changes.len(), 2);\n        assert!(resp.has_more);\n        assert_eq!(resp.cursor.last_seq, 2);\n\n        // Continue pulling.\n        let resp2 = log.pull(\u0026resp.cursor, 2);\n        assert_eq!(resp2.changes.len(), 1);\n        assert!(!resp2.has_more);\n    }\n\n    #[test]\n    fn change_kinds() {\n        let log = ChangeLog::new();\n        log.append(\"Todo\", \"t1\", ChangeKind::Insert, Some(serde_json::json!({\"title\": \"Test\"})));\n        log.append(\"Todo\", \"t1\", ChangeKind::Update, Some(serde_json::json!({\"title\": \"Updated\"})));\n        log.append(\"Todo\", \"t1\", ChangeKind::Delete, None);\n\n        let resp = log.pull(\u0026SyncCursor::beginning(), 100);\n        assert_eq!(resp.changes[0].kind, ChangeKind::Insert);\n        assert_eq!(resp.changes[1].kind, ChangeKind::Update);\n        assert_eq!(resp.changes[2].kind, ChangeKind::Delete);\n        assert!(resp.changes[2].data.is_none());\n    }\n\n    #[test]\n    fn sequence_numbers_are_monotonic() {\n        let log = ChangeLog::new();\n        let s1 = log.append(\"A\", \"1\", ChangeKind::Insert, None);\n        let s2 = log.append(\"B\", \"2\", ChangeKind::Insert, None);\n        let s3 = log.append(\"C\", \"3\", ChangeKind::Insert, None);\n        assert_eq!(s1, 1);\n        assert_eq!(s2, 2);\n        assert_eq!(s3, 3);\n    }\n\n    #[test]\n    fn serialization_roundtrip() {\n        let event = ChangeEvent {\n            seq: 1,\n            entity: \"User\".into(),\n            row_id: \"u1\".into(),\n            kind: ChangeKind::Insert,\n            data: Some(serde_json::json!({\"name\": \"Test\"})),\n            timestamp: \"2024-01-01T00:00:00Z\".into(),\n        };\n        let json = serde_json::to_string(\u0026event).unwrap();\n        let parsed: ChangeEvent = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(event, parsed);\n    }\n\n    // -- Edge cases --\n\n    #[test]\n    fn pull_from_future_cursor_returns_empty() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Insert, None);\n        let resp = log.pull(\u0026SyncCursor { last_seq: 999 }, 100);\n        assert!(resp.changes.is_empty());\n        assert!(!resp.has_more);\n    }\n\n    #[test]\n    fn pull_limit_zero_returns_empty() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Insert, None);\n        let resp = log.pull(\u0026SyncCursor::beginning(), 0);\n        assert!(resp.changes.is_empty());\n    }\n\n    #[test]\n    fn delete_event_has_no_data() {\n        let log = ChangeLog::new();\n        log.append(\"User\", \"u1\", ChangeKind::Delete, None);\n        let resp = log.pull(\u0026SyncCursor::beginning(), 100);\n        assert!(resp.changes[0].data.is_none());\n    }\n\n    #[test]\n    fn concurrent_appends_get_unique_seqs() {\n        let log = ChangeLog::new();\n        let s1 = log.append(\"A\", \"1\", ChangeKind::Insert, None);\n        let s2 = log.append(\"A\", \"1\", ChangeKind::Update, None);\n        let s3 = log.append(\"A\", \"1\", ChangeKind::Delete, None);\n        assert!(s1 \u003c s2);\n        assert!(s2 \u003c s3);\n    }\n\n    #[test]\n    fn push_request_serialization() {\n        let req = PushRequest {\n            changes: vec![\n                ClientChange {\n                    entity: \"User\".into(),\n                    row_id: \"u1\".into(),\n                    kind: ChangeKind::Insert,\n                    data: Some(serde_json::json!({\"name\": \"Alice\"})),\n                },\n            ],\n        };\n        let json = serde_json::to_string(\u0026req).unwrap();\n        let parsed: PushRequest = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(parsed.changes.len(), 1);\n        assert_eq!(parsed.changes[0].entity, \"User\");\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":5}},{"line":96,"address":[],"length":0,"stats":{"Line":10}},{"line":98,"address":[],"length":0,"stats":{"Line":20}},{"line":99,"address":[],"length":0,"stats":{"Line":10}},{"line":104,"address":[],"length":0,"stats":{"Line":20}},{"line":105,"address":[],"length":0,"stats":{"Line":80}},{"line":106,"address":[],"length":0,"stats":{"Line":20}},{"line":108,"address":[],"length":0,"stats":{"Line":40}},{"line":109,"address":[],"length":0,"stats":{"Line":60}},{"line":110,"address":[],"length":0,"stats":{"Line":60}},{"line":113,"address":[],"length":0,"stats":{"Line":20}},{"line":115,"address":[],"length":0,"stats":{"Line":60}},{"line":116,"address":[],"length":0,"stats":{"Line":20}},{"line":120,"address":[],"length":0,"stats":{"Line":8}},{"line":121,"address":[],"length":0,"stats":{"Line":32}},{"line":122,"address":[],"length":0,"stats":{"Line":24}},{"line":124,"address":[],"length":0,"stats":{"Line":38}},{"line":125,"address":[],"length":0,"stats":{"Line":16}},{"line":129,"address":[],"length":0,"stats":{"Line":40}},{"line":130,"address":[],"length":0,"stats":{"Line":58}},{"line":134,"address":[],"length":0,"stats":{"Line":8}},{"line":140,"address":[],"length":0,"stats":{"Line":2}},{"line":141,"address":[],"length":0,"stats":{"Line":4}},{"line":144,"address":[],"length":0,"stats":{"Line":1}},{"line":145,"address":[],"length":0,"stats":{"Line":2}},{"line":149,"address":[],"length":0,"stats":{"Line":20}},{"line":151,"address":[],"length":0,"stats":{"Line":60}},{"line":152,"address":[],"length":0,"stats":{"Line":20}},{"line":155,"address":[],"length":0,"stats":{"Line":40}}],"covered":29,"coverable":29}]};

    <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();

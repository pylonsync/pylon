],"length":0,"stats":{"Line":0}},{"line":257,"address":[],"length":0,"stats":{"Line":0}},{"line":258,"address":[],"length":0,"stats":{"Line":0}},{"line":259,"address":[],"length":0,"stats":{"Line":0}},{"line":260,"address":[],"length":0,"stats":{"Line":0}},{"line":263,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":155},{"path":["/","Users","ericc59","Dev","agentdb","crates","cli","src","commands","mod.rs"],"content":"pub mod build;\npub mod codegen;\npub mod deploy;\npub mod codegen_client;\npub mod dev;\npub mod doctor;\npub mod explain;\npub mod init;\npub mod schema;\npub mod version;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","ericc59","Dev","agentdb","crates","cli","src","commands","schema.rs"],"content":"use std::collections::{BTreeSet, HashMap};\n\nuse agentdb_core::{AppManifest, Diagnostic, ExitCode, Severity};\nuse serde::Serialize;\n\nuse crate::manifest::{load_manifest, validate_all};\nuse crate::output::{print_diagnostics, print_json};\n\n// ---------------------------------------------------------------------------\n// schema check\n// ---------------------------------------------------------------------------\n\npub fn run_check(args: \u0026[String], json_mode: bool) -\u003e ExitCode {\n    let path = args\n        .iter()\n        .filter(|a| !a.starts_with('-') \u0026\u0026 *a != \"schema\" \u0026\u0026 *a != \"check\")\n        .next()\n        .map(|s| s.as_str());\n\n    let manifest_path = path.unwrap_or(\"agentdb.manifest.json\");\n\n    let manifest = match load_manifest(manifest_path) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let mut diagnostics = validate_all(\u0026manifest);\n\n    if diagnostics.is_empty() {\n        diagnostics.push(Diagnostic {\n            severity: Severity::Info,\n            code: \"SCHEMA_OK\".into(),\n            message: format!(\n                \"Schema valid: {} entities, {} queries, {} actions, {} policies, {} routes\",\n                manifest.entities.len(),\n                manifest.queries.len(),\n                manifest.actions.len(),\n                manifest.policies.len(),\n                manifest.routes.len(),\n            ),\n            span: None,\n            hint: None,\n        });\n    }\n\n    let has_errors = diagnostics.iter().any(|d| d.severity == Severity::Error);\n    print_diagnostics(\u0026diagnostics, json_mode);\n    if has_errors {\n        ExitCode::Error\n    } else {\n        ExitCode::Ok\n    }\n}\n\n// ---------------------------------------------------------------------------\n// schema diff\n// ---------------------------------------------------------------------------\n\n#[derive(Serialize)]\nstruct DiffResult {\n    changes: Vec\u003cDiffChange\u003e,\n    summary: DiffSummary,\n}\n\n#[derive(Serialize, Clone)]\nstruct DiffChange {\n    kind: String,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    entity: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    name: Option\u003cString\u003e,\n}\n\n#[derive(Serialize)]\nstruct DiffSummary {\n    total: usize,\n    added: usize,\n    removed: usize,\n}\n\npub fn run_diff(args: \u0026[String], json_mode: bool) -\u003e ExitCode {\n    let positional: Vec\u003c\u0026str\u003e = args\n        .iter()\n        .filter(|a| !a.starts_with('-') \u0026\u0026 *a != \"schema\" \u0026\u0026 *a != \"diff\")\n        .map(|s| s.as_str())\n        .collect();\n\n    if positional.len() \u003c 2 {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"DIFF_MISSING_ARGS\".into(),\n                message: \"Two manifest paths are required\".into(),\n                span: None,\n                hint: Some(\"Usage: agentdb schema diff \u003cold-manifest\u003e \u003cnew-manifest\u003e\".into()),\n            }],\n            json_mode,\n        );\n        return ExitCode::Usage;\n    }\n\n    let old_path = positional[0];\n    let new_path = positional[1];\n\n    let old_manifest = match load_manifest(old_path) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let new_manifest = match load_manifest(new_path) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let changes = compute_diff(\u0026old_manifest, \u0026new_manifest);\n    let added = changes.iter().filter(|c| c.kind.ends_with(\"_added\")).count();\n    let removed = changes.iter().filter(|c| c.kind.ends_with(\"_removed\")).count();\n\n    let result = DiffResult {\n        summary: DiffSummary {\n            total: changes.len(),\n            added,\n            removed,\n        },\n        changes,\n    };\n\n    if json_mode {\n        print_json(\u0026result);\n    } else {\n        if result.changes.is_empty() {\n            println!(\"No changes.\");\n        } else {\n            for change in \u0026result.changes {\n                let detail = match (\u0026change.entity, \u0026change.name) {\n                    (Some(entity), Some(name)) =\u003e format!(\"{entity}.{name}\"),\n                    (Some(entity), None) =\u003e entity.clone(),\n                    (None, Some(name)) =\u003e name.clone(),\n                    (None, None) =\u003e String::new(),\n                };\n                if detail.is_empty() {\n                    println!(\"  {}\", change.kind);\n                } else {\n                    println!(\"  {} {}\", change.kind, detail);\n                }\n            }\n            println!();\n            println!(\n                \"{} changes ({} added, {} removed)\",\n                result.summary.total, result.summary.added, result.summary.removed\n            );\n        }\n    }\n\n    ExitCode::Ok\n}\n\n// ---------------------------------------------------------------------------\n// schema push\n// ---------------------------------------------------------------------------\n\n#[derive(Serialize)]\nstruct PushResult {\n    code: \u0026'static str,\n    dry_run: bool,\n    applied: bool,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    adapter: Option\u003c\u0026'static str\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    database_path: Option\u003cString\u003e,\n    baseline: \u0026'static str,\n    manifest_version: u32,\n    plan: agentdb_storage::SchemaPlan,\n    analysis: agentdb_storage::PlanAnalysis,\n    diagnostics: Vec\u003cDiagnostic\u003e,\n}\n\npub fn run_push(args: \u0026[String], json_mode: bool) -\u003e ExitCode {\n    let dry_run = args.iter().any(|a| a == \"--dry-run\");\n\n    let sqlite_path = args\n        .windows(2)\n        .find(|w| w[0] == \"--sqlite\")\n        .map(|w| w[1].as_str());\n\n    let postgres_url = args\n        .windows(2)\n        .find(|w| w[0] == \"--postgres\")\n        .map(|w| w[1].as_str());\n\n    let from_path = args\n        .windows(2)\n        .find(|w| w[0] == \"--from\")\n        .map(|w| w[1].as_str());\n\n    // Count apply targets.\n    let apply_targets = [sqlite_path.is_some(), postgres_url.is_some()]\n        .iter()\n        .filter(|\u0026\u0026x| x)\n        .count();\n\n    // Reject ambiguous flag combinations.\n    if dry_run \u0026\u0026 apply_targets \u003e 0 {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"PUSH_AMBIGUOUS_MODE\".into(),\n                message: \"Cannot use --dry-run with --sqlite or --postgres\".into(),\n                span: None,\n                hint: Some(\"Use --dry-run to preview, or a target flag to apply\".into()),\n            }],\n            json_mode,\n        );\n        return ExitCode::Usage;\n    }\n\n    if apply_targets \u003e 1 {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"PUSH_AMBIGUOUS_MODE\".into(),\n                message: \"Cannot use both --sqlite and --postgres\".into(),\n                span: None,\n                hint: Some(\"Choose one target\".into()),\n            }],\n            json_mode,\n        );\n        return ExitCode::Usage;\n    }\n\n    // Require at least one mode.\n    if !dry_run \u0026\u0026 apply_targets == 0 {\n        print_diagnostics(\n            \u0026[Diagnostic {\n                severity: Severity::Error,\n                code: \"PUSH_NO_TARGET\".into(),\n                message: \"No push target specified\".into(),\n                span: None,\n                hint: Some(\n                    \"Use --dry-run, --sqlite \u003cpath\u003e, or --postgres \u003curl\u003e\"\n                        .into(),\n                ),\n            }],\n            json_mode,\n        );\n        return ExitCode::Usage;\n    }\n\n    let positional: Vec\u003c\u0026str\u003e = args\n        .iter()\n        .filter(|a| {\n            !a.starts_with('-')\n                \u0026\u0026 *a != \"schema\"\n                \u0026\u0026 *a != \"push\"\n                \u0026\u0026 Some(a.as_str()) != from_path\n                \u0026\u0026 Some(a.as_str()) != sqlite_path\n                \u0026\u0026 Some(a.as_str()) != postgres_url\n        })\n        .map(|s| s.as_str())\n        .collect();\n\n    let manifest_path = match positional.first() {\n        Some(p) =\u003e *p,\n        None =\u003e {\n            print_diagnostics(\n                \u0026[Diagnostic {\n                    severity: Severity::Error,\n                    code: \"PUSH_MISSING_MANIFEST\".into(),\n                    message: \"No manifest path provided\".into(),\n                    span: None,\n                    hint: Some(\n                        \"Usage: agentdb schema push \u003cmanifest\u003e --dry-run|--sqlite \u003cpath\u003e [--from \u003cold\u003e]\"\n                            .into(),\n                    ),\n                }],\n                json_mode,\n            );\n            return ExitCode::Usage;\n        }\n    };\n\n    // Load and validate the target manifest.\n    let manifest = match load_manifest(manifest_path) {\n        Ok(m) =\u003e m,\n        Err(diags) =\u003e {\n            print_diagnostics(\u0026diags, json_mode);\n            return ExitCode::Error;\n        }\n    };\n\n    let validation_diags = validate_all(\u0026manifest);\n    let has_errors = validation_diags.iter().any(|d| d.severity == Severity::Error);\n\n    if has_errors {\n        print_diagnostics(\u0026validation_diags, json_mode);\n        return ExitCode::Error;\n    }\n\n    // Build the storage plan.\n    let plan = match build_plan(\u0026manifest, from_path, json_mode) {\n        Some(p) =\u003e p,\n        None =\u003e return ExitCode::Error,\n    };\n\n    if dry_run {\n        // Dry-run: report plan, do not apply.\n        let baseline = if from_path.is_some() { \"manifest\" } else { \"empty\" };\n        let analysis = agentdb_storage::analyze_plan(\u0026plan);\n        let result = PushResult {\n            code: \"PUSH_DRY_RUN\",\n            dry_run: true,\n            applied: false,\n            adapter: None,\n            database_path: None,\n            baseline,\n            manifest_version: manifest.manifest_version,\n            plan: plan.clone(),\n            analysis: analysis.clone(),\n            diagnostics: validation_diags,\n        };\n\n        if json_mode {\n            print_json(\u0026result);\n        } else {\n            println!(\"schema push --dry-run\");\n            println!();\n            println!(\"  Manifest:  {manifest_path}\");\n            println!(\"  Baseline:  {baseline}\");\n            println!(\"  Version:   {}\", manifest.manifest_version);\n            print_plan_human(\u0026plan);\n            print_warnings_human(\u0026analysis);\n            println!();\n            println!(\"  Schema validated. Not applied (dry-run only).\");\n        }\n\n        return ExitCode::Ok;\n    }\n\n    if let Some(db_path) = sqlite_path {\n        // SQLite apply mode.\n        let adapter = match agentdb_storage::sqlite::SqliteAdapter::open(db_path) {\n            Ok(a) =\u003e a,\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: \"SQLITE_OPEN_FAILED\".into(),\n                        message: format!(\"Failed to open SQLite database: {e}\"),\n                        span: None,\n                        hint: None,\n                    }],\n                    json_mode,\n                );\n                return ExitCode::Error;\n            }\n        };\n\n        // Plan from live DB state if no --from, otherwise use manifest baseline.\n        let (live_plan, baseline) = if from_path.is_some() {\n            // Already have a plan from build_plan using --from.\n            (plan, \"manifest\")\n        } else {\n            // Plan from live DB introspection.\n            match adapter.plan_from_live(\u0026manifest) {\n                Ok(p) =\u003e (p, \"live_sqlite\"),\n                Err(e) =\u003e {\n                    print_diagnostics(\n                        \u0026[Diagnostic {\n                            severity: Severity::Error,\n                            code: \"PUSH_PLAN_FAILED\".into(),\n                            message: format!(\"Failed to plan from live DB: {e}\"),\n                            span: None,\n                            hint: None,\n                        }],\n                        json_mode,\n                    );\n                    return ExitCode::Error;\n                }\n            }\n        };\n\n        let analysis = agentdb_storage::analyze_plan(\u0026live_plan);\n\n        // Block apply if the plan contains unsupported operations.\n        if analysis.has_unsupported {\n            let result = PushResult {\n                code: \"PUSH_BLOCKED\",\n                dry_run: false,\n                applied: false,\n                adapter: Some(\"sqlite\"),\n                database_path: Some(db_path.to_string()),\n                baseline,\n                manifest_version: manifest.manifest_version,\n                plan: live_plan.clone(),\n                analysis: analysis.clone(),\n                diagnostics: validation_diags,\n            };\n\n            if json_mode {\n                print_json(\u0026result);\n            } else {\n                println!(\"schema push --sqlite (BLOCKED)\");\n                println!();\n                println!(\"  Manifest:  {manifest_path}\");\n                println!(\"  Database:  {db_path}\");\n                println!(\"  Baseline:  {baseline}\");\n                println!(\"  Version:   {}\", manifest.manifest_version);\n                print_plan_human(\u0026live_plan);\n                print_warnings_human(\u0026analysis);\n                println!();\n                println!(\"  Push blocked: plan contains unsupported operations.\");\n            }\n\n            return ExitCode::Error;\n        }\n\n        let push_meta = agentdb_storage::sqlite::PushMetadata {\n            manifest_version: manifest.manifest_version,\n            app_version: \u0026manifest.version,\n            baseline,\n        };\n\n        match adapter.apply_with_history(\u0026live_plan, \u0026push_meta) {\n            Ok(()) =\u003e {\n                let result = PushResult {\n                    code: \"PUSH_APPLIED\",\n                    dry_run: false,\n                    applied: true,\n                    adapter: Some(\"sqlite\"),\n                    database_path: Some(db_path.to_string()),\n                    baseline,\n                    manifest_version: manifest.manifest_version,\n                    plan: live_plan.clone(),\n                    analysis,\n                    diagnostics: validation_diags,\n                };\n\n                if json_mode {\n                    print_json(\u0026result);\n                } else {\n                    println!(\"schema push --sqlite\");\n                    println!();\n                    println!(\"  Manifest:  {manifest_path}\");\n                    println!(\"  Database:  {db_path}\");\n                    println!(\"  Baseline:  {baseline}\");\n                    println!(\"  Version:   {}\", manifest.manifest_version);\n                    print_plan_human(\u0026live_plan);\n                    println!();\n                    println!(\"  Schema applied successfully.\");\n                }\n\n                ExitCode::Ok\n            }\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: e.code.clone(),\n                        message: e.message.clone(),\n                        span: None,\n                        hint: if e.code == \"SQLITE_OP_UNSUPPORTED\" {\n                            Some(\"This operation is not yet supported by the SQLite adapter\".into())\n                        } else {\n                            None\n                        },\n                    }],\n                    json_mode,\n                );\n                ExitCode::Error\n            }\n        }\n    } else if let Some(pg_url) = postgres_url {\n        // Postgres apply mode.\n        let mut adapter = match agentdb_storage::postgres::live::LivePostgresAdapter::connect(pg_url) {\n            Ok(a) =\u003e a,\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: \"PG_CONNECT_FAILED\".into(),\n                        message: format!(\"Failed to connect to Postgres: {e}\"),\n                        span: None,\n                        hint: None,\n                    }],\n                    json_mode,\n                );\n                return ExitCode::Error;\n            }\n        };\n\n        let (pg_plan, baseline) = if from_path.is_some() {\n            (plan, \"manifest\")\n        } else {\n            match adapter.plan_from_live(\u0026manifest) {\n                Ok(p) =\u003e (p, \"live_postgres\"),\n                Err(e) =\u003e {\n                    print_diagnostics(\n                        \u0026[Diagnostic {\n                            severity: Severity::Error,\n                            code: \"PUSH_PLAN_FAILED\".into(),\n                            message: format!(\"Failed to plan from live Postgres: {e}\"),\n                            span: None,\n                            hint: None,\n                        }],\n                        json_mode,\n                    );\n                    return ExitCode::Error;\n                }\n            }\n        };\n\n        let analysis = agentdb_storage::analyze_plan(\u0026pg_plan);\n\n        if analysis.has_unsupported {\n            let result = PushResult {\n                code: \"PUSH_BLOCKED\",\n                dry_run: false,\n                applied: false,\n                adapter: Some(\"postgres\"),\n                database_path: Some(pg_url.to_string()),\n                baseline,\n                manifest_version: manifest.manifest_version,\n                plan: pg_plan.clone(),\n                analysis: analysis.clone(),\n                diagnostics: validation_diags,\n            };\n\n            if json_mode {\n                print_json(\u0026result);\n            } else {\n                println!(\"schema push --postgres (BLOCKED)\");\n                println!();\n                print_plan_human(\u0026pg_plan);\n                print_warnings_human(\u0026analysis);\n                println!();\n                println!(\"  Push blocked: plan contains unsupported operations.\");\n            }\n            return ExitCode::Error;\n        }\n\n        match adapter.apply_plan(\u0026pg_plan) {\n            Ok(()) =\u003e {\n                let result = PushResult {\n                    code: \"PUSH_APPLIED\",\n                    dry_run: false,\n                    applied: true,\n                    adapter: Some(\"postgres\"),\n                    database_path: Some(pg_url.to_string()),\n                    baseline,\n                    manifest_version: manifest.manifest_version,\n                    plan: pg_plan.clone(),\n                    analysis,\n                    diagnostics: validation_diags,\n                };\n\n                if json_mode {\n                    print_json(\u0026result);\n                } else {\n                    println!(\"schema push --postgres\");\n                    println!();\n                    println!(\"  Manifest:  {manifest_path}\");\n                    println!(\"  Database:  {pg_url}\");\n                    println!(\"  Baseline:  {baseline}\");\n                    println!(\"  Version:   {}\", manifest.manifest_version);\n                    print_plan_human(\u0026pg_plan);\n                    println!();\n                    println!(\"  Schema applied successfully.\");\n                }\n\n                ExitCode::Ok\n            }\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: e.code.clone(),\n                        message: e.message.clone(),\n                        span: None,\n                        hint: None,\n                    }],\n                    json_mode,\n                );\n                ExitCode::Error\n            }\n        }\n    } else {\n        ExitCode::Ok\n    }\n}\n\nfn build_plan(\n    manifest: \u0026AppManifest,\n    from_path: Option\u003c\u0026str\u003e,\n    json_mode: bool,\n) -\u003e Option\u003cagentdb_storage::SchemaPlan\u003e {\n    if let Some(from) = from_path {\n        let old_manifest = match load_manifest(from) {\n            Ok(m) =\u003e m,\n            Err(diags) =\u003e {\n                print_diagnostics(\u0026diags, json_mode);\n                return None;\n            }\n        };\n        let adapter = agentdb_storage::DiffAdapter { from: old_manifest };\n        match agentdb_storage::StorageAdapter::plan_schema(\u0026adapter, manifest) {\n            Ok(p) =\u003e Some(p),\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: \"PUSH_PLAN_FAILED\".into(),\n                        message: format!(\"Failed to plan schema: {e}\"),\n                        span: None,\n                        hint: None,\n                    }],\n                    json_mode,\n                );\n                None\n            }\n        }\n    } else {\n        let adapter = agentdb_storage::DryRunAdapter;\n        match agentdb_storage::StorageAdapter::plan_schema(\u0026adapter, manifest) {\n            Ok(p) =\u003e Some(p),\n            Err(e) =\u003e {\n                print_diagnostics(\n                    \u0026[Diagnostic {\n                        severity: Severity::Error,\n                        code: \"PUSH_PLAN_FAILED\".into(),\n                        message: format!(\"Failed to plan schema: {e}\"),\n                        span: None,\n                        hint: None,\n                    }],\n                    json_mode,\n                );\n                None\n            }\n        }\n    }\n}\n\nfn print_plan_human(plan: \u0026agentdb_storage::SchemaPlan) {\n    if plan.is_empty() {\n        println!();\n        println!(\"  No operations n ,\n        Some(\"schema\") =\u003e match positional.get(1).copied() {\n            Some(\"check\") =\u003e commands::schema::run_check(\u0026args, json_mode),\n            Some(\"diff\") =\u003e commands::schema::run_diff(\u0026args, json_mode),\n            Some(\"push\") =\u003e commands::schema::run_push(\u0026args, json_mode),\n            Some(\"inspect\") =\u003e commands::schema::run_inspect(\u0026args, json_mode),\n            Some(\"history\") =\u003e commands::schema::run_history(\u0026args, json_mode),\n            Some(sub) =\u003e {\n                eprintln!(\"unknown schema subcommand: {sub}\");\n                print_usage();\n                ExitCode::Usage\n            }\n            None =\u003e {\n                eprintln!(\"schema requires a subcommand\");\n                print_usage();\n                ExitCode::Usage\n            }\n        },\n        Some(\"version\") =\u003e commands::version::run(json_mode),\n        Some(cmd) =\u003e {\n            eprintln!(\"unknown command: {cmd}\");\n            print_usage();\n            ExitCode::Usage\n        }\n        None =\u003e {\n            if args.iter().any(|a| a == \"--version\") {\n                commands::version::run(json_mode)\n            } else {\n                print_usage();\n                ExitCode::Ok\n            }\n        }\n    }\n}\n\nfn print_usage() {\n    println!(\"agentdb \u003ccommand\u003e\");\n    println!();\n    println!(\"Commands:\");\n    println!(\"  build [manifest]         Build static pages (--out \u003cdir\u003e)\");\n    println!(\"  deploy [manifest]        Create deploy package (--out \u003cdir\u003e)\");\n    println!(\"  init \u003cpath\u003e              Create a new app from a template\");\n    println!(\"  dev [entry.ts]           Watch + codegen + validate + dev server (--once, --port)\");\n    println!(\"  codegen \u003centry.ts\u003e       Generate manifest from TS app definition\");\n    println!(\"  codegen client \u003cmanifest\u003e Generate TS client bindings [--out \u003cpath\u003e]\");\n    println!(\"  schema check [manifest]  Validate schema and manifest\");\n    println!(\"  schema diff \u003cold\u003e \u003cnew\u003e  Compare two manifests\");\n    println!(\"  schema push \u003cmanifest\u003e  Push schema (--dry-run, --sqlite, or --postgres)\");\n    println!(\"  schema inspect          Inspect live DB (--sqlite \u003cpath\u003e or --postgres \u003curl\u003e)\");\n    println!(\"  schema history          View push history (--sqlite \u003cpath\u003e)\");\n    println!(\"  doctor [manifest-path]   Environment and manifest health check\");\n    println!(\"  explain [manifest-path]  Print a structured summary\");\n    println!(\"  version                  Print version\");\n    println!();\n    println!(\"Flags:\");\n    println!(\"  --json                Machine-readable JSON output\");\n    println!(\"  --out \u003cpath\u003e          Write codegen output to file (codegen only)\");\n    println!(\"  --template \u003cname\u003e     Template for init (default: basic)\");\n}\n","traces":[{"line":9,"address":[],"length":0,"stats":{"Line":0}},{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats": s valid JSON matching the canonical schema\".into()),\n        }]\n    })\n}\n\n/// Read and parse a manifest file from disk.\npub fn load_manifest(path: \u0026str) -\u003e Result\u003cAppManifest, Vec\u003cDiagnostic\u003e\u003e {\n    let contents = std::fs::read_to_string(path).map_err(|e| {\n        vec![Diagnostic {\n            severity: Severity::Error,\n            code: \"MANIFEST_READ_FAILED\".into(),\n            message: format!(\"Could not read manifest: {path}: {e}\"),\n            span: None,\n            hint: Some(\"Provide a valid manifest path or run from the project root\".into()),\n        }]\n    })?;\n    parse_manifest(\u0026contents, path)\n}\n\n/// Convert an AppManifest into a Schema for validation.\npub fn manifest_to_schema(manifest: \u0026AppManifest) -\u003e Schema {\n    Schema {\n        entities: manifest\n            .entities\n            .iter()\n            .map(|e| Entity {\n                name: e.name.clone(),\n                fields: e\n                    .fields\n                    .iter()\n                    .map(|f| Field {\n                        name: f.name.clone(),\n                        field_type: parse_field_type(\u0026f.field_type),\n                        optional: f.optional,\n                        unique: f.unique,\n                    })\n                    .collect(),\n                indexes: e\n                    .indexes\n                    .iter()\n                    .map(|i| Index {\n                        name: i.name.clone(),\n                        fields: i.fields.clone(),\n                        unique: i.unique,\n                    })\n                    .collect(),\n            })\n            .collect(),\n        queries: manifest.queries.clone(),\n        actions: manifest.actions.clone(),\n        policies: manifest.policies.clone(),\n        routes: manifest.routes.clone(),\n    }\n}\n\nfn parse_field_type(s: \u0026str) -\u003e FieldType {\n    match s {\n        \"string\" =\u003e FieldType::String,\n        \"int\" =\u003e FieldType::Int,\n        \"float\" =\u003e FieldType::Float,\n        \"bool\" =\u003e FieldType::Bool,\n        \"datetime\" =\u003e FieldType::Datetime,\n        \"richtext\" =\u003e FieldType::Richtext,\n        other if other.starts_with(\"id(\") \u0026\u0026 other.ends_with(')') =\u003e {\n            FieldType::Id(other[3..other.len() - 1].to_string())\n        }\n        _ =\u003e FieldType::String,\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn parse_valid_manifest() {\n        let json = r#\"{\n            \"manifest_version\": 1,\n            \"name\": \"test-app\",\n            \"version\": \"0.1.0\",\n            \"entities\": [{\n                \"name\": \"Post\",\n                \"fields\": [\n                    {\"name\": \"title\", \"type\": \"string\", \"optional\": false, \"unique\": false},\n                    {\"name\": \"slug\", \"type\": \"string\", \"optional\": false, \"unique\": true}\n                ],\n                \"indexes\": []\n            }],\n            \"routes\": [\n                {\"path\": \"/\", \"mode\": \"server\"}\n            ]\n        }\"#;\n        let m = parse_manifest(json, \"test.json\").unwrap();\n        assert_eq!(m.name, \"test-app\");\n        assert_eq!(m.entities.len(), 1);\n        assert_eq!(m.entities[0].fields.len(), 2);\n        assert_eq!(m.entities[0].fields[1].unique, true);\n        assert_eq!(m.routes.len(), 1);\n    }\n\n    #[test]\n    fn parse_manifest_with_indexes() {\n        let json = r#\"{\n            \"manifest_version\": 1,\n            \"name\": \"test\",\n            \"version\": \"0.1.0\",\n            \"entities\": [{\n                \"name\": \"Todo\",\n                \"fields\": [\n                    {\"name\": \"authorId\", \"type\": \"id(User)\", \"optional\": false, \"unique\": false}\n                ],\n                \"indexes\": [\n                    {\"name\": \"by_author\", \"fields\": [\"authorId\"], \"unique\": false}\n                ]\n            }],\n            \"routes\": []\n        }\"#;\n        let m = parse_manifest(json, \"test.json\").unwrap();\n        assert_eq!(m.entities[0].indexes.len(), 1);\n        assert_eq!(m.entities[0].indexes[0].name, \"by_author\");\n        assert_eq!(m.entities[0].indexes[0].fields, vec![\"authorId\"]);\n    }\n\n    #[test]\n    fn parse_invalid_json_returns_diagnostic() {\n        let result = parse_manifest(\"not json\", \"test.json\");\n        assert!(result.is_err());\n        let diags = result.unwrap_err();\n        assert_eq!(diags[0].code, \"MANIFEST_PARSE_ERROR\");\n    }\n\n    #[test]\n    fn roundtrip_manifest() {\n        let json = r#\"{\"manifest_version\":1,\"name\":\"app\",\"version\":\"1.0.0\",\"entities\":[],\"routes\":[]}\"#;\n        let m = parse_manifest(json, \"test.json\").unwrap();\n        assert_eq!(m.manifest_version, 1);\n        assert!(m.queries.is_empty());\n        assert!(m.actions.is_empty());\n        let serialized = serde_json::to_string(\u0026m).unwrap();\n        let m2: AppManifest = serde_json::from_str(\u0026serialized).unwrap();\n        assert_eq!(m, m2);\n    }\n\n    #[test]\n    fn parse_manifest_with_queries_and_actions() {\n        let json = r#\"{\n            \"manifest_version\": 1,\n            \"name\": \"test\",\n            \"version\": \"0.1.0\",\n            \"entities\": [{\"name\": \"Post\", \"fields\": [], \"indexes\": []}],\n            \"routes\": [],\n            \"queries\": [\n                {\"name\": \"getPost\", \"input\": [{\"name\": \"postId\", \"type\": \"id(Post)\", \"optional\": false, \"unique\": false}]},\n                {\"name\": \"listPosts\"}\n            ],\n            \"actions\": [\n                {\"name\": \"createPost\", \"input\": [{\"name\": \"title\", \"type\": \"string\", \"optional\": false, \"unique\": false}]}\n            ]\n        }\"#;\n        let m = parse_manifest(json, \"test.json\").unwrap();\n        assert_eq!(m.queries.len(), 2);\n        assert_eq!(m.queries[0].name, \"getPost\");\n        assert_eq!(m.queries[0].input.len(), 1);\n        assert_eq!(m.queries[1].name, \"listPosts\");\n        assert!(m.queries[1].input.is_empty());\n        assert_eq!(m.actions.len(), 1);\n        assert_eq!(m.actions[0].name, \"createPost\");\n        assert_eq!(m.actions[0].input.len(), 1);\n    }\n\n    #[test]\n    fn parse_manifest_with_policies() {\n        let json = r#\"{\n            \"manifest_version\": 1,\n            \"name\": \"test\",\n            \"version\": \"0.1.0\",\n            \"entities\": [{\"name\": \"Post\", \"fields\": [], \"indexes\": []}],\n            \"routes\": [],\n            \"policies\": [\n                {\"name\": \"ownerCanEdit\", \"entity\": \"Post\", \"allow\": \"auth.userId == data.ownerId\"},\n                {\"name\": \"authCreate\", \"action\": \"createPost\", \"allow\": \"auth.userId != null\"}\n            ]\n        }\"#;\n        let m = parse_manifest(json, \"test.json\").unwrap();\n        assert_eq!(m.policies.len(), 2);\n        assert_eq!(m.policies[0].name, \"ownerCanEdit\");\n        assert_eq!(m.policies[0].entity.as_deref(), Some(\"Post\"));\n        assert!(m.policies[0].action.is_none());\n        assert_eq!(m.policies[0].allow, \"auth.userId == data.ownerId\");\n        assert_eq!(m.policies[1].name, \"authCreate\");\n        assert!(m.policies[1].entity.is_none());\n        assert_eq!(m.policies[1].action.as_deref(), Some(\"createPost\"));\n    }\n\n    #[test]\n    fn parse_manifest_with_route_query_and_auth() {\n        let json = r#\"{\n            \"manifest_version\": 1,\n            \"name\": \"test\",\n            \"version\": \"0.1.0\",\n            \"entities\": [{\"name\": \"Post\", \"fields\": [], \"indexes\": []}],\n            \"routes\": [\n                {\"path\": \"/\", \"mode\": \"server\"},\n                {\"path\": \"/todos\", \"mode\": \"live\", \"query\": \"allTodos\", Option\u003c\u0026serde_json::Value\u003e,\n    input: Option\u003c\u0026serde_json::Value\u003e,\n) -\u003e PolicyResult {\n    let expr = expr.trim();\n\n    // \"true\" — always allowed\n    if expr == \"true\" {\n        return PolicyResult::Allowed;\n    }\n\n    // \"false\" — always denied\n    if expr == \"false\" {\n        return PolicyResult::Denied {\n            policy_name: String::new(),\n            reason: \"Expression is false\".into(),\n        };\n    }\n\n    // \"auth.userId != null\" — requires authenticated user\n    if expr == \"auth.userId != null\" {\n        return if auth.is_authenticated() {\n            PolicyResult::Allowed\n        } else {\n            PolicyResult::Denied {\n                policy_name: String::new(),\n                reason: \"Authentication required\".into(),\n            }\n        };\n    }\n\n    // \"auth.userId == data.\u003cfield\u003e\" — user must match a data field\n    if let Some(field) = expr.strip_prefix(\"auth.userId == data.\") {\n        let field = field.trim();\n        if let Some(data) = data {\n            let data_value = data.get(field).and_then(|v| v.as_str());\n            let user_id = auth.user_id.as_deref();\n            return if user_id.is_some() \u0026\u0026 user_id == data_value {\n                PolicyResult::Allowed\n            } else {\n                PolicyResult::Denied {\n                    policy_name: String::new(),\n                    reason: format!(\"User does not match data.{field}\"),\n                }\n            };\n        }\n        // No data to check against — deny.\n        return PolicyResult::Denied {\n            policy_name: String::new(),\n            reason: format!(\"No data available to check data.{field}\"),\n        };\n    }\n\n    // \"auth.userId == input.\u003cfield\u003e\" — user must match an input field\n    if let Some(field) = expr.strip_prefix(\"auth.userId == input.\") {\n        let field = field.trim();\n        if let Some(input) = h":0,"stats":{"Line":1}},{"line":211,"address":[],"length":0,"stats":{"Line":0}},{"line":212,"address":[],"length":0,"stats":{"Line":0}},{"line":213,"address":[],"length":0,"stats":{"Line":0}},{"line":219,"address":[],"length":0,"stats":{"Line":2}},{"line":220,"address":[],"length":0,"stats":{"Line":1}}],"covered":79,"coverable":86},{"path":["/","Users","ericc59","Dev","agentdb","crates","query","src","lib.rs"],"content":"use agentdb_core::{AppManifest, ManifestField, ManifestQuery};\n\n// ---------------------------------------------------------------------------\n// Query descriptor — runtime-facing query metadata\n// ---------------------------------------------------------------------------\n\n/// A query descriptor holds the contract for a single named query.\n/// It describes what inputs the query accepts, derived from the manifest.\n/// It does not implement execution.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct QueryDescriptor {\n    pub name: String,\n    pub input: Vec\u003cInputField\u003e,\n}\n\n/// An input field descriptor for a query or action.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct InputField {\n    pub name: String,\n    pub field_type: String,\n    pub optional: bool,\n}\n\nimpl InputField {\n    pub fn from_manifest_field(f: \u0026ManifestField) -\u003e Self {\n        Self {\n            name: f.name.clone(),\n            field_type: f.field_type.clone(),\n            optional: f.optional,\n        }\n    }\n}\n\nimpl QueryDescriptor {\n    pub fn from_manifest(mq: \u0026ManifestQuery) -\u003e Self {\n        Self {\n            name: mq.name.clone(),\n            input: mq.input.iter().map(InputField::from_manifest_field).collect(),\n        }\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Query registry — all queries from a manifest\n// ---------------------------------------------------------------------------\n\n/// A registry of query descriptors, built from a manifest.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct QueryRegistry {\n    pub queries: Vec\u003cQueryDescriptor\u003e,\n}\n\nimpl QueryRegistry {\n    pub fn from_manifest(manifest: \u0026AppManifest) -\u003e Self {\n        Self {\n            queries: manifest\n                .queries\n                .iter()\n                .map(QueryDescriptor::from_manifest)\n                .collect(),\n        }\n    }\n\n    pub fn get(\u0026self, name: \u0026str) -\u003e Option\u003c\u0026QueryDescriptor\u003e {\n        self.queries.iter().find(|q| q.name == name)\n    }\n\n    pub fn names(\u0026self) -\u003e Vec\u003c\u0026str\u003e {\n        self.queries.iter().map(|q| q.name.as_str()).collect()\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::ManifestField;\n\n    fn test_manifest() -\u003e AppManifest {\n        serde_json::from_str(include_str!(\"../../../examples/todo-app/agentdb.manifest.json\"))\n            .unwrap()\n    }\n\n    #[test]\n    fn registry_from_manifest() {\n        let reg = QueryRegistry::from_manifest(\u0026test_manifest());\n        assert_eq!(reg.queries.len(), 3);\n        assert_eq!(reg.names(), vec![\"todosByAuthor\", \"allTodos\", \"todoById\"]);\n    }\n\n    #[test]\n    fn get_query_by_name() {\n        let reg = QueryRegistry::from_manifest(\u0026test_manifest());\n        let q = reg.get(\"todosByAuthor\").unwrap();\n        assert_eq!(q.name, \"todosByAuthor\");\n        assert_eq!(q.input.len(), 1);\n        assert_eq!(q.input[0].name, \"authorId\");\n        assert_eq!(q.input[0].field_type, \"id(User)\");\n        assert!(!q.input[0].optional);\n    }\n\n    #[test]\n    fn get_query_with_optional_input() {\n        let reg = QueryRegistry::from_manifest(\u0026test_manifest());\n        let q = reg.get(\"allTodos\").unwrap();\n        assert_eq!(q.input.len(), 1);\n        assert_eq!(q.input[0].name, \"done\");\n        assert!(q.input[0].optional);\n    }\n\n    #[test]\n    fn get_missing_query_returns_none() {\n        let reg = QueryRegistry::from_manifest(\u0026test_manifest());\n        assert!(reg.get(\"nonexistent\").is_none());\n    }\n\n    #[test]\n    fn descriptor_from_manifest_query() {\n        let mq = ManifestQuery {\n            name: \"test\".into(),\n            input: vec![ManifestField {\n                name: \"id\".into(),\n                field_type: \"string\".into(),\n                optional: false,\n                unique: false,\n            }],\n        };\n        let desc = QueryDescriptor::from_manifest(\u0026mq);\n        assert_eq!(desc.name, \"test\");\n        assert_eq!(desc.input.len(), 1);\n        assert_eq!(desc.input[0].name, \"id\");\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":13}},{"line":27,"address":[],"length":0,"stats":{"Line":39}},{"line":28,"address":[],"length":0,"stats":{"Line":26}},{"line":29,"address":[],"length":0,"stats":{"Line":13}},{"line":35,"address":[],"length":0,"stats":{"Line":13}},{"line":37,"address":[],"length":0,"stats":{"Line":39}},{"line":38,"address":[],"length":0,"stats":{"Line":26}},{"line":54,"address":[],"length":0,"stats":{"Line":4}},{"line":56,"address":[],"length":0,"stats":{"Line":8}},{"line":64,"address":[],"length":0,"stats":{"Line":3}},{"line":65,"address":[],"length":0,"stats":{"Line":18}},{"line":68,"address":[],"length":0,"stats":{"Line":1}},{"line":69,"address":[],"length":0,"stats":{"Line":9}}],"covered":13,"coverable":13},{"path":["/","Users","ericc59","Dev","agentdb","crates","runtime","src","lib.rs"],"content":"pub mod server;\npub mod sse;\npub mod ws;\n\nuse std::collections::HashMap;\nuse std::sync::Mutex;\n\nuse agentdb_core::{AppManifest, ManifestEntity};\nuse rusqlite::Connection;\n\n// ---------------------------------------------------------------------------\n// Runtime errors\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone)]\npub struct RuntimeError {\n    pub code: String,\n    pub message: String,\n}\n\nimpl std::fmt::Display for RuntimeError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(f, \"[{}] {}\", self.code, self.message)\n    }\n}\n\nimpl std::error::Error for RuntimeError {}\n\n// ---------------------------------------------------------------------------\n// Runtime — the core execution engine\n// ---------------------------------------------------------------------------\n\n/// A minimal runtime that executes CRUD operations against a SQLite database\n/// based on a manifest contract.\npub struct Runtime {\n    conn: Mutex\u003cConnection\u003e,\n    manifest: AppManifest,\n    entities: HashMap\u003cString, ManifestEntity\u003e,\n}\n\nimpl Runtime {\n    /// Open a runtime against an existing SQLite database.\n    pub fn open(db_path: \u0026str, manifest: AppManifest) -\u003e Result\u003cSelf, RuntimeError\u003e {\n        let conn = Connection::open(db_path).map_err(|e| RuntimeError {\n            code: \"RUNTIME_OPEN_FAILED\".into(),\n            message: format!(\"Failed to open database: {e}\"),\n        })?;\n        let entities: HashMap\u003cString, ManifestEntity\u003e = manifest\n            .entities\n            .iter()\n            .map(|e| (e.name.clone(), e.clone()))\n            .collect();\n        Ok(Self {\n            conn: Mutex::new(conn),\n            manifest,\n            entities,\n        })\n    }\n\n    /// Create an in-memory runtime. Applies schema automatically.\n    pub fn in_memory(manifest: AppManifest) -\u003e Result\u003cSelf, RuntimeError\u003e {\n        let conn = Connection::open_in_memory().map_err(|e| RuntimeError {\n            code: \"RUNTIME_OPEN_FAILED\".into(),\n            message: format!(\"Failed to open in-memory database: {e}\"),\n        })?;\n\n        // Apply schema.\n        // Apply schema directly on our connection.\n        for entity in \u0026manifest.entities {\n            let fields: Vec\u003cagentdb_storage::FieldSpec\u003e = entity\n                .fields\n                .iter()\n                .map(|f| agentdb_storage::FieldSpec {\n                    name: f.name.clone(),\n                    field_type: f.field_type.clone(),\n                    optional: f.optional,\n                    unique: f.unique,\n                })\n                .collect();\n            let sql = agentdb_storage::sqlite::create_table_sql(\u0026entity.name, \u0026fields);\n            conn.execute(\u0026sql, []).map_err(|e| RuntimeError {\n                code: \"RUNTIME_SCHEMA_FAILED\".into(),\n                message: format!(\"Failed to create table {}: {e}\", entity.name),\n            })?;\n            for index in \u0026entity.indexes {\n                let sql = agentdb_storage::sqlite::create_index_sql(\n                    \u0026entity.name,\n                    \u0026index.name,\n                    \u0026index.fields,\n                    index.unique,\n                );\n                conn.execute(\u0026sql, []).map_err(|e| RuntimeError {\n                    code: \"RUNTIME_SCHEMA_FAILED\".into(),\n                    message: format!(\"Failed to create index: {e}\"),\n                })?;\n            }\n        }\n\n        let entities: HashMap\u003cString, ManifestEntity\u003e = manifest\n            .entities\n            .iter()\n            .map(|e| (e.name.clone(), e.clone()))\n            .collect();\n\n        Ok(Self {\n            conn: Mutex::new(conn),\n            manifest,\n            entities,\n        })\n    }\n\n    /// Get the manifest this runtime was built from.\n    pub fn manifest(\u0026self) -\u003e \u0026AppManifest {\n        \u0026self.manifest\n    }\n\n    // -----------------------------------------------------------------------\n    // Graph queries\n    // -----------------------------------------------------------------------\n\n    /// Execute a graph query. The query is a JSON object where keys are entity\n    /// names and values describe nested relations to traverse.\n    ///\n    /// Example: `{ \"Todo\": { \"include\": { \"author\": {} } } }`\n    /// Returns: all Todos, each with an `author` field populated from the User table.\n    pub fn query_graph(\n        \u0026self,\n        query: \u0026serde_json::Value,\n    ) -\u003e Result\u003cserde_json::Value, RuntimeError\u003e {\n        let obj = query.as_object().ok_or_else(|| RuntimeError {\n            code: \"RUNTIME_INVALID_QUERY\".into(),\n            message: \"Query must be a JSON object\".into(),\n        })?;\n\n        let mut result = serde_json::Map::new();\n\n        for (entity_name, sub_query) in obj {\n            let rows = self.list(entity_name)?;\n\n            // Check for \"include\" to do relation traversal.\n            let includes = sub_query\n                .get(\"include\")\n                .and_then(|v| v.as_object())\n                .cloned()\n                .unwrap_or_default();\n\n            // Check for \"where\" filter.\n            let where_clause = sub_query.get(\"where\").and_then(|v| v.as_object());\n\n            let mut filtered_rows: Vec\u003cserde_json::Value\u003e = if let Some(wc) = where_clause {\n                rows.into_iter()\n                    .filter(|row| {\n                        wc.iter().all(|(key, val)| {\n                            row.get(key).map(|v| v == val).unwrap_or(false)\n                        })\n                    })\n                    .collect()\n            } else {\n                rows\n            };\n\n            // Resolve relations.\n            if !includes.is_empty() {\n                let entity_def = self.entities.get(entity_name);\n                for row in \u0026mut filtered_rows {\n                    if let Some(obj) = row.as_object_mut() {\n                        for (rel_name, _rel_query) in \u0026includes {\n                            if let Some(def) = entity_def {\n                                if let Some(rel) = def.relations.iter().find(|r| \u0026r.name == rel_name) {\n                                    // Get the foreign key value from this row.\n                                    if let Some(fk_val) = obj.get(\u0026rel.field).and_then(|v| v.as_str()) {\n                                        if rel.many {\n                                            // Has-many: find all target rows where target.field == this.id\n                                            if let Ok(target_rows) = self.list(\u0026rel.target) {\n                                                let related: Vec\u003cserde_json::Value\u003e = target_rows\n                                                    .into_iter()\n                                                    .filter(|r| {\n                                                        r.get(\u0026rel.field)\n                                                            .and_then(|v| v.as_str())\n                                                            .map(|v| v == fk_val)\n                                                            .unwrap_or(false)\n                                                    })\n                                                    .collect();\n                                                obj.insert(rel_name.clone(), serde_json::Value::Array(related));\n                                            }\n                                        } else {\n                                            // Belongs-to: find one target row by ID.\n                                            if let Ok(Some(related)) = self.get_by_id(\u0026rel.target, fk_val) {\n                                                obj.insert(rel_name.clone(), related);\n                                            }\n                                        }\n                                    }\n                                }\n                            }\n                        }\n                    }\n                }\n            }\n\n            result.insert(entity_name.clone(), serde_json::Value::Array(filtered_rows));\n        }\n\n        Ok(serde_json::Value::Object(result))\n    }\n\n    // -----------------------------------------------------------------------\n    // CRUD operations\n    // -----------------------------------------------------------------------\n\n    /// Insert a row into an entity table. Returns the generated ID.\n    pub fn insert(\n        \u0026self,\n        entity_name: \u0026str,\n        data: \u0026serde_json::Value,\n    ) -\u003e Result\u003cString, RuntimeError\u003e {\n        let entity = self.get_entity(entity_name)?;\n        let obj = data\n            .as_object()\n            .ok_or_else(|| RuntimeError {\n                code: \"RUNTIME_INVALID_DATA\".into(),\n                message: \"Insert data must be a JSON object\".into(),\n            })?;\n\n        let id = generate_id();\n        let mut col_names = vec![\"id\".to_string()];\n        let mut placeholders = vec![\"?1\".to_string()];\n        let mut values: Vec\u003cString\u003e = vec![id.clone()];\n\n        for (i, field) in entity.fields.iter().enumerate() {\n            let val = obj.get(\u0026field.name);\n            match val {\n                Some(v) if !v.is_null() =\u003e {\n                    col_names.push(field.name.clone());\n                    placeholders.push(format!(\"?{}\", i + 2));\n                    values.push(json_to_sqlite_string(v));\n                }\n                _ =\u003e {\n                    if !field.optional {\n                        return Err(RuntimeError {\n                            code: \"RUNTIME_MISSING_FIELD\".into(),\n                            message: format!(\n                                \"Required field \\\"{}\\\" is missing for entity \\\"{}\\\"\",\n                                field.name, entity_name\n                            ),\n                        });\n                    }\n                }\n            }\n        }\n\n        let sql = format!(\n            \"INSERT INTO {} ({}) VALUES ({})\",\n            entity_name,\n            col_names.join(\", \"),\n            placeholders.join(\", \")\n        );\n\n        let params: Vec\u003c\u0026dyn rusqlite::types::ToSql\u003e = values\n            .iter()\n            .map(|v| v as \u0026dyn rusqlite::types::ToSql)\n            .collect();\n\n        let conn = self.lock_conn()?;\n        conn.execute(\u0026sql, params.as_slice())\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_INSERT_FAILED\".into(),\n                message: format!(\"Insert into {} failed: {e}\", entity_name),\n            })?;\n\n        Ok(id)\n    }\n\n    /// Get a single row by ID.\n    pub fn get_by_id(\n        \u0026self,\n        entity_name: \u0026str,\n        id: \u0026str,\n    ) -\u003e Result\u003cOption\u003cserde_json::Value\u003e, RuntimeError\u003e {\n        let _entity = self.get_entity(entity_name)?;\n\n        let sql = format!(\"SELECT * FROM {} WHERE id = ?1\", entity_name);\n        let conn = self.lock_conn()?;\n        let mut stmt = conn.prepare(\u0026sql).map_err(|e| RuntimeError {\n            code: \"RUNTIME_QUERY_FAILED\".into(),\n            message: format!(\"Query failed: {e}\"),\n        })?;\n\n        let column_names: Vec\u003cString\u003e = stmt\n            .column_names()\n            .iter()\n            .map(|s| s.to_string())\n            .collect();\n\n        let mut rows = stmt\n            .query_map([id], |row| {\n                let mut obj = serde_json::Map::new();\n                for (i, col) in column_names.iter().enumerate() {\n                    let val: rusqlite::types::Value = row.get(i)?;\n                    obj.insert(col.clone(), sqlite_value_to_json(val));\n                }\n                Ok(serde_json::Value::Object(obj))\n            })\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Query failed: {e}\"),\n            })?;\n\n        match rows.next() {\n            Some(Ok(row)) =\u003e Ok(Some(row)),\n            Some(Err(e)) =\u003e Err(RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Row read failed: {e}\"),\n            }),\n            None =\u003e Ok(None),\n        }\n    }\n\n    /// List all rows from an entity table.\n    pub fn list(\n        \u0026self,\n        entity_name: \u0026str,\n    ) -\u003e Result\u003cVec\u003cserde_json::Value\u003e, RuntimeError\u003e {\n        let _entity = self.get_entity(entity_name)?;\n\n        let sql = format!(\"SELECT * FROM {}\", entity_name);\n        let conn = self.lock_conn()?;\n        let mut stmt = conn.prepare(\u0026sql).map_err(|e| RuntimeError {\n            code: \"RUNTIME_QUERY_FAILED\".into(),\n            message: format!(\"Query failed: {e}\"),\n        })?;\n\n        let column_names: Vec\u003cString\u003e = stmt\n            .column_names()\n            .iter()\n            .map(|s| s.to_string())\n            .collect();\n\n        let rows: Vec\u003cserde_json::Value\u003e = stmt\n            .query_map([], |row| {\n                let mut obj = serde_json::Map::new();\n                for (i, col) in column_names.iter().enumerate() {\n                    let val: rusqlite::types::Value = row.get(i)?;\n                    obj.insert(col.clone(), sqlite_value_to_json(val));\n                }\n                Ok(serde_json::Value::Object(obj))\n            })\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Query failed: {e}\"),\n            })?\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Row read failed: {e}\"),\n            })?;\n\n        Ok(rows)\n    }\n\n    /// Update a row by ID with partial data. Returns true if a row was updated.\n    /// Query with operators: $not, $gt, $lt, $gte, $lte, $in, $like.\n    /// Also supports $order and $limit/$offset.\n    pub fn query_filtered(\n        \u0026self,\n        entity_name: \u0026str,\n        filter: \u0026serde_json::Value,\n    ) -\u003e Result\u003cVec\u003cserde_json::Value\u003e, RuntimeError\u003e {\n        let _entity = self.get_entity(entity_name)?;\n        let rows = self.list(entity_name)?;\n        let filter_obj = filter.as_object();\n\n        let mut result: Vec\u003cserde_json::Value\u003e = rows\n            .into_iter()\n            .filter(|row| {\n                if let Some(filters) = filter_obj {\n                    for (key, condition) in filters {\n                        if key.starts_with('$') {\n                            continue; // skip meta-operators like $order, $limit\n                        }\n                        let row_val = row.get(key);\n                        if !matches_condition(row_val, condition) {\n                            return false;\n                        }\n                    }\n                }\n                true\n            })\n            .collect();\n\n        // $order: { \"field\": \"asc\" | \"desc\" }\n        if let Some(order) = filter.get(\"$order\").and_then(|v| v.as_object()) {\n            if let Some((field, dir)) = order.iter().next() {\n                let desc = dir.as_str() == Some(\"desc\");\n                result.sort_by(|a, b| {\n                    let va = a.get(field).and_then(|v| v.as_str()).unwrap_or(\"\");\n                    let vb = b.get(field).and_then(|v| v.as_str()).unwrap_or(\"\");\n                    if desc { vb.cmp(va) } else { va.cmp(vb) }\n                });\n            }\n        }\n\n        // $limit and $offset\n        let offset = filter.get(\"$offset\").and_then(|v| v.as_u64()).unwrap_or(0) as usize;\n        let limit = filter.get(\"$limit\").and_then(|v| v.as_u64());\n\n        if offset \u003e 0 {\n            result = result.into_iter().skip(offset).collect();\n        }\n        if let Some(lim) = limit {\n            result = result.into_iter().take(lim as usize).collect();\n        }\n\n        Ok(result)\n    }\n\n    /// Lookup a row by a unique field value.\n    pub fn lookup(\n        \u0026self,\n        entity_name: \u0026str,\n        field_name: \u0026str,\n        value: \u0026str,\n    ) -\u003e Result\u003cOption\u003cserde_json::Value\u003e, RuntimeError\u003e {\n        let _entity = self.get_entity(entity_name)?;\n\n        let sql = format!(\"SELECT * FROM {} WHERE {} = ?1\", entity_name, field_name);\n        let conn = self.lock_conn()?;\n        let mut stmt = conn.prepare(\u0026sql).map_err(|e| RuntimeError {\n            code: \"RUNTIME_QUERY_FAILED\".into(),\n            message: format!(\"Lookup failed: {e}\"),\n        })?;\n\n        let column_names: Vec\u003cString\u003e = stmt\n            .column_names()\n            .iter()\n            .map(|s| s.to_string())\n            .collect();\n\n        let mut rows = stmt\n            .query_map([value], |row| {\n                let mut obj = serde_json::Map::new();\n                for (i, col) in column_names.iter().enumerate() {\n                    let val: rusqlite::types::Value = row.get(i)?;\n                    obj.insert(col.clone(), sqlite_value_to_json(val));\n                }\n                Ok(serde_json::Value::Object(obj))\n            })\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Lookup failed: {e}\"),\n            })?;\n\n        match rows.next() {\n            Some(Ok(row)) =\u003e Ok(Some(row)),\n            Some(Err(e)) =\u003e Err(RuntimeError {\n                code: \"RUNTIME_QUERY_FAILED\".into(),\n                message: format!(\"Row read failed: {e}\"),\n            }),\n            None =\u003e Ok(None),\n        }\n    }\n\n    pub fn update(\n        \u0026self,\n        entity_name: \u0026str,\n        id: \u0026str,\n        data: \u0026serde_json::Value,\n    ) -\u003e Result\u003cbool, RuntimeError\u003e {\n        let entity = self.get_entity(entity_name)?;\n        let obj = data.as_object().ok_or_else(|| RuntimeError {\n            code: \"RUNTIME_INVALID_DATA\".into(),\n            message: \"Update data must be a JSON object\".into(),\n        })?;\n\n        if obj.is_empty() {\n            return Ok(false);\n        }\n\n        let mut set_clauses = Vec::new();\n        let mut values: Vec\u003cString\u003e = Vec::new();\n\n        for (key, val) in obj {\n            // Only allow updating declared fields.\n            if entity.fields.iter().any(|f| \u0026f.name == key) {\n                values.push(json_to_sqlite_string(val));\n                set_clauses.push(format!(\"{} = ?{}\", key, values.len()));\n            }\n        }\n\n        if set_clauses.is_empty() {\n            return Ok(false);\n        }\n\n        values.push(id.to_string());\n        let sql = format!(\n            \"UPDATE {} SET {} WHERE id = ?{}\",\n            entity_name,\n            set_clauses.join(\", \"),\n            values.len()\n        );\n\n        let params: Vec\u003c\u0026dyn rusqlite::types::ToSql\u003e = values\n            .iter()\n            .map(|v| v as \u0026dyn rusqlite::types::ToSql)\n            .collect();\n\n        let conn = self.lock_conn()?;\n        let affected = conn\n            .execute(\u0026sql, params.as_slice())\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_UPDATE_FAILED\".into(),\n                message: format!(\"Update on {} failed: {e}\", entity_name),\n            })?;\n\n        Ok(affected \u003e 0)\n    }\n\n    /// Delete a row by ID. Returns true if a row was deleted.\n    pub fn delete(\n        \u0026self,\n        entity_name: \u0026str,\n        id: \u0026str,\n    ) -\u003e Result\u003cbool, RuntimeError\u003e {\n        self.get_entity(entity_name)?;\n\n        let sql = format!(\"DELETE FROM {} WHERE id = ?1\", entity_name);\n        let conn = self.lock_conn()?;\n        let affected = conn\n            .execute(\u0026sql, [id])\n            .map_err(|e| RuntimeError {\n                code: \"RUNTIME_DELETE_FAILED\".into(),\n                message: format!(\"Delete on {} failed: {e}\", entity_name),\n            })?;\n\n        Ok(affected \u003e 0)\n    }\n\n    // -----------------------------------------------------------------------\n    // Helpers\n    // -----------------------------------------------------------------------\n\n    fn get_entity(\u0026self, name: \u0026str) -\u003e Result\u003c\u0026ManifestEntity, RuntimeError\u003e {\n        self.entities.get(name).ok_or_else(|| RuntimeError {\n            code: \"RUNTIME_ENTITY_NOT_FOUND\".into(),\n            message: format!(\"Unknown entity: \\\"{name}\\\"\"),\n        })\n    }\n\n    /// Public connection lock for transaction support.\n    pub fn lock_conn_pub(\u0026self) -\u003e Result\u003cstd::sync::MutexGuard\u003c'_, Connection\u003e, RuntimeError\u003e {\n        self.lock_conn()\n    }\n\n    fn lock_conn(\u0026self) -\u003e Result\u003cstd::sync::MutexGuard\u003c'_, Connection\u003e, RuntimeError\u003e {\n        self.conn.lock().map_err(|_| RuntimeError {\n            code: \"RUNTIME_LOCK_FAILED\".into(),\n            message: \"Failed to acquire database lock\".into(),\n        })\n    }\n}\n\nfn generate_id() -\u003e String {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let ts = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default();\n    format!(\"{}.{:09}\", ts.as_secs(), ts.subsec_nanos())\n}\n\nfn sqlite_value_to_json(val: rusqlite::types::Value) -\u003e serde_json::Value {\n    match val {\n        rusqlite::types::Value::Null =\u003e serde_json::Value::Null,\n        rusqlite::types::Value::Integer(i) =\u003e serde_json::Value::Number(i.into()),\n        rusqlite::types::Value::Real(f) =\u003e {\n            serde_json::Number::from_f64(f)\n                .map(serde_json::Value::Number)\n                .unwrap_or(serde_json::Value::Null)\n        }\n        rusqlite::types::Value::Text(s) =\u003e serde_json::Value::String(s),\n        rusqlite::types::Value::Blob(b) =\u003e {\n            serde_json::Value::String(format!(\"base64:{}\", base64_encode(\u0026b)))\n        }\n    }\n}\n\nfn base64_encode(data: \u0026[u8]) -\u003e String {\n    const CHARS: \u0026[u8] = b\"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/\";\n    let mut out = String::new();\n    for chunk in data.chunks(3) {\n        let b0 = chunk[0] as u32;\n        let b1 = if chunk.len() \u003e 1 { chunk[1] as u32 } else { 0 };\n        let b2 = if chunk.len() \u003e 2 { chunk[2] as u32 } else { 0 };\n        let n = (b0 \u003c\u003c 16) | (b1 \u003c\u003c 8) | b2;\n        out.push(CHARS[((n \u003e\u003e 18) \u0026 63) as usize] as char);\n        out.push(CHARS[((n \u003e\u003e 12) \u0026 63) as usize] as char);\n        if chunk.len() \u003e 1 { out.push(CHARS[((n \u003e\u003e 6) \u0026 63) as usize] as char); } else { out.push('='); }\n        if chunk.len() \u003e 2 { out.push(CHARS[(n \u0026 63) as usize] as char); } else { out.push('='); }\n    }\n    out\n}\n\n/// Match a row value against a filter condition.\n/// Supports: direct equality, { $not: val }, { $gt: val }, { $lt: val },\n/// { $gte: val }, { $lte: val }, { $in: [val, ...] }, { $like: \"pattern\" }\nfn matches_condition(row_val: Option\u003c\u0026serde_json::Value\u003e, condition: \u0026serde_json::Value) -\u003e bool {\n    // If condition is an object with operators.\n    if let Some(ops) = condition.as_object() {\n        if let Some(not_val) = ops.get(\"$not\") {\n            return row_val.map(|v| v != not_val).unwrap_or(true);\n        }\n        if let Some(gt_val) = ops.get(\"$gt\") {\n            return compare_json(row_val, gt_val) == Some(std::cmp::Ordering::Greater);\n        }\n        if let Some(lt_val) = ops.get(\"$lt\") {\n            return compare_json(row_val, lt_val) == Some(std::cmp::Ordering::Less);\n        }\n        if let Some(gte_val) = ops.get(\"$gte\") {\n            return matches!(compare_json(row_val, gte_val), Some(std::cmp::Ordering::Greater | std::cmp::Ordering::Equal));\n        }\n        if let Some(lte_val) = ops.get(\"$lte\") {\n            return matches!(compare_json(row_val, lte_val), Some(std::cmp::Ordering::Less | std::cmp::Ordering::Equal));\n        }\n        if let Some(in_val) = ops.get(\"$in\") {\n            if let Some(arr) = in_val.as_array() {\n                return row_val.map(|v| arr.contains(v)).unwrap_or(false);\n            }\n            return false;\n        }\n        if let Some(like_val) = ops.get(\"$like\") {\n            if let (Some(rv), Some(pattern)) = (row_val.and_then(|v| v.as_str()), like_val.as_str()) {\n                return rv.contains(pattern);\n            }\n            return false;\n        }\n    }\n\n    // Direct equality comparison.\n    row_val.map(|v| v == condition).unwrap_or(false)\n}\n\nfn compare_json(a: Option\u003c\u0026serde_json::Value\u003e, b: \u0026serde_json::Value) -\u003e Option\u003cstd::cmp::Ordering\u003e {\n    let a = a?;\n    match (a.as_f64(), b.as_f64()) {\n        (Some(va), Some(vb)) =\u003e va.partial_cmp(\u0026vb),\n        _ =\u003e {\n            let sa = a.as_str()?;\n            let sb = b.as_str()?;\n            Some(sa.cmp(sb))\n        }\n    }\n}\n\nfn json_to_sqlite_string(val: \u0026serde_json::Value) -\u003e String {\n    match val {\n        serde_json::Value::String(s) =\u003e s.clone(),\n        serde_json::Value::Number(n) =\u003e n.to_string(),\n        serde_json::Value::Bool(b) =\u003e if *b { \"1\" } else { \"0\" }.to_string(),\n        serde_json::Value::Null =\u003e String::new(),\n        other =\u003e other.to_string(),\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agentdb_core::*;\n\n    fn test_manifest() -\u003e AppManifest {\n        serde_json::from_str(include_str!(\"../../../examples/todo-app/agentdb.manifest.json\"))\n            .unwrap()\n    }\n\n    fn create_runtime() -\u003e Runtime {\n        Runtime::in_memory(test_manifest()).unwrap()\n    }\n\n    #[test]\n    fn insert_and_get_by_id() {\n        let rt = create_runtime();\n        let data = serde_json::json!({\n            \"email\": \"test@example.com\",\n            \"displayName\": \"Test User\",\n            \"createdAt\": \"2024-01-01T00:00:00Z\"\n        });\n        let id = rt.insert(\"User\", \u0026data).unwrap();\n        assert!(!id.is_empty());\n\n        let row = rt.get_by_id(\"User\", \u0026id).unwrap().unwrap();\n        assert_eq!(row[\"id\"], id);\n        assert_eq!(row[\"email\"], \"test@example.com\");\n        assert_eq!(row[\"displayName\"], \"Test User\");\n    }\n\n    #[test]\n    fn insert_missing_required_field_fails() {\n        let rt = create_runtime();\n        let data = serde_json::json!({\n            \"email\": \"test@example.com\"\n            // missing displayName and createdAt\n        });\n        let result = rt.insert(\"User\", \u0026data);\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"RUNTIME_MISSING_FIELD\");\n    }\n\n    #[test]\n    fn insert_with_optional_field_missing() {\n        let rt = create_runtime();\n        // Todo.done is required but all fields provided\n        let data = serde_json::json!({\n            \"title\": \"Test todo\",\n            \"done\": false,\n            \"authorId\": \"user-1\",\n            \"createdAt\": \"2024-01-01T00:00:00Z\"\n        });\n        let id = rt.insert(\"Todo\", \u0026data).unwrap();\n        assert!(!id.is_empty());\n    }\n\n    #[test]\n    fn list_returns_all_rows() {\n        let rt = create_runtime();\n\n        // Insert two users.\n        rt.insert(\n            \"User\",\n            \u0026serde_json::json!({\n                \"email\": \"a@test.com\",\n                \"displayName\": \"A\",\n                \"createdAt\": \"2024-01-01T00:00:00Z\"\n            }),\n        )\n        .unwrap();\n        rt.insert(\n            \"User\",\n            \u0026serde_json::json!({\n                \"email\": \"b@test.com\",\n                \"displayName\": \"B\",\n                \"createdAt\": \"2024-01-02T00:00:00Z\"\n            }),\n        )\n        .unwrap();\n\n        let rows = rt.list(\"User\").unwrap();\n        assert_eq!(rows.len(), 2);\n    }\n\n    #[test]\n    fn get_missing_row_returns_none() {\n        let rt = create_runtime();\n        let row = rt.get_by_id(\"User\", \"nonexistent\").unwrap();\n        assert!(row.is_none());\n    }\n\n    #[test]\n    fn unknown_entity_fails() {\n        let rt = create_runtime();\n        let result = rt.insert(\"Nonexistent\", \u0026serde_json::json!({}));\n        assert!(result.is_err());\n        assert_eq!(result.unwrap_err().code, \"RUNTIME_ENTITY_NOT_FOUND\");\n    }\n\n    #[test]\n    fn update_row() {\n        let rt = create_runtime();\n        let id = rt\n            .insert(\n                \"User\",\n                \u0026serde_json::json!({\n                    \"email\": \"old@test.com\",\n                    \"displayName\": \"Old\",\n                    \"createdAt\": \"2024-01-01T00:00:00Z\"\n                }),\n            )\n            .unwrap();\n\n        let updated = rt\n            .update(\"User\", \u0026id, \u0026serde_json::json!({\"displayName\": \"New\"}))\n            .unwrap();\n        assert!(updated);\n\n        let row = rt.get_by_id(\"User\", \u0026id).unwrap().unwrap();\n        assert_eq!(row[\"displayName\"], \"New\");\n        assert_eq!(row[\"email\"], \"old@test.com\"); // unchanged\n    }\n\n    #[test]\n    fn update_missing_row_returns_false() {\n        let rt = create_runtime();\n        let updated = rt\n            .update(\n                \"User\",\n                \"nonexistent\",\n                \u0026serde_json::json!({\"displayName\": \"X\"}),\n            )\n            .unwrap();\n        assert!(!updated);\n    }\n\n    #[test]\n    fn delete_row() {\n        let rt = create_runtime();\n        let id = rt\n            .insert(\n                \"User\",\n                \u0026serde_json::json!({\n                    \"email\": \"del@test.com\",\n                    \"displayName\": \"Del\",\n                    \"createdAt\": \"2024-01-01T00:00:00Z\"\n                }),\n            )\n            .unwrap();\n\n        let deleted = rt.delete(\"User\", \u0026id).unwrap();\n        assert!(deleted);\n\n        let row = rt.get_by_id(\"User\", \u0026id).unwrap();\n        assert!(row.is_none());\n    }\n\n    #[test]\n    fn delete_missing_row_returns_false() {\n        let rt = create_runtime();\n        let deleted = rt.delete(\"User\", \"nonexistent\").unwrap();\n        assert!(!deleted);\n    }\n\n    #[test]\n    fn bool_roundtrip() {\n        let rt = create_runtime();\n        let id = rt\n            .insert(\n                \"Todo\",\n                \u0026serde_json::json!({\n                    \"title\": \"Test\",\n                    \"done\": false,\n                    \"authorId\": \"user-1\",\n                    \"createdAt\": \"2024-01-01T00:00:00Z\"\n                }),\n            )\n            .unwrap();\n\n        let row = rt.get_by_id(\"Todo\", \u0026id).unwrap().unwrap();\n        assert_eq!(row[\"done\"], 0); // bool false stored as INTEGER 0 in SQLite\n    }\n\n    // -- Helper to seed test data --\n\n    fn seed_users(rt: \u0026Runtime) -\u0
